<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NotePlayer · Apuntes Matemáticos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:#0a0a0f; --s1:#12121a; --s2:#1a1a24; --s3:#222230;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
  --ink:#f0ece4; --ink2:rgba(240,236,228,0.62); --ink3:rgba(240,236,228,0.32);
  --accent:#c9a96e; --accent2:#d4ba7c; --adim:rgba(201,169,110,0.14);
  --teal:#7ec8bc; --tdim:rgba(126,200,188,0.12);
  --r:16px; --rsm:10px;
  --player-h:72px; --nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  padding-bottom:calc(var(--player-h) + var(--nav-h) + 0.5rem)}

.view{display:none}.view.active{display:block}

/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:100;padding:.75rem 1rem;
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  background:rgba(10,10,15,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border)}
.tb-left,.tb-right{display:flex;align-items:center;gap:.5rem}
.logo-text{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.icon-btn{width:36px;height:36px;border-radius:50%;background:transparent;
  border:1px solid var(--border2);color:var(--ink2);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--adim),var(--tdim));
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:.95rem;font-weight:900;color:var(--accent);cursor:pointer}

/* ── SEARCH ── */
.search-wrap{padding:.7rem 1rem .3rem}
.search-bar{display:flex;align-items:center;gap:.6rem;padding:.65rem .95rem;
  background:var(--s1);border:1px solid var(--border);border-radius:99px;
  transition:border-color .2s}
.search-bar:focus-within{border-color:var(--border2)}
.search-bar svg{width:16px;height:16px;stroke:var(--ink3);fill:none;stroke-width:2;flex-shrink:0}
.search-bar input{flex:1;background:none;border:none;color:var(--ink);font-family:'DM Sans',sans-serif;
  font-size:.88rem;outline:none}
.search-bar input::placeholder{color:var(--ink3)}
.search-clear{cursor:pointer;color:var(--ink3);font-size:1rem;line-height:1;flex-shrink:0;display:none}

/* ── SECTIONS ── */
.section{margin:1.2rem 0}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;margin-bottom:.7rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;letter-spacing:.01em}
.section-link{font-size:.78rem;color:var(--accent);cursor:pointer;font-weight:500}

/* ── FEATURED ── */
.featured-card{margin:0 1rem;border-radius:var(--r);overflow:hidden;background:var(--s1);
  border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative}
.featured-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.featured-cover{width:100%;aspect-ratio:16/9;display:flex;align-items:center;
  justify-content:center;font-size:3.8rem;position:relative}
.featured-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(10,10,15,.85) 0%,transparent 65%)}
.featured-cover span{position:relative;z-index:1}
.featured-badge{position:absolute;top:.9rem;left:.9rem;z-index:2;
  font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:99px;
  background:var(--accent);color:#000;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.featured-info{padding:.9rem;position:relative;z-index:2;margin-top:-2.8rem}
.featured-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;line-height:1.2;margin-bottom:.35rem}
.featured-meta{font-size:.78rem;color:var(--ink2)}
.featured-fav{position:absolute;top:.9rem;right:.9rem;z-index:2;width:34px;height:34px;
  border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;font-size:15px}
.featured-fav.faved{background:rgba(201,169,110,.3);border-color:var(--accent);color:var(--accent)}

/* ── HSCROLL ── */
.hscroll{display:flex;gap:.75rem;overflow-x:auto;padding:0 1rem .4rem;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}

/* ── MINI CARD ── */
.mini-card{flex-shrink:0;width:138px;cursor:pointer;border-radius:var(--rsm);
  overflow:hidden;background:var(--s1);border:1px solid var(--border);transition:all .2s}
.mini-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.mini-card:active{transform:scale(.97)}
.mini-cover{width:100%;aspect-ratio:1/1;display:flex;align-items:center;
  justify-content:center;font-size:2.4rem;position:relative}
.mini-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 60%)}
.mini-cover span{position:relative;z-index:1}
.fav-dot{position:absolute;top:.4rem;right:.4rem;z-index:3;width:22px;height:22px;
  border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;
  transition:all .15s}
.fav-dot.faved{background:rgba(201,169,110,.25);border-color:var(--accent);color:var(--accent)}
.mini-info{padding:.55rem .65rem}
.mini-title{font-size:.79rem;font-weight:600;color:var(--ink);line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-meta{font-size:.69rem;color:var(--ink3);margin-top:2px}

/* ── CONTINUE LIST ── */
.continue-list{padding:0 1rem}
.continue-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .6rem;
  border-radius:var(--rsm);cursor:pointer;transition:background .2s}
.continue-item:hover{background:var(--s1)}
.c-thumb{width:46px;height:46px;border-radius:var(--rsm);display:flex;align-items:center;
  justify-content:center;font-size:1.45rem;background:var(--s2);flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-title{font-size:.84rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:.73rem;color:var(--ink3);margin-top:1px}
.play-btn{width:34px;height:34px;border-radius:50%;background:var(--adim);
  border:1px solid var(--accent);color:var(--accent);display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.play-btn:hover{background:var(--accent);color:#000}
.play-btn svg{width:13px;height:13px;fill:currentColor}

/* ── SEARCH RESULTS ── */
.search-results{padding:0 1rem}
.search-empty{padding:3rem 1rem;text-align:center;color:var(--ink3);font-size:.9rem}
.search-result-item{display:flex;align-items:center;gap:.75rem;padding:.7rem .5rem;
  border-radius:var(--rsm);cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--s1)}
.sr-cover{width:44px;height:44px;border-radius:var(--rsm);display:flex;align-items:center;
  justify-content:center;font-size:1.35rem;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:.85rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:.73rem;color:var(--ink3);margin-top:2px}
.sr-type{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:99px;
  background:var(--s2);color:var(--ink3);flex-shrink:0}

/* ── DETAIL ── */
.detail-header{display:flex;flex-direction:column;align-items:center;padding:1.3rem 1rem .5rem;gap:.9rem}
.detail-cover{width:168px;height:168px;border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;font-size:4.8rem;border:1px solid var(--border2);
  position:relative;overflow:hidden}
.detail-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 55%)}
.detail-cover span{position:relative;z-index:1}
.detail-info{text-align:center}
.detail-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;line-height:1.2;margin-bottom:.28rem}
.detail-author{font-size:.88rem;color:var(--ink2)}
.detail-actions{display:flex;gap:.6rem;justify-content:center;margin-top:.4rem;flex-wrap:wrap}
.action-btn{padding:.5rem 1rem;border-radius:99px;background:var(--s1);border:1px solid var(--border2);
  color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.35rem}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.action-btn.primary:hover{background:var(--accent2)}
.action-btn.faved{background:rgba(201,169,110,.15);border-color:var(--accent);color:var(--accent)}
.detail-stats{text-align:center;font-size:.78rem;color:var(--ink3);margin-top:.4rem}

/* ── EPISODE LIST ── */
.episode-list{padding:0 .8rem}
.ep-item{display:flex;align-items:center;gap:.7rem;padding:.85rem .5rem;
  border-radius:var(--rsm);cursor:pointer;transition:background .18s;
  border-bottom:1px solid var(--border)}
.ep-item:last-of-type{border-bottom:none}
.ep-item:hover{background:var(--s1)}
.ep-item.open{background:var(--adim)}
.ep-num{font-family:'DM Mono',monospace;font-size:.73rem;color:var(--ink3);
  width:28px;text-align:center;flex-shrink:0}
.ep-info{flex:1;min-width:0}
.ep-title{font-size:.88rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-meta{font-size:.72rem;color:var(--ink3);margin-top:2px;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.ep-diff{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:99px}
.ep-time{font-family:'DM Mono',monospace}
.ep-actions{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.ep-fav{width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid var(--border2);
  color:var(--ink3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;
  transition:all .15s;flex-shrink:0}
.ep-fav:hover,.ep-fav.faved{border-color:var(--accent);color:var(--accent)}
.ep-play{width:34px;height:34px;border-radius:50%;background:var(--adim);border:1px solid var(--accent);
  color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;transition:all .2s}
.ep-play:hover,.ep-play.active{background:var(--accent);color:#000}
.ep-play svg{width:12px;height:12px;fill:currentColor}

/* ── APUNTE EXPANDIBLE inline ── */
.apunte-wrap{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.apunte-wrap.open{max-height:9999px}
.apunte-inner{background:var(--s1);border-top:1px solid var(--border2);
  margin:0 .3rem;border-radius:0 0 var(--rsm) var(--rsm);padding:1.3rem 1.1rem 1.4rem}
.apunte-inner h1{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:900;color:var(--ink);margin-bottom:.4rem}
.apunte-inner .subtitle{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--ink3);
  letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:1.2rem;
  padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.apunte-inner h2{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  color:var(--accent);margin:1.3rem 0 .55rem}
.apunte-inner h3{font-size:.9rem;font-weight:600;color:var(--ink);margin:.9rem 0 .4rem}
.apunte-inner p{font-size:.875rem;line-height:1.75;color:var(--ink2);margin-bottom:.7rem}
.apunte-inner ul,.apunte-inner ol{margin:.5rem 0 .8rem 1.3rem}
.apunte-inner li{font-size:.875rem;line-height:1.7;color:var(--ink2);margin-bottom:.25rem}
.apunte-inner strong{color:var(--ink);font-weight:600}
.apunte-inner em{color:var(--ink2);font-style:italic}
.apunte-inner code{font-family:'DM Mono',monospace;background:rgba(201,169,110,.09);
  padding:2px 7px;border-radius:4px;font-size:.85em;color:var(--accent2)}
.apunte-inner table{width:100%;border-collapse:collapse;margin:.9rem 0;font-size:.8rem;
  display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;
  border:1px solid var(--border);border-radius:var(--rsm)}
.apunte-inner th{background:var(--s2);color:var(--ink);padding:.6rem .75rem;text-align:left;
  font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;
  border-bottom:2px solid var(--border2)}
.apunte-inner td{padding:.55rem .75rem;border-bottom:1px solid var(--border);color:var(--ink2);font-size:.82rem}
.apunte-inner tr:last-child td{border-bottom:none}
.def-box{background:rgba(139,157,195,.07);border-left:3px solid #8b9dc3;
  padding:.75rem .9rem;margin:.85rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.86em;line-height:1.65;color:var(--ink2)}
.thm-box{background:rgba(123,165,135,.07);border-left:3px solid #7ba587;
  padding:.75rem .9rem;margin:.85rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.86em;line-height:1.65;color:var(--ink2)}
.ex-box{background:rgba(201,169,110,.07);border-left:3px solid var(--accent);
  padding:.75rem .9rem;margin:.85rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.86em;line-height:1.65;color:var(--ink2)}
.math-block{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.65rem 0;text-align:center;margin:.7rem 0}
.math-block .katex-display{margin:0;overflow-x:auto;overflow-y:hidden}

/* ── NOW PLAYING ── */
.np-wrap{display:flex;flex-direction:column;align-items:center;padding:1.8rem 1.2rem;
  gap:1.4rem;min-height:60vh;justify-content:center}
.np-cover{width:clamp(200px,60vw,270px);height:clamp(200px,60vw,270px);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;font-size:clamp(5rem,16vw,7rem);
  border:1px solid var(--border2);position:relative;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.55)}
.np-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 55%)}
.np-cover span{position:relative;z-index:1}
.np-info{text-align:center;width:100%}
.np-title{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-bottom:.3rem}
.np-author{font-size:.88rem;color:var(--ink2)}
.progress-wrap{width:100%}
.progress-bar{width:100%;height:4px;background:var(--s2);border-radius:99px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s linear}
.progress-times{display:flex;justify-content:space-between;margin-top:.35rem;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)}
.waveform{width:100%;height:38px;display:flex;align-items:flex-end;justify-content:center;gap:3px}
.wbar{width:3px;background:var(--accent);border-radius:2px;opacity:.7}
.wbar.ani{animation:wave .7s ease-in-out infinite alternate}
@keyframes wave{from{height:15%}to{height:100%}}
.controls{display:flex;align-items:center;justify-content:center;gap:1.3rem}
.ctrl-btn{width:42px;height:42px;border-radius:50%;background:transparent;border:1px solid var(--border2);
  color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ctrl-play{width:62px;height:62px;border-radius:50%;background:var(--accent);border:none;color:#000;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
  box-shadow:0 8px 28px rgba(201,169,110,.32)}
.ctrl-play:hover{transform:scale(1.05);box-shadow:0 12px 38px rgba(201,169,110,.42)}
.ctrl-play svg{width:25px;height:25px;fill:currentColor}
.np-open-notes{margin-top:.3rem;padding:.55rem 1.1rem;border-radius:99px;
  background:var(--adim);border:1px solid var(--accent);color:var(--accent);
  font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.np-open-notes:hover{background:var(--accent);color:#000}
.np-notes{width:100%;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:var(--s1)}

/* ── FAVS VIEW ── */
.favs-empty{padding:3rem 1rem;text-align:center;color:var(--ink3);font-size:.9rem}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:var(--player-h);left:0;right:0;z-index:100;
  display:flex;justify-content:space-around;padding:.45rem .8rem;
  background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  color:var(--ink3);transition:color .2s;padding:.28rem .5rem}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.nav-label{font-size:9.5px;font-weight:500;letter-spacing:.04em}

/* ── MINI PLAYER ── */
.mini-player{position:fixed;bottom:var(--nav-h);left:0;right:0;z-index:100;
  height:var(--player-h);padding:0 .9rem;display:flex;align-items:center;gap:.75rem;
  background:rgba(10,10,15,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border2);
  cursor:pointer;transition:background .2s}
.mini-player:hover{background:var(--s1)}
.mp-cover{width:42px;height:42px;border-radius:var(--rsm);display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;background:var(--s2);flex-shrink:0}
.mp-info{flex:1;min-width:0}
.mp-title{font-size:.79rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-sub{font-size:.69rem;color:var(--ink3);margin-top:1px}
.mp-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--s2)}
.mp-progress-fill{height:100%;background:var(--accent);transition:width .4s linear}
.mp-controls{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.mp-btn{width:34px;height:34px;border-radius:50%;background:var(--adim);border:1px solid var(--accent);
  color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;flex-shrink:0}
.mp-btn:hover{background:var(--accent);color:#000}
.mp-btn svg{width:13px;height:13px;fill:currentColor;stroke:none}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <div class="tb-left" id="tb-left">
    <span class="logo-text">NotePlayer</span>
  </div>
  <div class="tb-left" id="tb-back" style="display:none">
    <button class="icon-btn" id="btn-back" onclick="navBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="tb-title" style="font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700"></span>
  </div>

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const allBooks = LIBRARY.flatMap(c => c.books);
const allTracks = allBooks.flatMap(b => b.tracks.map(t => ({ ...t, bookId: b.id, bookTitle: b.title, bookEmoji: b.emoji, bookCover: b.cover })));

let state = {
  view: 'home',
  prevView: null,
  currentBookId: null,
  currentTrackKey: null, // "bookId:trackNum"
  isPlaying: false,
  favorites: new Set(JSON.parse(localStorage.getItem('np_favs') || '[]')),
  openTracks: new Set(),
  progress: 0,
  progressTimer: null,
};

function saveFavs() { localStorage.setItem('np_favs', JSON.stringify([...state.favorites])); }
function trackKey(bookId, num) { return `${bookId}:${num}`; }
function isFav(key) { return state.favorites.has(key); }

/* ══════════════════════════════════════════
   RENDER HOME
══════════════════════════════════════════ */
function renderHome() {
  const featured = allBooks[0];
  const featKey = trackKey(featured.id, featured.tracks[0]?.num);
  let html = `
    <div class="section">
      <div class="section-header"><span class="section-title">Destacado</span></div>
      <div class="featured-card" onclick="openDetail('${featured.id}')">
        <div class="featured-cover" style="background:${featured.cover}"><span>${featured.emoji}</span></div>
        <span class="featured-badge">Nuevo</span>
        <div class="featured-info">
          <div class="featured-title">${featured.title}</div>
          <div class="featured-meta">${featured.author} · ${featured.tracks.length} temas · ${featured.pages} pág.</div>
        </div>
        <button class="featured-fav ${isFav(featured.id)?'faved':''}" onclick="event.stopPropagation();toggleFavBook('${featured.id}',this)">
          ${isFav(featured.id)?'♥':'♡'}
        </button>
      </div>
    </div>`;

  html += LIBRARY.map(cat => `
    <div class="section">
      <div class="section-header">
        <span class="section-title">${cat.label}</span>
      </div>
      <div class="hscroll">
        ${cat.books.map(b => `
          <div class="mini-card" onclick="openDetail('${b.id}')">
            <div class="mini-cover" style="background:${b.cover}">
              <span>${b.emoji}</span>
              <div class="fav-dot ${isFav(b.id)?'faved':''}" onclick="event.stopPropagation();toggleFavBook('${b.id}',this)">
                ${isFav(b.id)?'♥':'♡'}
              </div>
            </div>
            <div class="mini-info">
              <div class="mini-title">${b.title}</div>
              <div class="mini-meta">${b.tracks.length} temas</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  // Recently played
  const recent = allBooks.slice(0, 4);
  html += `
    <div class="section">
      <div class="section-header"><span class="section-title">Continuar</span></div>

        ${recent.map(b => `
          <div class="continue-item" onclick="openDetail('${b.id}')">
            <div class="c-thumb" style="background:${b.cover}">${b.emoji}</div>

/* ══════════════════════════════════════════
   DETAIL VIEW
══════════════════════════════════════════ */
function openDetail(bookId) {
  const book = allBooks.find(b => b.id === bookId);
  if (!book) return;
  state.currentBookId = bookId;
  state.openTracks.clear();

  setTopBar(book.title, true);

  let html = `
    <div class="detail-header">
      <div class="detail-cover" style="background:${book.cover}"><span>${book.emoji}</span></div>
      <div class="detail-info">
        <div class="detail-title">${book.title}</div>
        <div class="detail-author">${book.author} · ${book.pages} páginas</div>
      </div>
      <div class="detail-actions">
        <button class="action-btn ${isFav(book.id)?'faved':''}" id="fav-btn" onclick="toggleFavBook('${book.id}',this,true)">
          ${isFav(book.id)?'♥ Guardado':'♡ Guardar'}
        </button>
        <button class="action-btn primary" onclick="playTrack('${book.id}',1)">▶ Reproducir</button>
      </div>
      <div class="detail-stats">${book.tracks.length} temas · ${book.totalTime}</div>
    </div>
    <div class="section-header" style="padding:0 1rem .4rem"><span class="section-title">Temas</span></div>
    <div class="episode-list" id="ep-list">`;

  book.tracks.forEach(t => {
    const key = trackKey(book.id, t.num);
    const isActive = state.currentTrackKey === key;
    const isOpen = state.openTracks.has(key);
    html += renderTrackItem(book, t, isActive, isOpen, key);
  });

  html += `</div>`;
  document.getElementById('detail').innerHTML = html;
  showView('detail');
}

function renderTrackItem(book, t, isActive, isOpen, key) {
  return `
    <div id="wrap-${book.id}-${t.num}">
      <div class="ep-item ${isOpen?'open':''}" id="ep-${book.id}-${t.num}" onclick="toggleTrack('${book.id}',${t.num})">
        <span class="ep-num">${isActive && state.isPlaying
          ? `<span style="color:var(--accent);animation:pulse-play 1.2s ease infinite;display:inline-block">▶</span>`
          : String(t.num).padStart(2,'0')}</span>
        <div class="ep-info">
          <div class="ep-title">${t.title}</div>
          <div class="ep-meta">
            <span>${t.sub}</span>
            <span class="ep-diff" style="${t.diffStyle}">${t.diff}</span>
            <span class="ep-time">${t.time}</span>
          </div>
        </div>
        <div class="ep-actions">
          <button class="ep-fav ${isFav(key)?'faved':''}" onclick="event.stopPropagation();toggleFavTrack('${book.id}',${t.num},this)">${isFav(key)?'♥':'♡'}</button>
          <button class="ep-play ${isActive && state.isPlaying?'active':''}" onclick="event.stopPropagation();playTrack('${book.id}',${t.num})">
            <svg viewBox="0 0 24 24">${isActive && state.isPlaying
              ? '<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>'
              : '<polygon points="5,3 19,12 5,21" fill="currentColor"/>'}</svg>
          </button>
        </div>
      </div>
      <div class="apunte-wrap ${isOpen?'open':''}" id="apunte-wrap-${book.id}-${t.num}">
        <div class="apunte-inner" id="ai-${book.id}-${t.num}"></div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════
   TOGGLE TRACK (expand/collapse apunte)
══════════════════════════════════════════ */
function toggleTrack(bookId, num) {
  const key = trackKey(bookId, num);
  const wrap = document.getElementById(`apunte-wrap-${bookId}-${num}`);
  const epEl = document.getElementById(`ep-${bookId}-${num}`);
  const inner = document.getElementById(`ai-${bookId}-${num}`);
  if (!wrap) return;

  const isOpen = state.openTracks.has(key);
  if (isOpen) {
    state.openTracks.delete(key);
    wrap.classList.remove('open');
    epEl?.classList.remove('open');
  } else {
    state.openTracks.add(key);
    wrap.classList.add('open');
    epEl?.classList.add('open');
    if (!inner.dataset.rendered) {
      const book = allBooks.find(b => b.id === bookId);
      const track = book?.tracks.find(t => t.num === num);
      inner.innerHTML = track?.latex || '';
      inner.dataset.rendered = '1';
      renderKaTeX(inner);
    }
    setTimeout(() => epEl?.scrollIntoView({ behavior:'smooth', block:'nearest' }), 200);
  }
}

/* ══════════════════════════════════════════
   PLAY TRACK
══════════════════════════════════════════ */
function playTrack(bookId, num) {
  const book = allBooks.find(b => b.id === bookId);
  const track = book?.tracks.find(t => t.num === num);
  if (!book || !track) return;

  state.currentBookId = bookId;
  state.currentTrackKey = trackKey(bookId, num);
  state.isPlaying = true;
  state.progress = 0;

  // Update mini player
  document.getElementById('mp-cover').textContent = book.emoji;
  document.getElementById('mp-cover').style.background = book.cover;
  document.getElementById('mp-title').textContent = track.title;
  document.getElementById('mp-sub').textContent = `${book.title} · ${track.sub}`;
  updateMiniPlayBtn();

  // Fake progress
  clearInterval(state.progressTimer);
  state.progressTimer = setInterval(() => {
    state.progress = Math.min(state.progress + 0.2, 100);
    document.getElementById('mp-prog').style.width = state.progress + '%';
    if (state.isPlaying && document.getElementById('np-progress-fill')) {
      document.getElementById('np-progress-fill').style.width = state.progress + '%';
    }
    if (state.progress >= 100) { clearInterval(state.progressTimer); nextTrack(); }
  }, 500);

  // Refresh detail view buttons if visible
  if (state.view === 'detail' && state.currentBookId === bookId) {
    refreshDetailButtons();
  }

  // Open now playing
  renderNowPlaying();
  showView('now-playing');
  setTopBar('Reproduciendo', true);
}

function refreshDetailButtons() {
  document.querySelectorAll('.ep-item').forEach(el => {
    const id = el.id.replace('ep-','');
    const parts = id.split('-');
    const bId = parts.slice(0,-1).join('-');
    const n = parseInt(parts[parts.length-1]);
    const key = trackKey(bId, n);
    const isActive = state.currentTrackKey === key;
    const playBtn = el.querySelector('.ep-play');
    const numEl = el.querySelector('.ep-num');
    if (playBtn) {
      playBtn.classList.toggle('active', isActive && state.isPlaying);
      playBtn.innerHTML = `<svg viewBox="0 0 24 24">${isActive && state.isPlaying
        ? '<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>'
        : '<polygon points="5,3 19,12 5,21" fill="currentColor"/>'}</svg>`;
    }
  });
}

function prevTrack() {
  if (!state.currentTrackKey) return;
  const [bId, numStr] = state.currentTrackKey.split(':');
  const book = allBooks.find(b => b.id === bId);
  if (!book) return;
  const idx = book.tracks.findIndex(t => t.num === parseInt(numStr));
  if (idx > 0) playTrack(bId, book.tracks[idx-1].num);
}

function nextTrack() {
  if (!state.currentTrackKey) return;
  const [bId, numStr] = state.currentTrackKey.split(':');
  const book = allBooks.find(b => b.id === bId);
  if (!book) return;
  const idx = book.tracks.findIndex(t => t.num === parseInt(numStr));
  if (idx < book.tracks.length - 1) playTrack(bId, book.tracks[idx+1].num);
}

function togglePlay() {
  state.isPlaying = !state.isPlaying;
  if (state.isPlaying) {
    state.progressTimer = setInterval(() => {
      state.progress = Math.min(state.progress + 0.2, 100);
      document.getElementById('mp-prog').style.width = state.progress + '%';
      if (document.getElementById('np-progress-fill')) document.getElementById('np-progress-fill').style.width = state.progress + '%';
    }, 500);
  } else {
    clearInterval(state.progressTimer);
  }
  updateMiniPlayBtn();
  if (document.getElementById('np-play-icon')) {
    document.getElementById('np-play-icon').innerHTML = state.isPlaying
      ? '<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>'
      : '<polygon points="5,3 19,12 5,21" fill="currentColor"/>';
  }
}

function updateMiniPlayBtn() {
  const icon = document.getElementById('mp-icon');
  if (!icon) return;
  icon.innerHTML = state.isPlaying
    ? '<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>'
    : '<polygon points="5,3 19,12 5,21" fill="currentColor"/>';
}

/* ══════════════════════════════════════════
   NOW PLAYING VIEW
══════════════════════════════════════════ */
function openNowPlayingView() {
  if (!state.currentTrackKey) return;
  renderNowPlaying();
  showView('now-playing');
  setTopBar('Reproduciendo', true);
}

function renderNowPlaying() {
  if (!state.currentTrackKey) return;
  const [bId, numStr] = state.currentTrackKey.split(':');
  const book = allBooks.find(b => b.id === bId);
  const track = book?.tracks.find(t => t.num === parseInt(numStr));
  if (!book || !track) return;

  const wbars = Array.from({length:14}, (_,i) =>
    `<div class="wbar ${state.isPlaying?'ani':''}" style="height:${[30,55,80,65,45,90,100,50,70,40,85,60,35,75][i]}%;animation-delay:${i*0.07}s"></div>`
  ).join('');

  document.getElementById('now-playing').innerHTML = `
    <div class="np-wrap">
      <div class="np-cover" style="background:${book.cover}"><span>${book.emoji}</span></div>
      <div class="np-info">
        <div class="np-title">${track.title}</div>
        <div class="np-author">${book.title} · ${track.sub}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" onclick="seekProgress(event)">
          <div class="progress-fill" id="np-progress-fill" style="width:${state.progress}%"></div>
        </div>
        <div class="progress-times">
          <span id="np-elapsed">—</span>
          <span>${track.time}</span>
        </div>
      </div>
      <div class="waveform">${wbars}</div>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevTrack()">
          <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4" fill="currentColor" stroke="none"/><rect x="5" y="4" width="3" height="16" rx="1" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="ctrl-play" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" id="np-play-icon">
            ${state.isPlaying
              ? '<rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/>'
              : '<polygon points="5,3 19,12 5,21" fill="currentColor"/>'}
          </svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()">
          <svg viewBox="0 0 24 24"><polygon points="5,20 15,12 5,4" fill="currentColor" stroke="none"/><rect x="16" y="4" width="3" height="16" rx="1" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
      <button class="np-open-notes" onclick="openNotesFromNP('${bId}',${track.num})">
        Abrir apuntes del tema
      </button>
      <div id="np-notes-area" style="width:100%"></div>
    </div>`;
}

function openNotesFromNP(bookId, num) {
  const inner = document.getElementById('np-notes-area');
  if (!inner) return;
  if (inner.dataset.open === '1') { inner.innerHTML = ''; inner.dataset.open = ''; return; }
  const book = allBooks.find(b => b.id === bookId);
  const track = book?.tracks.find(t => t.num === num);
  if (!track) return;
  inner.innerHTML = `<div class="np-notes"><div class="apunte-inner" id="np-ai"></div></div>`;
  const ai = document.getElementById('np-ai');
  ai.innerHTML = track.latex;
  renderKaTeX(ai);
  inner.dataset.open = '1';
  setTimeout(() => inner.scrollIntoView({ behavior:'smooth', block:'start' }), 200);
}

function seekProgress(e) {
  const bar = e.currentTarget;
  const ratio = e.offsetX / bar.offsetWidth;
  state.progress = ratio * 100;
  document.getElementById('np-progress-fill').style.width = state.progress + '%';
  document.getElementById('mp-prog').style.width = state.progress + '%';
}

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
function showSearch() {
  setTopBar('Buscar', true);
  document.getElementById('search-view').innerHTML = `
    <div class="search-wrap">
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Buscar libros, temas, materias..." autofocus oninput="doSearch(this.value)">
        <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
      </div>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty">Escribe para buscar en tu biblioteca</div>
    </div>`;
  showView('search-view');
  setTimeout(() => document.getElementById('search-input')?.focus(), 100);
}

function doSearch(q) {
  const clear = document.getElementById('search-clear');
  if (clear) clear.style.display = q ? 'block' : 'none';
  const res = document.getElementById('search-results');
  if (!q.trim()) { res.innerHTML = '<div class="search-empty">Escribe para buscar en tu biblioteca</div>'; return; }
  const qL = q.toLowerCase();

  let matches = [];
  allBooks.forEach(b => {
    if (b.title.toLowerCase().includes(qL)) matches.push({ type:'book', bookId:b.id, title:b.title, sub:b.author, emoji:b.emoji, cover:b.cover });
    b.tracks.forEach(t => {
      if (t.title.toLowerCase().includes(qL) || t.sub.toLowerCase().includes(qL))
        matches.push({ type:'track', bookId:b.id, num:t.num, title:t.title, sub:`${b.title} · ${t.sub}`, emoji:b.emoji, cover:b.cover });
    });
  });

  if (!matches.length) { res.innerHTML = `<div class="search-empty">Sin resultados para "<strong>${q}</strong>"</div>`; return; }

  res.innerHTML = matches.map(m => `
    <div class="search-result-item" onclick="${m.type==='book'?`openDetail('${m.bookId}')`:`openDetailAndExpand('${m.bookId}',${m.num})`}">
      <div class="sr-cover" style="background:${m.cover}">${m.emoji}</div>
      <div class="sr-info">
        <div class="sr-title">${m.title}</div>
        <div class="sr-sub">${m.sub}</div>
      </div>
      <span class="sr-type">${m.type==='book'?'Libro':'Tema'}</span>
    </div>`).join('');
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  if (inp) { inp.value = ''; inp.focus(); }
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').innerHTML = '<div class="search-empty">Escribe para buscar en tu biblioteca</div>';
}

function openDetailAndExpand(bookId, num) {
  openDetail(bookId);
  setTimeout(() => toggleTrack(bookId, num), 300);
}

/* ══════════════════════════════════════════
   FAVORITES
══════════════════════════════════════════ */
function toggleFavBook(bookId, el, isText) {
  const key = bookId;
  if (isFav(key)) { state.favorites.delete(key); }
  else { state.favorites.add(key); }
  saveFavs();
  if (el) {
    el.classList.toggle('faved', isFav(key));
    if (isText) el.textContent = isFav(key) ? '♥ Guardado' : '♡ Guardar';
    else el.textContent = isFav(key) ? '♥' : '♡';
  }
  updateNavFavBadge();
}

function toggleFavTrack(bookId, num, el) {
  const key = trackKey(bookId, num);
  if (isFav(key)) state.favorites.delete(key);
  else state.favorites.add(key);
  saveFavs();
  if (el) { el.classList.toggle('faved', isFav(key)); el.textContent = isFav(key)?'♥':'♡'; }
}

function updateNavFavBadge() {
  const icon = document.getElementById('nav-fav-icon');
  if (icon) icon.style.fill = state.favorites.size ? 'var(--accent)' : 'none';
}

function showFavs() {
  setTopBar('Favoritos', false);
  const favBooks = allBooks.filter(b => isFav(b.id));
  const favTracks = allTracks.filter(t => isFav(trackKey(t.bookId, t.num)));

  let html = '';
  if (!favBooks.length && !favTracks.length) {
    html = '<div class="favs-empty">Aún no tienes favoritos.<br>Guarda libros o temas con ♡</div>';
  } else {
    if (favBooks.length) {
      html += `<div class="section"><div class="section-header"><span class="section-title">Libros guardados</span></div>
        <div class="hscroll">${favBooks.map(b=>`
          <div class="mini-card" onclick="openDetail('${b.id}')">
            <div class="mini-cover" style="background:${b.cover}"><span>${b.emoji}</span></div>
            <div class="mini-info"><div class="mini-title">${b.title}</div><div class="mini-meta">${b.author}</div></div>
          </div>`).join('')}
        </div></div>`;
    }
    if (favTracks.length) {
      html += `<div class="section"><div class="section-header"><span class="section-title">Temas guardados</span></div>
        <div class="continue-list">${favTracks.map(t=>`
          <div class="continue-item" onclick="openDetailAndExpand('${t.bookId}',${t.num})">
            <div class="c-thumb" style="background:${t.bookCover}">${t.bookEmoji}</div>
            <div class="c-info"><div class="c-title">${t.title}</div><div class="c-sub">${t.bookTitle} · ${t.sub}</div></div>
            <button class="play-btn" onclick="event.stopPropagation();playTrack('${t.bookId}',${t.num})">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>`).join('')}
        </div></div>`;
    }
  }
  document.getElementById('favs-view').innerHTML = html;
  showView('favs-view');
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  state.prevView = state.view;
  state.view = id;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.nav === id);
  });
  window.scrollTo(0, 0);
}

function setTopBar(title, showBack) {
  document.getElementById('tb-left').style.display = showBack ? 'none' : 'flex';
  document.getElementById('tb-back').style.display = showBack ? 'flex' : 'none';
  document.getElementById('tb-title').textContent = title;
}

function navBack() {
  const prev = state.prevView || 'home';
  if (prev === 'home' || prev === state.view) { goHome(); return; }
  showView(prev);
  if (prev === 'home') { setTopBar('', false); }
  else if (prev === 'detail') {
    const book = allBooks.find(b => b.id === state.currentBookId);
    setTopBar(book?.title || '', true);
  } else { setTopBar('', false); }
}

function goHome() {
  setTopBar('', false);
  renderHome();
  showView('home');
}

/* ══════════════════════════════════════════
   KATEX
══════════════════════════════════════════ */
function renderKaTeX(el) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
        throwOnError:false, strict:false, trust:true
      });
    } catch(e) { console.warn('KaTeX error', e); }
  } else {
    setTimeout(() => renderKaTeX(el), 150);
  }
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderHome();
  updateNavFavBadge();
});
</script>
</body>
</html>
