<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NotePlayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ... (tu CSS existente, sin cambios) ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090d;--bg2:#111118;--bg3:#1a1a24;--bg4:#23232f;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#eeeae4;--text2:#8e8a99;--text3:#4e4b5a;
  --accent:#b8a4f8;--gold:#e2c36a;--teal:#4ec9a0;--coral:#f09070;
  --r:14px;--rsm:8px;
}
html{height:100%;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
.view{display:none;min-height:100vh}
.view.active{display:block}

/* ── HOME ── */
.home-header{padding:clamp(20px,5vw,40px) clamp(16px,5vw,40px) 0;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:clamp(18px,4vw,24px);font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;-webkit-text-fill-color:var(--text3);margin-top:2px}

.cat-section{padding:clamp(24px,5vw,40px) clamp(16px,5vw,40px) 0}
.cat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cat-label::after{content:'';flex:1;height:1px;background:var(--border2)}

.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(148px,calc(50vw - 20px)),1fr));gap:clamp(10px,3vw,18px)}
.album-card{cursor:pointer;border-radius:var(--r);overflow:hidden;background:var(--bg3);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;-webkit-tap-highlight-color:transparent}
.album-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 20px 48px rgba(0,0,0,.55)}
.album-card:active{transform:scale(0.97)}
.album-cover{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,56px);position:relative;overflow:hidden}
.album-cover::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 60%)}
.album-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.3) 0%,transparent 60%)}
.album-card-info{padding:10px 12px 13px}
.album-card-title{font-size:clamp(12px,2.5vw,14px);font-weight:600;line-height:1.3;color:var(--text)}
.album-card-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px}

/* ── ALBUM VIEW ── */
.album-nav{position:sticky;top:0;z-index:20;background:rgba(9,9,13,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px clamp(14px,4vw,36px);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--accent);font-size:14px;font-weight:500;background:none;border:none;padding:6px 10px;margin:-6px -10px;border-radius:var(--rsm);transition:background .15s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,.06)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-size:14px;font-weight:600;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

.album-hero{padding:clamp(22px,5vw,44px) clamp(16px,5vw,40px) clamp(18px,4vw,32px);display:flex;gap:clamp(14px,4vw,28px);align-items:flex-end;flex-wrap:wrap}
.hero-cover{width:clamp(96px,22vw,148px);height:clamp(96px,22vw,148px);border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:clamp(42px,10vw,64px);position:relative;overflow:hidden;box-shadow:0 20px 56px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.07)}
.hero-cover::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%)}
.hero-info{flex:1;min-width:160px}
.hero-type{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:7px}
.hero-title{font-size:clamp(20px,5vw,32px);font-weight:700;letter-spacing:-0.5px;line-height:1.15}
.hero-author{font-size:13px;color:var(--text2);margin-top:7px}
.hero-stats{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:9px}

.tracklist{padding:0 clamp(10px,4vw,28px) 60px}
.tl-head{display:grid;grid-template-columns:36px 1fr auto 52px;gap:8px;padding:0 12px 10px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px}

.track-item{border-radius:var(--r);overflow:hidden;margin-bottom:4px}
.track-row{display:grid;grid-template-columns:36px 1fr auto 52px;gap:8px;align-items:center;padding:12px 12px;cursor:pointer;border-radius:var(--r);transition:background .12s}
.track-row:hover,.track-row:active{background:var(--bg3)}
.track-row.open{background:var(--bg3);border-radius:var(--r) var(--r) 0 0}

.t-num{font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;text-align:center;line-height:1}
.eq-bars{display:flex;align-items:flex-end;gap:2px;height:14px;justify-content:center}
.eq-bar{width:3px;background:var(--accent);border-radius:1px;animation:eq .6s ease-in-out infinite alternate}
.eq-bar:nth-child(2){animation-delay:.2s}.eq-bar:nth-child(3){animation-delay:.4s}
@keyframes eq{from{height:3px}to{height:14px}}
.t-info{overflow:hidden;min-width:0}
.t-title{font-size:clamp(13px,3vw,15px);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-badge{font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;white-space:nowrap}
.t-pages{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;text-align:right}

/* ── APUNTE EXPANDIBLE ── */
.apunte-body{display:none;background:#f9f7f2;border-top:1px solid rgba(0,0,0,.08);border-radius:0 0 var(--r) var(--r);animation:apExpand .22s ease}
.apunte-body.open{display:block}
@keyframes apExpand{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.apunte-inner{padding:clamp(18px,5vw,38px) clamp(16px,5vw,44px) clamp(22px,5vw,40px)}

/* ── APUNTE TYPOGRAPHY ── */
.apunte-inner{font-family:'Inter',sans-serif;font-size:clamp(14px,2.5vw,16px);line-height:1.82;color:#1a1a24}
.apunte-inner h1{font-size:clamp(19px,4.5vw,27px);font-weight:700;letter-spacing:-0.4px;line-height:1.2;margin-bottom:5px;color:#0e0e16}
.apunte-inner .subtitle{font-size:12px;color:#888;font-family:'DM Mono',monospace;margin-bottom:26px;display:block}
.apunte-inner h2{font-size:clamp(15px,3.5vw,19px);font-weight:700;margin:30px 0 11px;color:#0e0e16;padding-bottom:6px;border-bottom:2px solid #e6e2da}
.apunte-inner h3{font-size:clamp(14px,3vw,16px);font-weight:600;margin:20px 0 8px;color:#28283a}
.apunte-inner p{margin-bottom:13px}
.apunte-inner ul,.apunte-inner ol{margin:10px 0 14px 20px}
.apunte-inner li{margin-bottom:6px;line-height:1.7}
.apunte-inner strong{font-weight:600}
.apunte-inner em{font-style:italic}
.apunte-inner code{font-family:'DM Mono',monospace;background:rgba(0,0,0,.07);padding:2px 6px;border-radius:5px;font-size:.875em}
.apunte-inner table{width:100%;border-collapse:collapse;margin:16px 0;font-size:clamp(12px,2vw,14px);display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
.apunte-inner th{background:#1a1a24;color:#eeeae4;padding:9px 13px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-family:'DM Mono',monospace}
.apunte-inner td{padding:9px 13px;border-bottom:1px solid rgba(0,0,0,.07);vertical-align:top}
.apunte-inner tr:last-child td{border-bottom:none}

.def-box{background:#f0ecff;border-left:3px solid #7c5cdb;padding:13px 17px;border-radius:0 10px 10px 0;margin:16px 0;font-size:.95em;line-height:1.72}
.thm-box{background:#e8f5ef;border-left:3px solid #2a9d6e;padding:13px 17px;border-radius:0 10px 10px 0;margin:16px 0;font-size:.95em;line-height:1.72}
.ex-box{background:#fff8ea;border-left:3px solid #c49400;padding:13px 17px;border-radius:0 10px 10px 0;margin:16px 0;font-size:.95em;line-height:1.72}

.math-block{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:14px 0;text-align:center;margin:14px 0}
.math-block .katex-display{margin:0;overflow-x:auto;overflow-y:hidden;padding:4px 0}

@media(max-width:480px){
  .apunte-inner .katex{font-size:1em!important}
  .tl-head span:last-child,.t-pages{display:none}
  .track-row,.tl-head{grid-template-columns:32px 1fr auto}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="view active">
  <div class="home-header">
    <div>
      <div class="logo">♫ NotePlayer</div>
      <div class="logo-sub">Tu biblioteca de apuntes</div>
    </div>
  </div>
  <div id="home-content"></div>
  <div style="height:40px"></div>
</div>

<!-- ALBUM VIEW -->
<div id="album-view" class="view">
  <div class="album-nav">
    <button class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Biblioteca
    </button>
    <span class="nav-title" id="nav-title"></span>
  </div>
  <div id="album-hero-area"></div>
  <div class="tracklist">
    <div class="tl-head">
      <span>#</span><span>Tema</span><span>Nivel</span><span style="text-align:right">Págs</span>
    </div>
    <div id="tracklist-body"></div>
  </div>
</div>

<script>
const CATEGORIES=[
  {
    label:"Cálculo",
    books:[
      {id:"cal1",title:"Cálculo Diferencial",emoji:"∂",color:"linear-gradient(135deg,#2d0a6e,#7c3aed)",author:"Apuntes · Sem. 2024",
       tracks:[
        {num:1,title:"Límites y Continuidad",sub:"Definición ε-δ",diff:"Básico",diffStyle:"background:#0d2b0d;color:#4ec9a0",pages:"12",
         latex:`<h1>Límites y Continuidad</h1><span class="subtitle">Cap. 1 · Cálculo Diferencial</span>
<h2>Definición de Límite</h2>
<p>Escribimos $\\lim_{x\\to a}f(x)=L$ cuando los valores de $f(x)$ se acercan a $L$ conforme $x\\to a$.</p>
<div class="def-box"><strong>Definición (ε-δ):</strong> Para todo $\\varepsilon>0$ existe $\\delta>0$ tal que $0<|x-a|<\\delta\\Rightarrow|f(x)-L|<\\varepsilon$.</div>
<h2>Propiedades de Límites</h2>
<p>Si $\\lim_{x\\to a}f(x)=L$ y $\\lim_{x\\to a}g(x)=M$:</p>
<ul>
  <li>$\\lim_{x\\to a}[f\\pm g]=L\\pm M$</li>
  <li>$\\lim_{x\\to a}[f\\cdot g]=LM$</li>
  <li>$\\lim_{x\\to a}\\dfrac{f}{g}=\\dfrac{L}{M}$ si $M\\neq 0$</li>
</ul>
<h2>Límites Notables</h2>
<div class="math-block">$$\\lim_{x\\to 0}\\frac{\\sin x}{x}=1\\qquad\\lim_{x\\to 0}\\frac{1-\\cos x}{x}=0\\qquad\\lim_{x\\to\\infty}\\!\\left(1+\\tfrac{1}{x}\\right)^x=e$$</div>
<h2>Continuidad</h2>
<div class="def-box"><strong>Definición:</strong> $f$ es continua en $a$ si: (1) $f(a)$ existe, (2) $\\lim_{x\\to a}f(x)$ existe, (3) $\\lim_{x\\to a}f(x)=f(a)$.</div>
<div class="thm-box"><strong>Teorema del Valor Intermedio:</strong> Si $f$ es continua en $[a,b]$ y $f(a)\\cdot f(b)<0$, entonces $\\exists\\,c\\in(a,b)$ con $f(c)=0$.</div>`},
        {num:2,title:"Derivadas",sub:"Reglas de derivación",diff:"Intermedio",diffStyle:"background:#2a1f00;color:#e2c36a",pages:"18",
         latex:`<h1>Derivadas</h1><span class="subtitle">Cap. 2 · Cálculo Diferencial</span>
<h2>Definición</h2>
<p>La derivada de $f$ en $a$ es:</p>
<div class="math-block">$$f'(a)=\\lim_{h\\to 0}\\frac{f(a+h)-f(a)}{h}$$</div>
<p>Geométricamente: pendiente de la recta tangente en $(a,f(a))$.</p>
<h2>Reglas Fundamentales</h2>
<table><tr><th>Regla</th><th>Fórmula</th></tr>
<tr><td>Potencia</td><td>$\\dfrac{d}{dx}x^n=nx^{n-1}$</td></tr>
<tr><td>Producto</td><td>$(fg)'=f'g+fg'$</td></tr>
<tr><td>Cociente</td><td>$\\!\\left(\\tfrac{f}{g}\\right)'=\\tfrac{f'g-fg'}{g^2}$</td></tr>
<tr><td>Cadena</td><td>$(f\\circ g)'=f'(g)\\cdot g'$</td></tr></table>
<h2>Derivadas Elementales</h2>
<div class="math-block">$$\\frac{d}{dx}\\sin x=\\cos x\\quad\\frac{d}{dx}\\cos x=-\\sin x\\quad\\frac{d}{dx}e^x=e^x\\quad\\frac{d}{dx}\\ln x=\\frac{1}{x}$$</div>
<div class="ex-box"><strong>Ejemplo (regla de la cadena):</strong> $h(x)=\\sin(x^2)$<br>$h'(x)=\\cos(x^2)\\cdot 2x=2x\\cos(x^2)$</div>
<h2>Teorema del Valor Medio</h2>
<div class="thm-box">Si $f$ es continua en $[a,b]$ y diferenciable en $(a,b)$, $\\exists\\,c$ tal que $f'(c)=\\dfrac{f(b)-f(a)}{b-a}$.</div>`},
        {num:3,title:"Integrales",sub:"Técnicas de integración",diff:"Avanzado",diffStyle:"background:#2a0e0e;color:#f09070",pages:"22",
         latex:`<h1>Integral Definida e Indefinida</h1><span class="subtitle">Cap. 3 · Cálculo Integral</span>
<h2>Integral Indefinida</h2>
<p>La antiderivada de $f$ satisface $F'(x)=f(x)$. Se denota $\\int f(x)\\,dx=F(x)+C$.</p>
<h2>Tabla Básica</h2>
<table><tr><th>$f(x)$</th><th>$\\int f(x)\\,dx$</th></tr>
<tr><td>$x^n$</td><td>$\\dfrac{x^{n+1}}{n+1}+C$</td></tr>
<tr><td>$\\dfrac{1}{x}$</td><td>$\\ln|x|+C$</td></tr>
<tr><td>$e^x$</td><td>$e^x+C$</td></tr>
<tr><td>$\\sin x$</td><td>$-\\cos x+C$</td></tr>
<tr><td>$\\cos x$</td><td>$\\sin x+C$</td></tr></table>
<h2>Integral Definida — Riemann</h2>
<div class="math-block">$$\\int_a^b f(x)\\,dx=\\lim_{n\\to\\infty}\\sum_{i=1}^n f(x_i^*)\\,\\Delta x$$</div>
<h2>Teorema Fundamental del Cálculo</h2>
<div class="thm-box"><strong>TFC I:</strong> Si $F(x)=\\int_a^x f(t)\\,dt$ entonces $F'(x)=f(x)$.<br><br><strong>TFC II:</strong> $\\displaystyle\\int_a^b f(x)\\,dx=F(b)-F(a)$</div>
<h2>Integración por Partes</h2>
<div class="math-block">$$\\int u\\,dv=uv-\\int v\\,du$$</div>
<div class="ex-box"><strong>Ejemplo:</strong> $\\int xe^x\\,dx$ con $u=x$, $dv=e^x dx$:<br>$=xe^x-\\int e^x dx=e^x(x-1)+C$</div>`},
      ]},
      {id:"cal2",title:"Cálculo Integral",emoji:"∫",color:"linear-gradient(135deg,#0a2540,#1a6fbf)",author:"Apuntes · Sem. 2024",
       tracks:[
        {num:1,title:"Series de Taylor",sub:"Expansiones en serie",diff:"Intermedio",diffStyle:"background:#2a1f00;color:#e2c36a",pages:"16",
         latex:`<h1>Series de Taylor y Maclaurin</h1><span class="subtitle">Cálculo Integral · Sem. 2024</span>
<h2>Serie de Taylor</h2>
<p>Si $f$ es infinitamente diferenciable en $a$:</p>
<div class="math-block">$$f(x)=\\sum_{n=0}^{\\infty}\\frac{f^{(n)}(a)}{n!}(x-a)^n$$</div>
<h2>Series de Maclaurin Notables</h2>
<table><tr><th>Función</th><th>Serie</th><th>Radio</th></tr>
<tr><td>$e^x$</td><td>$\\sum_{n=0}^\\infty\\dfrac{x^n}{n!}$</td><td>$\\infty$</td></tr>
<tr><td>$\\sin x$</td><td>$\\sum_{n=0}^\\infty\\dfrac{(-1)^n x^{2n+1}}{(2n+1)!}$</td><td>$\\infty$</td></tr>
<tr><td>$\\cos x$</td><td>$\\sum_{n=0}^\\infty\\dfrac{(-1)^n x^{2n}}{(2n)!}$</td><td>$\\infty$</td></tr>
<tr><td>$\\dfrac{1}{1-x}$</td><td>$\\sum_{n=0}^\\infty x^n$</td><td>$|x|<1$</td></tr></table>
<h2>Resto de Lagrange</h2>
<div class="thm-box">$|R_n(x)|\\leq\\dfrac{M|x-a|^{n+1}}{(n+1)!}$ donde $M=\\max|f^{(n+1)}|$ en el intervalo.</div>
<div class="ex-box"><strong>Ejemplo:</strong> $e^{0.1}\\approx 1+0.1+\\dfrac{(0.1)^2}{2}=1.105$<br>Error $\\leq\\dfrac{e^{0.1}(0.1)^3}{6}\\approx 0.000185$</div>`},
      ]},
    ]
  },
  {
    label:"Álgebra",
    books:[
      {id:"alg1",title:"Álgebra Lineal",emoji:"⊗",color:"linear-gradient(135deg,#0d2f1f,#1d9e6a)",author:"Apuntes · Sem. 2024",
       tracks:[
        {num:1,title:"Sistemas Lineales",sub:"Eliminación Gaussiana",diff:"Básico",diffStyle:"background:#0d2b0d;color:#4ec9a0",pages:"14",
         latex:`<h1>Sistemas de Ecuaciones Lineales</h1><span class="subtitle">Álgebra Lineal · Sem. 2024</span>
<h2>Forma Matricial $Ax=b$</h2>
<div class="math-block">$$\\begin{pmatrix}a_{11}&\\cdots&a_{1n}\\\\\\vdots&\\ddots&\\vdots\\\\a_{m1}&\\cdots&a_{mn}\\end{pmatrix}\\begin{pmatrix}x_1\\\\\\vdots\\\\x_n\\end{pmatrix}=\\begin{pmatrix}b_1\\\\\\vdots\\\\b_m\\end{pmatrix}$$</div>
<h2>Eliminación Gaussiana</h2>
<div class="def-box"><strong>Operaciones elementales de fila:</strong> (1) Intercambiar filas, (2) Escalar una fila por $k\\neq 0$, (3) Sumar un múltiplo de una fila a otra. No alteran el conjunto solución.</div>
<div class="ex-box"><strong>Ejemplo:</strong> $2x+y=5$, $4x+3y=11$<br>
$\\left[\\begin{array}{cc|c}2&1&5\\\\4&3&11\\end{array}\\right]\\rightarrow{R_2-2R_1}\\left[\\begin{array}{cc|c}2&1&5\\\\0&1&1\\end{array}\\right]$<br>Solución: $y=1$, $x=2$.</div>
<h2>Teorema de Rouché-Frobenius</h2>
<div class="thm-box">$Ax=b$ tiene solución $\\iff\\operatorname{rango}(A)=\\operatorname{rango}(A|b)$.<ul style="margin-top:9px"><li>$\\operatorname{rango}(A)=n$: solución <strong>única</strong></li><li>$\\operatorname{rango}(A)<n$: infinitas soluciones</li></ul></div>`},
        {num:2,title:"Determinantes",sub:"Propiedades y cálculo",diff:"Básico",diffStyle:"background:#0d2b0d;color:#4ec9a0",pages:"10",
         latex:`<h1>Determinantes</h1><span class="subtitle">Álgebra Lineal · Sem. 2024</span>
<h2>Expansión por Cofactores</h2>
<div class="math-block">$$\\det(A)=\\sum_{j=1}^n a_{ij}\\,C_{ij}\\quad C_{ij}=(-1)^{i+j}M_{ij}$$</div>
<h2>Caso $2\\times 2$</h2>
<div class="math-block">$$\\det\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}=ad-bc$$</div>
<h2>Propiedades</h2>
<ul>
  <li>$\\det(AB)=\\det(A)\\det(B)$</li>
  <li>$\\det(A^T)=\\det(A)$</li>
  <li>$\\det(A^{-1})=1/\\det(A)$</li>
  <li>Fila/columna de ceros $\\Rightarrow\\det=0$</li>
</ul>
<div class="thm-box">$A$ es invertible $\\iff\\det(A)\\neq 0$.</div>
<div class="ex-box"><strong>Regla de Cramer:</strong> $x_i=\\dfrac{\\det(A_i)}{\\det(A)}$ donde $A_i$ es $A$ con la columna $i$ reemplazada por $b$.</div>`},
        {num:3,title:"Eigenvalores",sub:"Diagonalización",diff:"Avanzado",diffStyle:"background:#2a0e0e;color:#f09070",pages:"20",

/* ── RENDER HOME ── */
function renderHome(){
  const c=document.getElementById('home-content');
  c.innerHTML=CATEGORIES.map(cat=>`
    <div class="cat-section">
      <div class="cat-label">${cat.label}</div>
      <div class="album-grid">
        ${cat.books.map(b=>`
          <div class="album-card" onclick="openAlbum('${b.id}')">
            <div class="album-cover" style="background:${b.color}">
              <span style="position:relative;z-index:1">${b.emoji}</span>
            </div>
            <div class="album-card-info">
              <div class="album-card-title">${b.title}</div>
              <div class="album-card-meta">${b.tracks.length} tema${b.tracks.length!==1?'s':''}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

/* ── OPEN ALBUM ── */
function openAlbum(bookId){
  const book=CATEGORIES.flatMap(c=>c.books).find(b=>b.id===bookId);
  if(!book)return;
  document.getElementById('nav-title').textContent=book.title;
  document.getElementById('album-hero-area').innerHTML=`
    <div class="album-hero">
      <div class="hero-cover" style="background:${book.color}">${book.emoji}</div>
      <div class="hero-info">
        <div class="hero-type">Libro de apuntes</div>
        <div class="hero-title">${book.title}</div>
        <div class="hero-author">${book.author}</div>
        <div class="hero-stats">${book.tracks.length} temas · ${book.tracks.reduce((s,t)=>s+parseInt(t.pages),0)} páginas</div>
      </div>
    </div>`;
  document.getElementById('tracklist-body').innerHTML=book.tracks.map(t=>`
    <div class="track-item">
      <div class="track-row" id="tr-${t.num}" onclick="toggleTrack(${t.num},'${book.id}')">
        <div class="t-num" id="tn-${t.num}">${t.num}</div>
        <div class="t-info">
          <div class="t-title">${t.title}</div>
          <div class="t-sub">${t.sub}</div>
        </div>
        <div><span class="t-badge" style="${t.diffStyle}">${t.diff}</span></div>
        <div class="t-pages">${t.pages} p.</div>
      </div>
      <div class="apunte-body" id="ab-${t.num}">
        <div class="apunte-inner" id="ai-${t.num}"></div>
      </div>
    </div>`).join('');
  showView('album-view');
  window.scrollTo(0,0);
}

/* ── TOGGLE TRACK ── */
// Función auxiliar para renderizar KaTeX
function renderKaTeX(element) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(element, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false,
        strict: false,
        trust: true
      });
    } catch(e) {
      console.error('Error rendering KaTeX:', e);
    }
  }
}

function toggleTrack(num, bookId) {
  const ab = document.getElementById('ab-' + num);
  const row = document.getElementById('tr-' + num);
  const numEl = document.getElementById('tn-' + num);
  const isOpen = ab.classList.contains('open');
  
  if (isOpen) {
    ab.classList.remove('open');
    row.classList.remove('open');
    numEl.textContent = num;
    return;
  }
  
  // Cerrar otros tracks abiertos
  document.querySelectorAll('.apunte-body.open').forEach(openBody => {
    const openId = openBody.id.replace('ab-', '');
    const openRow = document.getElementById('tr-' + openId);
    const openNum = document.getElementById('tn-' + openId);
    if (openBody !== ab) {
      openBody.classList.remove('open');
      if (openRow) openRow.classList.remove('open');
      if (openNum) openNum.textContent = openId;
    }
  });
  
  // Abrir el track seleccionado
  ab.classList.add('open');
  row.classList.add('open');
  numEl.innerHTML = '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>';
  
  const inner = document.getElementById('ai-' + num);
  if (!inner.dataset.rendered) {
    const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === bookId);
    const track = book.tracks.find(t => t.num === num);
    inner.innerHTML = track.latex;
    inner.dataset.rendered = '1';
    
    // Renderizar KaTeX
    renderKaTeX(inner);
  }
  
  setTimeout(() => {
    row.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

/* ── NAVIGATION ── */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showView('home');
  window.scrollTo(0, 0);
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
  renderHome();
  console.log('NotePlayer initialized successfully');
});
