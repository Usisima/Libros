<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NotePlayer · Apuntes Matemáticos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:#000000; --s1:#12121a; --s2:#1a1a24; --s3:#222230;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
  --ink:#f0ece4; --ink2:rgba(240,236,228,0.62); --ink3:rgba(240,236,228,0.32);
  --accent:#c9a96e; --accent2:#d4ba7c; --adim:rgba(201,169,110,0.14);
  --teal:#7ec8bc; --tdim:rgba(126,200,188,0.12);
  --r:16px; --rsm:10px;
  --nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
/* FIX 1: scroll starts at top — no scroll-behavior on html, body starts at 0 */
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 1rem)}

.view{display:none}.view.active{display:block}

/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:100;padding:.75rem 1rem;
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border)}
.tb-left,.tb-right{display:flex;align-items:center;gap:.5rem}
.logo-text{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.icon-btn{width:36px;height:36px;border-radius:50%;background:transparent;
  border:1px solid var(--border2);color:var(--ink2);display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── SECTIONS ── */
.section{margin:1.2rem 0}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;margin-bottom:.7rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;letter-spacing:.01em}

/* ── HSCROLL ── */
.hscroll{display:flex;gap:.75rem;overflow-x:auto;padding:0 1rem .4rem;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}

/* ── MINI CARD ── */
.mini-card{flex-shrink:0;width:138px;cursor:pointer;border-radius:var(--rsm);
  overflow:hidden;background:var(--s1);border:1px solid var(--border);transition:all .2s}
.mini-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.mini-card:active{transform:scale(.97)}
.mini-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;
  justify-content:center;font-size:2.4rem;position:relative;overflow:hidden}
.mini-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:0}
.mini-cover span{position:relative;z-index:1}
.fav-dot{position:absolute;top:.4rem;right:.4rem;z-index:3;width:22px;height:22px;
  border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;
  transition:all .15s}
.fav-dot.faved{background:rgba(201,169,110,.25);border-color:var(--accent);color:var(--accent)}
.mini-info{padding:.55rem .65rem}
.mini-title{font-size:.79rem;font-weight:600;color:var(--ink);line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-meta{font-size:.69rem;color:var(--ink3);margin-top:2px}

/* ── CONTINUE LIST ── */
.continue-list{padding:0 1rem}
.continue-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .6rem;
  border-radius:var(--rsm);cursor:pointer;transition:background .2s}
.continue-item:hover{background:var(--s1)}
.c-thumb{width:46px;height:46px;border-radius:var(--rsm);display:flex;align-items:center;
  justify-content:center;font-size:1.45rem;background:var(--s2);flex-shrink:0;overflow:hidden;position:relative}
.c-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.c-info{flex:1;min-width:0}
.c-title{font-size:.84rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:.73rem;color:var(--ink3);margin-top:1px}

/* ── SEARCH RESULTS ── */
.search-wrap{padding:.7rem 1rem .3rem}
.search-bar{display:flex;align-items:center;gap:.6rem;padding:.65rem .95rem;
  background:var(--s1);border:1px solid var(--border);border-radius:99px;transition:border-color .2s}
.search-bar:focus-within{border-color:var(--border2)}
.search-bar svg{width:16px;height:16px;stroke:var(--ink3);fill:none;stroke-width:2;flex-shrink:0}
.search-bar input{flex:1;background:none;border:none;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
.search-bar input::placeholder{color:var(--ink3)}
.search-clear{cursor:pointer;color:var(--ink3);font-size:1rem;line-height:1;flex-shrink:0;display:none}
.search-results{padding:0 1rem}
.search-empty{padding:3rem 1rem;text-align:center;color:var(--ink3);font-size:.9rem}
.search-result-item{display:flex;align-items:center;gap:.75rem;padding:.7rem .5rem;
  border-radius:var(--rsm);cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--s1)}
.sr-cover{width:44px;height:44px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:.85rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:.73rem;color:var(--ink3);margin-top:2px}
.sr-type{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:99px;background:var(--s2);color:var(--ink3);flex-shrink:0}

/* ── DETAIL ── */
.detail-header{display:flex;flex-direction:column;align-items:center;padding:1.3rem 1rem .5rem;gap:.9rem}
.detail-cover{width:clamp(110px,38vw,160px);aspect-ratio:2/3;height:auto;border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;font-size:4.8rem;border:1px solid var(--border2);position:relative;overflow:hidden}
.detail-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:var(--r)}
.detail-cover span{position:relative;z-index:1}
.detail-info{text-align:center}
.detail-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;line-height:1.2;margin-bottom:.28rem}
.detail-author{font-size:.88rem;color:var(--ink2)}
.detail-actions{display:flex;gap:.6rem;justify-content:center;margin-top:.4rem;flex-wrap:wrap}
.action-btn{padding:.5rem 1rem;border-radius:99px;background:var(--s1);border:1px solid var(--border2);
  color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.35rem}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.action-btn.primary:hover{background:var(--accent2)}
.action-btn.faved{background:rgba(201,169,110,.15);border-color:var(--accent);color:var(--accent)}
.detail-stats{text-align:center;font-size:.78rem;color:var(--ink3);margin-top:.4rem}

/* ── EPISODE LIST ── */
.episode-list{padding:0 .8rem}
.ep-item{display:flex;align-items:center;gap:.7rem;padding:.85rem .5rem;
  border-radius:var(--rsm);cursor:pointer;transition:background .18s;
  border-bottom:1px solid var(--border)}
.ep-item:last-of-type{border-bottom:none}
.ep-item:hover{background:var(--s1)}
.ep-item.open{background:var(--adim)}
.ep-num{font-family:'DM Mono',monospace;font-size:.73rem;color:var(--ink3);width:28px;text-align:center;flex-shrink:0}
.ep-info{flex:1;min-width:0}
.ep-title{font-size:.88rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-meta{font-size:.72rem;color:var(--ink3);margin-top:2px;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.ep-actions{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.ep-fav{width:28px;height:28px;border-radius:50%;background:transparent;border:1px solid var(--border2);
  color:var(--ink3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;flex-shrink:0}
.ep-fav:hover,.ep-fav.faved{border-color:var(--accent);color:var(--accent)}
.ep-play{width:34px;height:34px;border-radius:50%;background:var(--adim);border:1px solid var(--accent);
  color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.ep-play:hover,.ep-play.active{background:var(--accent);color:#000}
.ep-play svg{width:12px;height:12px;fill:currentColor}

/* ── APUNTE EXPANDIBLE inline ── */
.apunte-wrap{overflow:hidden;max-height:0;transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .25s}
.apunte-wrap.open{max-height:9999px}
.apunte-inner{background:var(--s1);border-top:1px solid var(--border2);
  margin:0 .3rem;border-radius:0 0 var(--rsm) var(--rsm);padding:1.3rem 1.1rem 1.4rem}
.apunte-inner h1{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:900;color:var(--ink);margin-bottom:.4rem}
.apunte-inner .subtitle{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--ink3);
  letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:1.2rem;
  padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.apunte-inner h2{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--accent);margin:1.3rem 0 .55rem}
.apunte-inner h3{font-size:.9rem;font-weight:600;color:var(--ink);margin:.9rem 0 .4rem}
.apunte-inner p{font-size:.875rem;line-height:1.75;color:var(--ink2);margin-bottom:.7rem}
.apunte-inner ul,.apunte-inner ol{margin:.5rem 0 .8rem 1.3rem}
.apunte-inner li{font-size:.875rem;line-height:1.7;color:var(--ink2);margin-bottom:.25rem}
.apunte-inner strong{color:var(--ink);font-weight:600}
.apunte-inner em{color:var(--ink2);font-style:italic}
.apunte-inner code{font-family:'DM Mono',monospace;background:rgba(201,169,110,.09);padding:2px 7px;border-radius:4px;font-size:.85em;color:var(--accent2)}
.apunte-inner table{width:100%;border-collapse:collapse;margin:.9rem 0;font-size:.8rem;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--rsm)}
.apunte-inner th{background:var(--s2);color:var(--ink);padding:.6rem .75rem;text-align:left;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border2)}
.apunte-inner td{padding:.55rem .75rem;border-bottom:1px solid var(--border);color:var(--ink2);font-size:.82rem}
.apunte-inner tr:last-child td{border-bottom:none}
.def-box{background:rgba(139,157,195,.07);border-left:3px solid #8b9dc3;padding:.75rem .9rem;margin:.85rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.86em;line-height:1.65;color:var(--ink2)}
.thm-box{background:rgba(123,165,135,.07);border-left:3px solid #7ba587;padding:.75rem .9rem;margin:.85rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.86em;line-height:1.65;color:var(--ink2)}
.ex-box{background:rgba(201,169,110,.07);border-left:3px solid var(--accent);padding:.75rem .9rem;margin:.85rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.86em;line-height:1.65;color:var(--ink2)}
.math-block{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.65rem 0;text-align:center;margin:.7rem 0}
.math-block .katex-display{margin:0;overflow-x:auto;overflow-y:hidden}

/* ── LIBRARY GRID (search) ── */
.lib-grid-section{padding:0 1rem 1.5rem}
.lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.lib-grid-card{cursor:pointer;border-radius:var(--rsm);overflow:hidden;
  background:var(--s1);border:1px solid var(--border);transition:all .2s;position:relative}
.lib-grid-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.lib-grid-card:active{transform:scale(.96)}
.lib-grid-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;
  justify-content:center;font-size:1.8rem;position:relative;overflow:hidden}
.lib-grid-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.lib-grid-cover span{position:relative;z-index:1}
.lib-grid-info{padding:.35rem .4rem .45rem}
.lib-grid-name{font-size:.67rem;font-weight:600;color:var(--ink);line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lib-grid-auth{font-size:.58rem;color:var(--ink3);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── FAVS VIEW ── */
.favs-empty{padding:3rem 1rem;text-align:center;color:var(--ink3);font-size:.9rem}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-around;padding:.45rem .8rem env(safe-area-inset-bottom,.45rem);
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  color:var(--ink3);transition:color .2s;padding:.28rem .5rem}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2}
.nav-label{font-size:9.5px;font-weight:500;letter-spacing:.04em}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ══════════════════════════════════════
   BOOK READER VIEW
══════════════════════════════════════ */
#reader-view{position:fixed;inset:0;z-index:200;background:#0f0e0c;display:none;flex-direction:column;-webkit-user-select:none;user-select:none}
#reader-view.active{display:flex}
.reader-topbar{height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(10,9,7,.97);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(16px);z-index:2}
.reader-title{font-family:'Playfair Display',serif;font-size:.88rem;font-style:italic;color:var(--accent);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px}
.reader-btn{width:32px;height:32px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:rgba(240,236,228,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.reader-btn:hover{background:rgba(201,169,110,.12);border-color:var(--accent);color:var(--accent)}
.reader-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.reader-page-ct{font-size:.62rem;color:rgba(240,236,228,.35);min-width:62px;text-align:center;flex-shrink:0;font-family:'DM Mono',monospace;letter-spacing:.04em}
/* Stage */
.reader-stage{flex:1;position:relative;overflow:hidden;background:#0f0e0c;display:flex;align-items:center;justify-content:center}
#r-book{position:absolute;inset:0;overflow:hidden}
/* Pages: absolutely positioned, full stage */
.rpage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0f0e0c;will-change:transform,opacity}
.rpage img{max-width:100%;max-height:100%;object-fit:contain;display:block;pointer-events:none;border-radius:1px;box-shadow:0 2px 24px rgba(0,0,0,.8)}
/* Slide animations — fast, no jank */
@keyframes slideOutL{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-4%)}}
@keyframes slideOutR{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(4%)}}
@keyframes slideInR  {0%{opacity:0;transform:translateX(3%)} 100%{opacity:1;transform:translateX(0)}}
@keyframes slideInL  {0%{opacity:0;transform:translateX(-3%)}100%{opacity:1;transform:translateX(0)}}
.rpage.out-left {animation:slideOutL .14s ease-out forwards;z-index:2}
.rpage.out-right{animation:slideOutR .14s ease-out forwards;z-index:2}
.rpage.in-right {animation:slideInR  .14s ease-out forwards;z-index:1}
.rpage.in-left  {animation:slideInL  .14s ease-out forwards;z-index:1}
/* Loading */
.rpage-loading{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.r-spinner{width:26px;height:26px;border:2.5px solid rgba(201,169,110,.12);border-top-color:var(--accent);border-radius:50%;animation:rspin .65s linear infinite}
@keyframes rspin{to{transform:rotate(360deg)}}
/* Tap zones */
.reader-zone-prev{position:absolute;left:0;top:0;bottom:0;width:33%;z-index:10;cursor:w-resize}
.reader-zone-next{position:absolute;right:0;top:0;bottom:0;width:33%;z-index:10;cursor:e-resize}
/* Controls */
.reader-controls{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(10,9,7,.97);border-top:1px solid rgba(255,255,255,.06);backdrop-filter:blur(16px);padding:10px 18px env(safe-area-inset-bottom,10px)}
.reader-track{width:100%;max-width:480px;height:4px;background:rgba(255,255,255,.08);border-radius:99px;cursor:pointer;position:relative;touch-action:none}
.reader-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .12s;position:relative;pointer-events:none}
.reader-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 3px rgba(201,169,110,.18)}
.reader-btns{display:flex;align-items:center;gap:10px}
.reader-nav-btn{display:flex;align-items:center;gap:5px;padding:8px 20px;border-radius:99px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(240,236,228,.55);font-family:'DM Mono',monospace;font-size:.67rem;letter-spacing:.07em;cursor:pointer;transition:background .12s,border-color .12s,color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.reader-nav-btn:active{background:rgba(201,169,110,.14);border-color:var(--accent);color:var(--accent)}
.reader-nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#0c0b09;font-weight:600}
.reader-nav-btn.primary:active{background:var(--accent2)}
.reader-nav-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
/* goto modal */
#reader-goto{position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
#reader-goto.open{display:flex}
.goto-box{background:#1c1a16;border:1px solid rgba(201,169,110,.22);border-radius:14px;padding:24px 28px;width:min(300px,88vw);display:flex;flex-direction:column;gap:14px;animation:gotoIn .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes gotoIn{from{opacity:0;transform:scale(.9)}}
.goto-title{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:var(--accent);text-align:center}
.goto-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:'DM Mono',monospace;font-size:.88rem;outline:none;text-align:center;width:100%;transition:border-color .2s}
.goto-input:focus{border-color:var(--accent)}
.goto-row{display:flex;gap:8px}
.goto-btn{flex:1;padding:9px;border-radius:7px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.73rem;letter-spacing:.05em;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.05);color:rgba(240,236,228,.5);transition:all .2s}
.goto-btn.ok{background:var(--accent);border-color:var(--accent);color:#0c0b09;font-weight:500}
.goto-hint{font-size:.6rem;color:rgba(240,236,228,.3);text-align:center;letter-spacing:.06em}
</style>

<body>

<!-- TOP BAR -->
<header class="top-bar">
  <div class="tb-left" id="tb-left">

══════════════════════════════════════════ */
const allBooks = LIBRARY.flatMap(c => c.books);
const allTracks = allBooks.flatMap(b => b.tracks.map(t => ({ ...t, bookId: b.id, bookTitle: b.title, bookEmoji: b.emoji, bookCover: b.cover })));

let state = {
  view: 'home',
  prevView: null,
  currentBookId: null,
  currentTrackKey: null,
  favorites: new Set(JSON.parse(localStorage.getItem('np_favs') || '[]')),
  openTracks: new Set(),
  // FIX 6: limit recent to 4
  recentTracks: JSON.parse(localStorage.getItem('np_recent') || '[]').slice(0, 4),
};

function saveFavs() { localStorage.setItem('np_favs', JSON.stringify([...state.favorites])); }
function addRecent(bookId, trackNum) {
  const key = trackKey(bookId, trackNum);
  // FIX 6: keep max 4 recent tracks
  state.recentTracks = [key, ...state.recentTracks.filter(k => k !== key)].slice(0, 4);
  localStorage.setItem('np_recent', JSON.stringify(state.recentTracks));
}
function trackKey(bookId, num) { return `${bookId}:${num}`; }
function isFav(key) { return state.favorites.has(key); }

/* ── FIX 4: Get cover URL from reader config (page 1 image) ── */
function getBookCoverUrl(bookId) {
  const cfg = READER_BOOKS[bookId];
  if (!cfg) return null;
  return cfg.base + cfg.prefix + '0001' + cfg.ext;
}

/* ══════════════════════════════════════════
   RENDER HOME
   FIX 6: "Continuar leyendo" at the TOP
══════════════════════════════════════════ */
function renderHome() {
  let html = '';

  // FIX 6: History section FIRST, max 4 items
  if (state.recentTracks.length > 0) {
    const recentItems = state.recentTracks.slice(0, 4).map(key => {
      const [bId, numStr] = key.split(':');
      const book = allBooks.find(b => b.id === bId);
      const track = book?.tracks.find(t => t.num === parseInt(numStr));
      return book && track ? { book, track } : null;
    }).filter(Boolean);

    if (recentItems.length > 0) {
      html += `
        <div class="section">
          <div class="section-header"><span class="section-title">Continuar leyendo</span></div>
          <div class="continue-list">
            ${recentItems.map(({ book: b, track: t }) => {
              const coverUrl = getBookCoverUrl(b.id);
              const thumbContent = coverUrl
                ? `<img src="${coverUrl}" alt="">`
                : b.emoji;
              return `
              <div class="continue-item" onclick="playTrack('${b.id}',${t.num})">
                <div class="c-thumb" style="background:${b.cover}">${thumbContent}</div>
                <div class="c-info">
                  <div class="c-title">${t.title}</div>
                  <div class="c-sub">${b.title} · ${b.author}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }
  }

  // FIX 2: Build library — favored books first in each carousel
  html += LIBRARY.map(cat => {
    // Sort books: faved ones first
    const sorted = [...cat.books].sort((a, b) => {
      const af = isFav(a.id) ? 0 : 1;
      const bf = isFav(b.id) ? 0 : 1;
      return af - bf;
    });

    return `
    <div class="section">
      <div class="section-header">
        <span class="section-title">${cat.label}</span>
      </div>
      <div class="hscroll">
        ${sorted.map(b => {
          const coverUrl = getBookCoverUrl(b.id);
          return `
          <div class="mini-card" onclick="openDetail('${b.id}')">
            <div class="mini-cover" style="background:${b.cover}">
              ${coverUrl ? `<img src="${coverUrl}" alt="${b.title}">` : `<span>${b.emoji}</span>`}
              <div class="fav-dot ${isFav(b.id)?'faved':''}" onclick="event.stopPropagation();toggleFavBook('${b.id}',this)">
                ${isFav(b.id)?'★':'☆'}
              </div>
            </div>
            <div class="mini-info">
              <div class="mini-title">${b.title}</div>
              <div class="mini-meta">${b.author}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('home').innerHTML = html;
}

  state.openTracks.clear();

  setTopBar(book.title, true);

  const coverInner = coverUrl
    ? `<img src="${coverUrl}" alt="${book.title}">`
    : `<span>${book.emoji}</span>`;

  let html = `
    <div class="detail-header">
      <div class="detail-cover" style="background:${book.cover}" id="detail-cover-${book.id}">
        ${coverInner}
      </div>
      <div class="detail-info">
        <div class="detail-title">${book.title}</div>
        <div class="detail-author">${book.author} · ${book.pages} páginas</div>
      </div>
      <div class="detail-actions">
        <button class="action-btn ${isFav(book.id)?'faved':''}" id="fav-btn" onclick="toggleFavBook('${book.id}',this,true)">

          Leer

function renderTrackItem(book, t, key) {
  return `
    <div id="wrap-${book.id}-${t.num}">
      <div class="ep-item" id="ep-${book.id}-${t.num}" onclick="playTrack('${book.id}',${t.num})">

          <button class="ep-play" id="epplay-${book.id}-${t.num}" onclick="event.stopPropagation();playTrack('${book.id}',${t.num})">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>

/* ══════════════════════════════════════════
   FIX 7: TOGGLE track — expand AND collapse
══════════════════════════════════════════ */
function playTrack(bookId, num) {
  const book = allBooks.find(b => b.id === bookId);
  const track = book?.tracks.find(t => t.num === num);
  if (!book || !track) return;

  const key = trackKey(bookId, num);

  // If not on this book's detail, open it first then expand
  if (state.view !== 'detail' || state.currentBookId !== bookId) {
    state.currentBookId = bookId;
    addRecent(bookId, num);
    openDetail(bookId, false);
    setTimeout(() => expandTrack(bookId, num, book, track), 200);
    return;
  }

  state.currentBookId = bookId;
  addRecent(bookId, num);

  const wrap = document.getElementById(`apunte-${bookId}-${num}`);
  if (!wrap) return;

  const isOpen = wrap.classList.contains('open');

  if (isOpen) {
    // FIX 7: Collapse if already open
    collapseTrack(bookId, num);
  } else {
    // Close any other open track first
    closeAllTracks(bookId, num);
    expandTrack(bookId, num, book, track);
  }

  state.currentTrackKey = isOpen ? null : key;
}

function expandTrack(bookId, num, book, track) {
  if (!book) book = allBooks.find(b => b.id === bookId);
  if (!track) track = book?.tracks.find(t => t.num === num);
  if (!book || !track) return;

  const wrap = document.getElementById(`apunte-${bookId}-${num}`);
  const epEl = document.getElementById(`ep-${bookId}-${num}`);
  const ai = document.getElementById(`ai-${bookId}-${num}`);
  if (!wrap) return;

  epEl?.classList.add('open');
  wrap.classList.add('open');

  if (!ai.dataset.rendered) {
    ai.innerHTML = track.latex;
    ai.dataset.rendered = '1';
    renderKaTeX(ai);
  }

  setTimeout(() => epEl?.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
}

function collapseTrack(bookId, num) {
  const wrap = document.getElementById(`apunte-${bookId}-${num}`);
  const epEl = document.getElementById(`ep-${bookId}-${num}`);
  if (!wrap) return;
  wrap.classList.remove('open');
  epEl?.classList.remove('open');
}

function closeAllTracks(exceptBookId, exceptNum) {
  // Close all currently open tracks in the detail view
  document.querySelectorAll('.apunte-wrap.open').forEach(el => {
    el.classList.remove('open');
  });
  document.querySelectorAll('.ep-item.open').forEach(el => {
    el.classList.remove('open');
  });
}

function buildLibraryGrid() {
  const sorted = [...allBooks].sort((a, b) => a.title.localeCompare(b.title, 'es'));
  const cards = sorted.map(b => {
    const cu = getBookCoverUrl(b.id);
    return `
      <div class="lib-grid-card" onclick="openDetail('${b.id}')">
        <div class="lib-grid-cover" style="background:${b.cover}">
          ${cu ? `<img src="${cu}" alt="">` : `<span>${b.emoji}</span>`}
        </div>
        <div class="lib-grid-info">
          <div class="lib-grid-name">${b.title}</div>
          <div class="lib-grid-auth">${b.author.split('·')[0].trim()}</div>
        </div>
      </div>`;
  }).join('');
  return `<div class="lib-grid">${cards}</div>`;
}

function showSearch(skipHistory) {
  setTopBar('Buscar', true);
  document.getElementById('search-view').innerHTML = `
    <div class="search-wrap">
      <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Buscar libros, temas, materias..." autofocus oninput="doSearch(this.value)">
        <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
      </div>
    </div>
    <div class="search-results" id="search-results" style="display:none">
      <div class="search-empty">Escribe para buscar en tu biblioteca</div>
    </div>
    <div class="lib-grid-section" id="library-grid">
      ${buildLibraryGrid()}
    </div>`;
  showView('search-view', skipHistory);
  setTimeout(() => document.getElementById('search-input')?.focus(), 100);
}

function doSearch(q) {
  const clear = document.getElementById('search-clear');
  const res = document.getElementById('search-results');
  const grid = document.getElementById('library-grid');
  if (clear) clear.style.display = q ? 'block' : 'none';

  if (!q.trim()) {
    // Show grid, hide results
    if (res) res.style.display = 'none';
    if (grid) grid.style.display = 'block';
    return;
  }

  // Show results, hide grid
  if (res) res.style.display = 'block';
  if (grid) grid.style.display = 'none';

  const qL = q.toLowerCase();
  let matches = [];
  allBooks.forEach(b => {
    if (b.title.toLowerCase().includes(qL)) matches.push({ type:'book', bookId:b.id, title:b.title, sub:b.author, emoji:b.emoji, cover:b.cover });
    b.tracks.forEach(t => {
      if (t.title.toLowerCase().includes(qL) || t.sub.toLowerCase().includes(qL))
        matches.push({ type:'track', bookId:b.id, num:t.num, title:t.title, sub:`${b.title} · ${t.sub}`, emoji:b.emoji, cover:b.cover });
    });
  });

  if (!matches.length) { res.innerHTML = `<div class="search-empty">Sin resultados para "<strong>${q}</strong>"</div>`; return; }

  res.innerHTML = matches.map(m => `
    <div class="search-result-item" onclick="${m.type==='book'?`openDetail('${m.bookId}')`:`playTrack('${m.bookId}',${m.num})`}">
      <div class="sr-cover" style="background:${m.cover}">${m.emoji}</div>
      <div class="sr-info">
        <div class="sr-title">${m.title}</div>
        <div class="sr-sub">${m.sub}</div>
      </div>
      <span class="sr-type">${m.type==='book'?'Libro':'Tema'}</span>
    </div>`).join('');
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  if (inp) { inp.value = ''; inp.focus(); }
  const clear = document.getElementById('search-clear');
  if (clear) clear.style.display = 'none';
  const res = document.getElementById('search-results');
  const grid = document.getElementById('library-grid');
  if (res) res.style.display = 'none';
  if (grid) grid.style.display = 'block';
}

   FIX 2: Re-render home so favs bubble to front
══════════════════════════════════════════ */
function toggleFavBook(bookId, el, isText) {
  if (isFav(bookId)) state.favorites.delete(bookId);
  else state.favorites.add(bookId);
  saveFavs();
  if (el) {
    el.classList.toggle('faved', isFav(bookId));
    if (isText) el.textContent = isFav(bookId) ? '★ Guardado' : '☆ Guardar';
    else el.textContent = isFav(bookId) ? '★' : '☆';
  }
  updateNavFavBadge();
  // FIX 2: Re-render home so the carousel order updates
  if (state.view === 'home') renderHome();
}

function toggleFavTrack(bookId, num, el) {
  const key = trackKey(bookId, num);
  if (isFav(key)) state.favorites.delete(key);
  else state.favorites.add(key);
  saveFavs();
  if (el) { el.classList.toggle('faved', isFav(key)); el.textContent = isFav(key)?'★':'☆'; }
}

function updateNavFavBadge() {
  const icon = document.getElementById('nav-fav-icon');
  if (icon) icon.style.fill = state.favorites.size ? 'var(--accent)' : 'none';
}

function showFavs(skipHistory) {
  setTopBar('Favoritos', false);
  const favBooks = allBooks.filter(b => isFav(b.id));
  const favTracks = allTracks.filter(t => isFav(trackKey(t.bookId, t.num)));

  let html = '';
  if (!favBooks.length && !favTracks.length) {
    html = '<div class="favs-empty">Aún no tienes favoritos.<br>Guarda libros o temas con ♡</div>';
  } else {
    if (favBooks.length) {
      html += `<div class="section"><div class="section-header"><span class="section-title">Libros guardados</span></div>
        <div class="hscroll">${favBooks.map(b=>{
          const cu = getBookCoverUrl(b.id);
          return `<div class="mini-card" onclick="openDetail('${b.id}')">
            <div class="mini-cover" style="background:${b.cover}">${cu?`<img src="${cu}" alt="">`:`<span>${b.emoji}</span>`}</div>
            <div class="mini-info"><div class="mini-title">${b.title}</div><div class="mini-meta">${b.author}</div></div>
          </div>`;
        }).join('')}</div></div>`;
    }
    if (favTracks.length) {
      html += `<div class="section"><div class="section-header"><span class="section-title">Temas guardados</span></div>
        <div class="continue-list">${favTracks.map(t=>`
          <div class="continue-item" onclick="openDetail('${t.bookId}')">
            <div class="c-thumb" style="background:${t.bookCover}">${t.bookEmoji}</div>
            <div class="c-info"><div class="c-title">${t.title}</div><div class="c-sub">${t.bookTitle} · ${t.sub}</div></div>
          </div>`).join('')}
        </div></div>`;
    }
  }
  document.getElementById('favs-view').innerHTML = html;
  showView('favs-view', skipHistory);
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function showView(id, skipHistory) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  state.prevView = state.view;
  state.view = id;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.nav === id);
  });
  // FIX 1: Always scroll to top when switching views
  window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
  if (!skipHistory) {
    history.pushState({ view: id, bookId: state.currentBookId }, '', '#' + id);
  }
}

function setTopBar(title, showBack) {
  document.getElementById('tb-left').style.display = showBack ? 'none' : 'flex';
  document.getElementById('tb-back').style.display = showBack ? 'flex' : 'none';
  document.getElementById('tb-title').textContent = title;
}

function navBack() {
  const prev = state.prevView || 'home';
  if (prev === 'home' || prev === state.view) { goHome(); return; }
  showView(prev, true);
  if (prev === 'home') setTopBar('', false);
  else if (prev === 'detail') {
    const book = allBooks.find(b => b.id === state.currentBookId);
    setTopBar(book?.title || '', true);
  } else setTopBar('', false);
}

function goHome() {
  setTopBar('', false);
  renderHome();
  showView('home', true);
  history.replaceState({ view: 'home' }, '', '#home');
}

/* ══════════════════════════════════════════
   KATEX
══════════════════════════════════════════ */
function renderKaTeX(el) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
        throwOnError:false, strict:false, trust:true
      });
    } catch(e) { console.warn('KaTeX error', e); }
  } else {
    setTimeout(() => renderKaTeX(el), 150);
  }
}

/* PDF.js not needed — covers loaded via fetch+blob */

/* ══════════════════════════════════════════
   BOOK READER ENGINE
   Optimizations:
   1. fetch() + createObjectURL → parallel download, no browser re-request
   2. Adjacent pages pre-fetched into blob pool (radius 4 each side)
   3. DOM pool: keeps prev/curr/next img elements alive in #r-book (hidden)
   4. Slide animation replaces 3D flip → no GPU layer creation per page
   5. Rapid-click queue: never blocks, queues direction steps
   6. Long-press on buttons → accelerating auto-scroll
   7. Android back gesture → closes reader via popstate
══════════════════════════════════════════ */
const R = {
  bookId: null, total: 0, current: 1,
  base: '', prefix: '', ext: '.jpg',
  // blob URL cache: n → objectURL string
  blobs: {},
  // pending fetch promises: n → Promise<string>
  fetching: {},
  // rapid-nav queue
  queue: 0, processing: false,
  // long-press
  fastTimer: null, fastInterval: null,
};

const READER_BOOKS = {
  'bib_as1_cardenas': {
    base: 'https://raw.githubusercontent.com/Usisima/Libros/main/as1_Cardenas/',
    prefix: 'Cardenas-Algebra-superior_page-',
    ext: '.jpg', total: 327,
  },
  'bib_an1_apostol': {
    base: 'https://raw.githubusercontent.com/Usisima/Libros/main/an1_Apostol/',
    prefix: 'Apostol-Analisis-Matematico_page-',
    ext: '.jpg', total: 606,
  }
};

function rUrl(n) {
  return R.base + R.prefix + String(n).padStart(4,'0') + R.ext;
}

/* Fetch page n into blob cache. Returns promise of blob URL. */
function rFetch(n) {
  if (n < 1 || n > R.total) return Promise.resolve(null);
  if (R.blobs[n]) return Promise.resolve(R.blobs[n]);
  if (R.fetching[n]) return R.fetching[n];
  const p = fetch(rUrl(n))
    .then(r => r.ok ? r.blob() : null)
    .then(blob => {
      if (!blob) return null;
      const url = URL.createObjectURL(blob);
      R.blobs[n] = url;
      delete R.fetching[n];
      return url;
    })
    .catch(() => { delete R.fetching[n]; return null; });
  R.fetching[n] = p;
  return p;
}

/* Pre-fetch pages around n, high priority for n itself */
function rPrefetch(n, radius) {
  rFetch(n); // highest priority
  for (let d = 1; d <= radius; d++) {
    rFetch(n + d);
    rFetch(n - d);
  }
}

/* Evict blob URLs far from current page to free memory */
function rEvict(current, keep) {
  Object.keys(R.blobs).forEach(k => {
    const pg = +k;
    if (Math.abs(pg - current) > keep) {
      URL.revokeObjectURL(R.blobs[pg]);
      delete R.blobs[pg];
    }
  });
}

function openReader(bookId) {
  const cfg = READER_BOOKS[bookId];
  if (!cfg) { openPdf(bookId); return; }
  R.bookId = bookId;
  R.base = cfg.base; R.prefix = cfg.prefix; R.ext = cfg.ext; R.total = cfg.total;
  R.current = parseInt(localStorage.getItem('reader_pg_' + bookId) || '1');
  R.blobs = {}; R.fetching = {}; R.queue = 0; R.processing = false;

  const book = allBooks.find(b => b.id === bookId);
  document.getElementById('r-title').textContent = book?.title || bookId;
  document.getElementById('goto-hint').textContent = 'Total: ' + R.total + ' páginas';
  document.getElementById('goto-inp').max = R.total;

  document.getElementById('reader-view').classList.add('active');
  history.pushState({ view: 'reader', bookId }, '', '#reader');

  // Fetch current page first, then neighbors
  rPrefetch(R.current, 4);
  rShowPage(R.current, null);
  rSetupInteractions();
}

function openPdf(bookId) {
  const book = allBooks.find(b => b.id === bookId);
  if (!book?.pdfUrl) return;
  window.open(book.pdfUrl, '_blank');
}

function closeReader() {
  rStopFast();
  document.getElementById('reader-view').classList.remove('active');
  if (location.hash === '#reader') history.back();
}

/* Show page n with optional slide direction ('fwd' | 'bk' | null) */
function rShowPage(n, dir) {
  const bookEl = document.getElementById('r-book');

  // Create new page div
  const div = document.createElement('div');
  div.className = 'rpage';

  const blobUrl = R.blobs[n];
  if (blobUrl) {
    // Image already in cache → instant display
    const img = document.createElement('img');
    img.src = blobUrl; img.draggable = false; img.decoding = 'async';
    div.appendChild(img);
    rSwapPage(bookEl, div, dir);
  } else {
    // Show spinner while fetching
    const sp = document.createElement('div');
    sp.className = 'rpage-loading';
    sp.innerHTML = '<div class="r-spinner"></div>';
    div.appendChild(sp);
    rSwapPage(bookEl, div, dir);
    rFetch(n).then(url => {
      if (!url) return;
      // Only update if we're still on this page
      if (R.current !== n) return;
      const img = document.createElement('img');
      img.src = url; img.draggable = false; img.decoding = 'async';
      sp.replaceWith(img);
    });
  }

  rUpdateUI();
  rPrefetch(n, 4);
  rEvict(n, 8);
}

function rSwapPage(bookEl, newDiv, dir) {
  const old = bookEl.querySelector('.rpage');
  if (!old || !dir) {
    // No animation
    bookEl.innerHTML = '';
    bookEl.appendChild(newDiv);
    return;
  }
  // Animate: old slides out, new slides in
  const outClass = dir === 'fwd' ? 'out-left' : 'out-right';
  const inClass  = dir === 'fwd' ? 'in-right'  : 'in-left';
  old.classList.add(outClass);
  newDiv.classList.add(inClass);
  bookEl.appendChild(newDiv);
  // Remove old after animation
  old.addEventListener('animationend', () => old.remove(), { once: true });
}

/* ── Queue-based rapid navigation ── */
function rNext() { rEnqueue(+1); }
function rPrev() { rEnqueue(-1); }

function rEnqueue(step) {
  const target = R.current + R.queue + step;
  if (target < 1 || target > R.total) return;
  R.queue += step;
  if (!R.processing) rFlushQueue();
}

function rFlushQueue() {
  if (R.queue === 0) { R.processing = false; return; }
  R.processing = true;
  const step = R.queue > 0 ? 1 : -1;
  R.queue -= step;
  const next = R.current + step;
  if (next < 1 || next > R.total) { R.queue = 0; R.processing = false; return; }
  R.current = next;
  localStorage.setItem('reader_pg_' + R.bookId, R.current);
  // Animate only if not rapidly skipping (queue draining fast)
  const dir = step > 0 ? 'fwd' : 'bk';
  rShowPage(R.current, Math.abs(R.queue) > 2 ? null : dir);
  // Flush remaining queue after a brief pause
  setTimeout(rFlushQueue, R.queue !== 0 ? 60 : 0);
}

function rGoTo(n) {
  rStopFast();
  R.queue = 0; R.processing = false;
  const t = Math.max(1, Math.min(R.total, n));
  if (t === R.current) return;
  const dir = t > R.current ? 'fwd' : 'bk';
  R.current = t;
  localStorage.setItem('reader_pg_' + R.bookId, R.current);
  rShowPage(R.current, dir);
}

function rUpdateUI() {
  document.getElementById('r-counter').textContent = 'p. ' + R.current + ' / ' + R.total;
  const pct = R.total > 1 ? ((R.current - 1) / (R.total - 1)) * 100 : 0;
  document.getElementById('r-fill').style.width = pct + '%';
}

/* ── Long-press: accelerating repeat ── */
function rStartFast(dir) {
  rStopFast();
  dir > 0 ? rNext() : rPrev();
  let speed = 300;
  function repeat() {
    dir > 0 ? rNext() : rPrev();
    speed = Math.max(60, speed - 30);
    R.fastTimer = setTimeout(repeat, speed);
  }
  R.fastTimer = setTimeout(repeat, 450);
}
function rStopFast() {
  clearTimeout(R.fastTimer); clearInterval(R.fastInterval);
  R.fastTimer = null; R.fastInterval = null;
}

/* ── Interactions (set up once) ── */
let _rInteractionsSetup = false;
function rSetupInteractions() {
  if (_rInteractionsSetup) return;
  _rInteractionsSetup = true;

  // Progress bar scrub
  const track = document.getElementById('r-track');
  track.addEventListener('click', e => {
    const ratio = e.offsetX / track.offsetWidth;
    rGoTo(Math.round(1 + ratio * (R.total - 1)));
  });
  // Touch scrub on bar
  track.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = track.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
    rGoTo(Math.round(1 + ratio * (R.total - 1)));
  }, { passive: false });

  // Swipe on stage
  const stage = document.getElementById('r-stage');
  let sx = 0, sy = 0, moved = false;
  stage.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; moved = false; }, { passive: true });
  stage.addEventListener('touchmove', () => { moved = true; }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 36) {
      dx < 0 ? rNext() : rPrev();
    }
  });

  // Long-press on nav buttons
  const prevBtn = document.getElementById('r-prev-btn');
  const nextBtn = document.getElementById('r-next-btn');
  ['mousedown','touchstart'].forEach(ev => {
    prevBtn?.addEventListener(ev, e => { if(ev==='touchstart')e.preventDefault(); rStartFast(-1); }, { passive: false });
    nextBtn?.addEventListener(ev, e => { if(ev==='touchstart')e.preventDefault(); rStartFast(+1); }, { passive: false });
  });
  ['mouseup','touchend','mouseleave','touchcancel'].forEach(ev => {
    prevBtn?.addEventListener(ev, rStopFast);
    nextBtn?.addEventListener(ev, rStopFast);
  });

  // Tap zones
  document.querySelector('.reader-zone-prev')?.addEventListener('click', rPrev);
  document.querySelector('.reader-zone-next')?.addEventListener('click', rNext);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!document.getElementById('reader-view').classList.contains('active')) return;
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); rNext(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); rPrev(); }
    if (e.key === 'Escape') { closeGoto(); closeReader(); }
    if (e.key === 'g') readerGoto();
  });
}

function readerGoto() {
  document.getElementById('goto-inp').value = R.current;
  document.getElementById('reader-goto').classList.add('open');
  setTimeout(() => document.getElementById('goto-inp').focus(), 100);
}
function closeGoto() { document.getElementById('reader-goto').classList.remove('open'); }
function gotoConfirm() {
  const v = parseInt(document.getElementById('goto-inp').value);
  if (!isNaN(v)) rGoTo(v);
  closeGoto();
}

/* ══════════════════════════════════════════
   INIT — FIX 1: ensure scroll starts at top
══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  history.replaceState({ view: 'home' }, '', '#home');
  renderHome();
  updateNavFavBadge();
  // FIX 1: force scroll reset
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
});

window.addEventListener('popstate', (e) => {
  const data = e.state;
  if (!data) { goHome(); return; }
  const v = data.view || 'home';
  if (v === 'home') {
    setTopBar('', false);
    renderHome();
    showView('home', true);
  } else if (v === 'detail') {
    if (data.bookId) openDetail(data.bookId, true);
    else goHome();
  } else if (v === 'reader') {
    document.getElementById('reader-view').classList.remove('active');
  } else if (v === 'search-view') {
    showSearch(true);
  } else if (v === 'favs-view') {
    showFavs(true);
  } else {
    goHome();
  }
});
</script>
