<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NotePlayer · Podcast Matemático</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
--bg: #0a0a0f;
--s1: #12121a;
--s2: #1a1a24;
--s3: #222230;
--border: rgba(255, 255, 255, 0.06);
--border2: rgba(255, 255, 255, 0.1);
--ink: #f0ece4;
--ink2: rgba(240, 236, 228, 0.6);
--ink3: rgba(240, 236, 228, 0.35);
--accent: #c9a96e;
--accent2: #d4ba7c;
--accent-dim: rgba(201, 169, 110, 0.15);
--teal: #7ec8bc;
--teal-dim: rgba(126, 200, 188, 0.12);
--r: 16px;
--r-sm: 10px;
--ease: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
--player-h: 72px;
--nav-h: 64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

body {
font-family: 'DM Sans', system-ui, sans-serif;
background: var(--bg);
color: var(--ink);
min-height: 100vh;
-webkit-font-smoothing: antialiased;
overflow-x: hidden;
padding-bottom: calc(var(--player-h) + var(--nav-h) + 1rem);
}

.view { display: none; }
.view.active { display: block; }

/* ── TOP BAR ── */
.top-bar {
position: sticky;
top: 0;
z-index: 100;
padding: 0.9rem 1.2rem;
display: flex;
align-items: center;
justify-content: space-between;
gap: 0.8rem;
background: rgba(10, 10, 15, 0.9);
backdrop-filter: blur(20px);
border-bottom: 1px solid var(--border);
}

.top-bar-left { display: flex; align-items: center; gap: 0.6rem; }
.top-bar-right { display: flex; align-items: center; gap: 0.6rem; }

.icon-btn {
width: 38px; height: 38px;
border-radius: 50%;
background: transparent;
border: 1px solid var(--border2);
color: var(--ink2);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.2s;
flex-shrink: 0;
}

.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.avatar {
width: 38px; height: 38px;
border-radius: 50%;
background: linear-gradient(135deg, var(--accent-dim), var(--teal-dim));
border: 1px solid var(--border2);
display: flex;
align-items: center;
justify-content: center;
font-family: 'Playfair Display', serif;
font-size: 1rem;
font-weight: 900;
color: var(--accent);
cursor: pointer;
}

.logo-text {
font-family: 'Playfair Display', serif;
font-size: 1.2rem;
font-weight: 900;
color: var(--ink);
letter-spacing: -0.02em;
}

/* ── SEARCH BAR ── */
.search-bar {
margin: 0.8rem 1.2rem;
display: flex;
align-items: center;
gap: 0.6rem;
padding: 0.7rem 1rem;
background: var(--s1);
border: 1px solid var(--border);
border-radius: 99px;
}

.search-bar svg { width: 18px; height: 18px; stroke: var(--ink3); fill: none; stroke-width: 2; flex-shrink: 0; }

.search-bar input {
flex: 1;
background: none;
border: none;
color: var(--ink);
font-family: 'DM Sans', sans-serif;
font-size: 0.9rem;
outline: none;
}

.search-bar input::placeholder { color: var(--ink3); }

/* ── SECTION ── */
.section { margin: 1.5rem 0; }
.section-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 1.2rem;
margin-bottom: 0.8rem;
}

.section-title {
font-family: 'Playfair Display', serif;
font-size: 1.1rem;
font-weight: 700;
color: var(--ink);
letter-spacing: 0.02em;
}

.section-link {
font-size: 0.8rem;
color: var(--accent);
cursor: pointer;
font-weight: 500;
}

/* ── FEATURED CARD ── */
.featured-card {
margin: 0 1.2rem;
border-radius: var(--r);
overflow: hidden;
background: var(--s1);
border: 1px solid var(--border);
cursor: pointer;
transition: all 0.3s ease;
position: relative;
}

.featured-card:hover { border-color: var(--border2); transform: translateY(-2px); }

.featured-cover {
width: 100%;
aspect-ratio: 16/9;
display: flex;
align-items: center;
justify-content: center;
font-size: 4rem;
background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(126,200,188,0.08));
position: relative;
}

.featured-cover::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(0deg, rgba(10,10,15,0.8) 0%, transparent 60%);
}

.featured-cover span { position: relative; z-index: 1; }

.featured-badge {
position: absolute;
top: 1rem; left: 1rem;
z-index: 2;
font-family: 'DM Mono', monospace;
font-size: 9px;
padding: 4px 10px;
border-radius: 99px;
background: var(--accent);
color: #000;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
}

.featured-info {
padding: 1rem;
position: relative;
z-index: 2;
margin-top: -3rem;
}

.featured-title {
font-family: 'Playfair Display', serif;
font-size: 1.3rem;
font-weight: 700;
color: var(--ink);
line-height: 1.2;
margin-bottom: 0.4rem;
}

.featured-meta {
font-size: 0.8rem;
color: var(--ink2);
display: flex;
align-items: center;
gap: 0.5rem;
}

.featured-fav {
position: absolute;
top: 1rem; right: 1rem;
z-index: 2;
width: 36px; height: 36px;
border-radius: 50%;
background: rgba(0,0,0,0.4);
backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.2);
color: #fff;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.2s;
}

.featured-fav:hover { background: rgba(255,255,255,0.2); }
.featured-fav svg { width: 16px; height: 16px; }

/* ── HORIZONTAL SCROLL ── */
.hscroll {
display: flex;
gap: 0.8rem;
overflow-x: auto;
scroll-behavior: smooth;
padding: 0 1.2rem 0.5rem;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}

.hscroll::-webkit-scrollbar { display: none; }

/* ── MINI CARD ── */
.mini-card {
flex-shrink: 0;
width: 140px;
cursor: pointer;
border-radius: var(--r-sm);
overflow: hidden;
background: var(--s1);
border: 1px solid var(--border);
transition: all 0.2s;
}

.mini-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.mini-card:active { transform: scale(0.97); }

.mini-cover {
width: 100%;
aspect-ratio: 1/1;
display: flex;
align-items: center;
justify-content: center;
font-size: 2.5rem;
background: linear-gradient(135deg, rgba(201,169,110,0.08), rgba(126,200,188,0.05));
position: relative;
}

.mini-cover span { position: relative; z-index: 1; }

.mini-fav {
position: absolute;
top: 0.5rem; right: 0.5rem;
z-index: 2;
width: 28px; height: 28px;
border-radius: 50%;
background: rgba(0,0,0,0.5);
border: 1px solid rgba(255,255,255,0.15);
color: #fff;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
font-size: 12px;
}

.mini-info { padding: 0.6rem 0.7rem; }

.mini-title {
font-size: 0.8rem;
font-weight: 600;
color: var(--ink);
line-height: 1.2;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.mini-meta {
font-size: 0.7rem;
color: var(--ink3);
margin-top: 2px;
}

/* ── CONTINUE LIST ── */
.continue-list { padding: 0 1.2rem; }

.continue-item {
display: flex;
align-items: center;
gap: 0.8rem;
padding: 0.7rem;
border-radius: var(--r-sm);
cursor: pointer;
transition: background 0.2s;
}

.continue-item:hover { background: var(--s1); }

.continue-thumb {
width: 48px; height: 48px;
border-radius: var(--r-sm);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.5rem;
background: var(--s2);
flex-shrink: 0;
}

.continue-info { flex: 1; min-width: 0; }

.continue-title {
font-size: 0.85rem;
font-weight: 600;
color: var(--ink);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.continue-sub {
font-size: 0.75rem;
color: var(--ink3);
margin-top: 2px;
}

.continue-play {
width: 36px; height: 36px;
border-radius: 50%;
background: var(--accent-dim);
border: 1px solid var(--accent);
color: var(--accent);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
flex-shrink: 0;
transition: all 0.2s;
}

.continue-play:hover { background: var(--accent); color: #000; }
.continue-play svg { width: 14px; height: 14px; fill: currentColor; }

/* ── DETAIL VIEW ── */
.detail-header {
display: flex;
flex-direction: column;
align-items: center;
padding: 1.5rem 1.2rem;
gap: 1rem;
}

.detail-cover {
width: 180px; height: 180px;
border-radius: var(--r);
display: flex;
align-items: center;
justify-content: center;
font-size: 5rem;
background: linear-gradient(135deg, rgba(201,169,110,0.12), rgba(126,200,188,0.08));
border: 1px solid var(--border2);
position: relative;
overflow: hidden;
}

.detail-cover::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 55%);
}

.detail-cover span { position: relative; z-index: 1; }

.detail-info { text-align: center; }

.detail-title {
font-family: 'Playfair Display', serif;
font-size: 1.5rem;
font-weight: 900;
color: var(--ink);
line-height: 1.2;
margin-bottom: 0.3rem;
}

.detail-author { font-size: 0.9rem; color: var(--ink2); }

.detail-actions {
display: flex;
gap: 0.8rem;
justify-content: center;
margin-top: 0.5rem;
}

.action-btn {
padding: 0.6rem 1.2rem;
border-radius: 99px;
background: var(--s1);
border: 1px solid var(--border2);
color: var(--ink2);
font-family: 'DM Sans', sans-serif;
font-size: 0.8rem;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
gap: 0.4rem;
}

.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.action-btn.primary:hover { background: var(--accent2); }

.detail-stats {
text-align: center;
font-size: 0.8rem;
color: var(--ink3);
margin-top: 0.5rem;
}

/* ── EPISODE LIST ── */
.episode-list { padding: 0 1.2rem; }

.episode-item {
display: flex;
align-items: center;
gap: 0.8rem;
padding: 0.9rem 0.7rem;
border-radius: var(--r-sm);
cursor: pointer;
transition: background 0.2s;
border-bottom: 1px solid var(--border);
}

.episode-item:last-child { border-bottom: none; }
.episode-item:hover { background: var(--s1); }
.episode-item.active { background: var(--accent-dim); border-color: transparent; }

.ep-num {
font-family: 'DM Mono', monospace;
font-size: 0.75rem;
color: var(--ink3);
width: 32px;
text-align: center;
flex-shrink: 0;
}

.ep-info { flex: 1; min-width: 0; }

.ep-title {
font-size: 0.9rem;
font-weight: 600;
color: var(--ink);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.ep-meta {
font-size: 0.75rem;
color: var(--ink3);
margin-top: 2px;
display: flex;
gap: 0.5rem;
}

.ep-diff {
font-family: 'DM Mono', monospace;
font-size: 9px;
padding: 2px 8px;
border-radius: 99px;
}

.ep-play {
width: 36px; height: 36px;
border-radius: 50%;
background: var(--accent-dim);
border: 1px solid var(--accent);
color: var(--accent);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
flex-shrink: 0;
transition: all 0.2s;
}

.ep-play:hover { background: var(--accent); color: #000; }
.ep-play.playing { background: var(--accent); color: #000; animation: pulse-play 1.5s ease infinite; }

@keyframes pulse-play {
0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0.4); }
50% { box-shadow: 0 0 0 12px rgba(201,169,110,0); }
}

/* ── NOW PLAYING ── */
.now-playing {
display: flex;
flex-direction: column;
align-items: center;
padding: 2rem 1.5rem;
gap: 1.5rem;
min-height: 60vh;
justify-content: center;
}

.np-cover {
width: 260px; height: 260px;
border-radius: var(--r);
display: flex;
align-items: center;
justify-content: center;
font-size: 7rem;
background: linear-gradient(135deg, rgba(201,169,110,0.15), rgba(126,200,188,0.1));
border: 1px solid var(--border2);
position: relative;
overflow: hidden;
box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.np-cover::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 55%);
}

.np-cover span { position: relative; z-index: 1; }

.np-info { text-align: center; }

.np-title {
font-family: 'Playfair Display', serif;
font-size: 1.4rem;
font-weight: 700;
color: var(--ink);
margin-bottom: 0.3rem;
}

.np-author { font-size: 0.9rem; color: var(--ink2); }

/* Progress bar */
.progress-wrap { width: 100%; }

.progress-bar {
width: 100%;
height: 4px;
background: var(--s2);
border-radius: 99px;
overflow: hidden;
cursor: pointer;
position: relative;
}

.progress-fill {
height: 100%;
background: var(--accent);
border-radius: 99px;
transition: width 0.3s;
width: 35%;
}

.progress-times {
display: flex;
justify-content: space-between;
margin-top: 0.4rem;
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--ink3);
}

/* Waveform */
.waveform {
width: 100%;
height: 40px;
display: flex;
align-items: flex-end;
justify-content: center;
gap: 3px;
}

.wave-bar {
width: 3px;
background: var(--accent);
border-radius: 2px;
animation: wave 0.8s ease-in-out infinite alternate;
}

.wave-bar:nth-child(1) { height: 30%; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 60%; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 90%; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 70%; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 40%; animation-delay: 0.4s; }
.wave-bar:nth-child(6) { height: 80%; animation-delay: 0.5s; }
.wave-bar:nth-child(7) { height: 100%; animation-delay: 0.6s; }
.wave-bar:nth-child(8) { height: 50%; animation-delay: 0.7s; }
.wave-bar:nth-child(9) { height: 65%; animation-delay: 0.1s; }
.wave-bar:nth-child(10) { height: 35%; animation-delay: 0.3s; }

@keyframes wave {
from { height: 20%; }
to { height: 100%; }
}

/* Controls */
.controls {
display: flex;
align-items: center;
justify-content: center;
gap: 1.5rem;
}

.ctrl-btn {
width: 44px; height: 44px;
border-radius: 50%;
background: transparent;
border: 1px solid var(--border2);
color: var(--ink2);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.2s;
}

.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
.ctrl-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

.ctrl-play {
width: 64px; height: 64px;
border-radius: 50%;
background: var(--accent);
border: none;
color: #000;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.2s;
box-shadow: 0 8px 30px rgba(201,169,110,0.3);
}

.ctrl-play:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(201,169,110,0.4); }
.ctrl-play svg { width: 26px; height: 26px; fill: currentColor; }

.up-next {
text-align: center;
font-size: 0.8rem;
color: var(--accent);
cursor: pointer;
font-weight: 500;
margin-top: 0.5rem;
}

/* ── APUNTE EXPANDIBLE ── */
.apunte-body {
display: none;
background: var(--s1);
border: 1px solid var(--border);
border-radius: 0 0 var(--r-sm) var(--r-sm);
animation: apExpand 0.25s ease;
margin: 0 0.7rem;
}

.apunte-body.open { display: block; }

@keyframes apExpand {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}

.apunte-inner {
padding: 1.5rem;
font-size: 14px;
line-height: 1.7;
color: var(--ink2);
}

.apunte-inner h1 {
font-family: 'Playfair Display', serif;
font-size: 1.5rem;
font-weight: 900;
color: var(--ink);
margin-bottom: 0.5rem;
}

.apunte-inner .subtitle {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--ink3);
letter-spacing: 0.08em;
text-transform: uppercase;
display: block;
margin-bottom: 1.5rem;
padding-bottom: 1rem;
border-bottom: 1px solid var(--border);
}

.apunte-inner h2 {
font-family: 'Playfair Display', serif;
font-size: 1.1rem;
font-weight: 700;
color: var(--accent);
margin: 1.5rem 0 0.7rem;
}

.apunte-inner h3 { font-size: 0.95rem; font-weight: 600; color: var(--ink); margin: 1rem 0 0.5rem; }
.apunte-inner p { margin-bottom: 0.8rem; }
.apunte-inner ul, .apunte-inner ol { margin: 0.6rem 0 1rem 1.5rem; }
.apunte-inner li { margin-bottom: 0.3rem; }
.apunte-inner strong { color: var(--ink); font-weight: 600; }

.apunte-inner code {
font-family: 'DM Mono', monospace;
background: rgba(201,169,110,0.08);
padding: 2px 8px;
border-radius: 4px;
font-size: 0.9em;
color: var(--accent2);
}

.apunte-inner table {
width: 100%;
border-collapse: collapse;
margin: 1rem 0;
font-size: 12px;
display: block;
overflow-x: auto;
border: 1px solid var(--border);
border-radius: var(--r-sm);
}

.apunte-inner th {
background: var(--s2);
color: var(--ink);
padding: 0.7rem 0.8rem;
text-align: left;
font-family: 'DM Mono', monospace;
font-size: 9px;
text-transform: uppercase;
letter-spacing: 0.06em;
border-bottom: 2px solid var(--border2);
}

.apunte-inner td {
padding: 0.6rem 0.8rem;
border-bottom: 1px solid var(--border);
}

.def-box, .thm-box, .ex-box {
padding: 0.8rem 1rem;
margin: 1rem 0;
border-radius: var(--r-sm);
font-size: 0.9em;
line-height: 1.6;
}

.def-box { background: rgba(139,157,195,0.08); border-left: 3px solid #8b9dc3; }
.thm-box { background: rgba(123,165,135,0.08); border-left: 3px solid #7ba587; }
.ex-box { background: rgba(201,169,110,0.08); border-left: 3px solid var(--accent); }

.math-block { overflow-x: auto; padding: 0.8rem 0; text-align: center; }

/* ── BOTTOM NAV ── */
.bottom-nav {
position: fixed;
bottom: var(--player-h);
left: 0; right: 0;
z-index: 100;
display: flex;
justify-content: space-around;
padding: 0.5rem 1rem;
background: rgba(10, 10, 15, 0.9);
backdrop-filter: blur(20px);
border-top: 1px solid var(--border);
}

.nav-item {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
cursor: pointer;
color: var(--ink3);
transition: color 0.2s;
padding: 0.3rem;
}

.nav-item.active { color: var(--accent); }
.nav-item:hover { color: var(--ink2); }

.nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }

.nav-label {
font-size: 10px;
font-weight: 500;
letter-spacing: 0.04em;
}

/* ── MINI PLAYER ── */
.mini-player {
position: fixed;
bottom: var(--nav-h);
left: 0; right: 0;
z-index: 100;
height: var(--player-h);
padding: 0 1rem;
display: flex;
align-items: center;
gap: 0.8rem;
background: rgba(10, 10, 15, 0.95);
backdrop-filter: blur(20px);
border-top: 1px solid var(--border);
cursor: pointer;
transition: background 0.2s;
}

.mini-player:hover { background: var(--s1); }

.mini-player-thumb {
width: 44px; height: 44px;
border-radius: var(--r-sm);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.5rem;
background: var(--s2);
flex-shrink: 0;
}

.mini-player-info { flex: 1; min-width: 0; }

.mini-player-title {
font-size: 0.8rem;
font-weight: 600;
color: var(--ink);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.mini-player-sub {
font-size: 0.7rem;
color: var(--ink3);
margin-top: 1px;
}

.mini-player-controls { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

@media (max-width: 380px) {
.np-cover { width: 200px; height: 200px; font-size: 5rem; }
.detail-cover { width: 140px; height: 140px; font-size: 4rem; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar" id="top-bar">
<div class="top-bar-left" id="tb-left">
<button class="icon-btn" id="btn-menu" onclick="goHome()">
<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<span class="logo-text" id="tb-logo">NotePlayer</span>
</div>
<div class="top-bar-left" id="tb-back" style="display:none;">
<button class="icon-btn" onclick="goHome()">
<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<span class="logo-text" id="tb-title" style="font-size:0.95rem;"></span>
</div>
<div class="top-bar-right">
<button class="icon-btn">
<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
</button>
<div class="avatar">Ж</div>
</div>
</header>

<!-- MAIN CONTENT -->
<div style="padding-bottom:0.5rem;">

<!-- HOME VIEW -->
<div id="home" class="view active">
<div class="search-bar">
<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" placeholder="Buscar apuntes, temas, materias...">
</div>

<div class="section">
<div class="section-header"><span class="section-title">Destacado</span></div>
<div class="featured-card" onclick="openDetail('cal1')">
<div class="featured-cover"><span>∂</span></div>
<span class="featured-badge">Nuevo</span>
<div class="featured-info">
<div class="featured-title">Cálculo Diferencial</div>
<div class="featured-meta">Vol. I · 3 temas · 52 páginas</div>
</div>
<button class="featured-fav" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
</div>
</div>

<div id="home-content"></div>

<div class="section">
<div class="section-header"><span class="section-title">Continuar Escuchando</span></div>
<div class="continue-list" id="continue-list"></div>
</div>
</div>

<!-- DETAIL VIEW -->
<div id="detail" class="view">
<div id="detail-content"></div>
</div>

<!-- NOW PLAYING -->
<div id="now-playing" class="view">
<div id="np-content"></div>
</div>

</div>

<!-- MINI PLAYER -->
<div class="mini-player" id="mini-player" onclick="openNowPlaying()">
<div class="mini-player-thumb" id="mp-thumb">∂</div>
<div class="mini-player-info">
<div class="mini-player-title" id="mp-title">Selecciona un tema</div>
<div class="mini-player-sub" id="mp-sub">NotePlayer</div>
</div>
<div class="mini-player-controls">
<button class="continue-play" id="mp-play" onclick="event.stopPropagation();toggleMiniPlay()">
<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
</button>
</div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
<div class="nav-item active" data-nav="home" onclick="goHome()">
<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
<span class="nav-label">Inicio</span>
</div>
<div class="nav-item" data-nav="search">
<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<span class="nav-label">Buscar</span>
</div>
<div class="nav-item" data-nav="favs">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
<span class="nav-label">Favoritos</span>
</div>
<div class="nav-item" data-nav="profile">
<div class="avatar" style="width:24px;height:24px;font-size:0.7rem;">Ж</div>
<span class="nav-label">Perfil</span>
</div>
</nav>

<script>
const CATEGORIES = [
  {
    label: "Cálculo Infinitesimal",
    books: [
      {
        id: "cal1", title: "Cálculo Diferencial", emoji: "∂", author: "Vol. I", pages: 52, totalTime: "2h 35min",
        tracks: [
          { num: 1, title: "Límites y Continuidad", sub: "Definición ε-δ", diff: "Elemental", diffStyle: "background:rgba(123,165,135,0.12);color:#7ba587", time: "45min",
            latex: `<h1>Límites y Continuidad</h1><span class="subtitle">Capítulo I · Cálculo Diferencial</span>
<h2>Definición de Límite</h2>
<p>$\\lim_{x\\to a}f(x)=L$ cuando los valores de $f(x)$ se aproximan a $L$ conforme $x$ tiende a $a$.</p>
<div class="def-box"><strong>Definición (ε-δ):</strong> Para todo $\\varepsilon>0$ existe $\\delta>0$ tal que si $0<|x-a|<\\delta$, entonces $|f(x)-L|<\\varepsilon$.</div>
<h2>Propiedades</h2>
<ul><li>$\\lim(f\\pm g)=L\\pm M$</li><li>$\\lim(f\\cdot g)=LM$</li></ul>
<h2>Límites Notables</h2>
<div class="math-block">$$\\lim_{x\\to 0}\\frac{\\sin x}{x}=1\\qquad\\lim_{x\\to\\infty}\\left(1+\\frac{1}{x}\\right)^x=e$$</div>
<div class="thm-box"><strong>Teorema del Valor Intermedio:</strong> Si $f$ es continua en $[a,b]$ y $f(a)f(b)<0$, entonces $\\exists c\\in(a,b):f(c)=0$.</div>` },
          { num: 2, title: "Derivadas", sub: "Reglas de Derivación", diff: "Intermedio", diffStyle: "background:rgba(201,169,110,0.12);color:#c9a96e", time: "55min",
            latex: `<h1>Derivadas</h1><span class="subtitle">Capítulo II · Cálculo Diferencial</span>
<h2>Definición</h2>
<div class="math-block">$$f'(a)=\\lim_{h\\to 0}\\frac{f(a+h)-f(a)}{h}$$</div>
<h2>Reglas Fundamentales</h2>
<table><tr><th>Regla</th><th>Fórmula</th></tr><tr><td>Potencia</td><td>$\\frac{d}{dx}x^n=nx^{n-1}$</td></tr><tr><td>Producto</td><td>$(fg)'=f'g+fg'$</td></tr></table>
<div class="ex-box"><strong>Ejemplo:</strong> $h(x)=\\sin(x^2)$ → $h'(x)=2x\\cos(x^2)$</div>` },
          { num: 3, title: "Integrales", sub: "Técnicas de Integración", diff: "Avanzado", diffStyle: "background:rgba(139,157,195,0.12);color:#8b9dc3", time: "55min",
            latex: `<h1>Integrales</h1><span class="subtitle">Capítulo III</span>
<h2>Integral Indefinida</h2><p>$\\int f(x)dx=F(x)+C$</p>
<h2>Teorema Fundamental</h2><div class="thm-box">$\\int_a^b f(x)dx=F(b)-F(a)$</div>` }
        ]
      },
      {
        id: "cal2", title: "Cálculo Integral", emoji: "∫", author: "Vol. II", pages: 44, totalTime: "1h 48min",
        tracks: [
          { num: 1, title: "Series de Taylor", sub: "Expansiones Infinitas", diff: "Intermedio", diffStyle: "background:rgba(201,169,110,0.12);color:#c9a96e", time: "48min",
            latex: `<h1>Series de Taylor</h1><span class="subtitle">Vol. II</span>
<h2>Definición</h2><div class="math-block">$$f(x)=\\sum_{n=0}^{\\infty}\\frac{f^{(n)}(a)}{n!}(x-a)^n$$</div>
<table><tr><th>Función</th><th>Serie</th></tr><tr><td>$e^x$</td><td>$\\sum_{n=0}^\\infty\\frac{x^n}{n!}$</td></tr></table>` }
        ]
      }
    ]
  },
  {
    label: "Álgebra Superior",
    books: [
      {
        id: "alg1", title: "Álgebra Lineal", emoji: "⊗", author: "Vol. Único", pages: 48, totalTime: "2h 10min",
        tracks: [
          { num: 1, title: "Sistemas Lineales", sub: "Eliminación Gaussiana", diff: "Elemental", diffStyle: "background:rgba(123,165,135,0.12);color:#7ba587", time: "40min",
            latex: `<h1>Sistemas Lineales</h1><span class="subtitle">Capítulo I</span>
<h2>Forma Matricial</h2><div class="math-block">$$A\\mathbf{x}=\\mathbf{b}$$</div>
<div class="def-box"><strong>Operaciones elementales:</strong> Intercambio, escalado, suma de múltiplos.</div>` },
          { num: 2, title: "Eigenvalores", sub: "Diagonalización", diff: "Avanzado", diffStyle: "background:rgba(139,157,195,0.12);color:#8b9dc3", time: "50min",
            latex: `<h1>Eigenvalores</h1><span class="subtitle">Capítulo Final</span>
<div class="def-box">$\\lambda$ es <strong>eigenvalor</strong> de $A$ si $\\exists\\mathbf{v}\\neq\\mathbf{0}:A\\mathbf{v}=\\lambda\\mathbf{v}$.</div>
<div class="thm-box">$A=PDP^{-1}$ con $D$ diagonal de eigenvalores.</div>` }
        ]
      }
    ]
  }
];

let currentBook = null;
let currentTrack = null;
let isPlaying = false;

/* ── RENDER HOME ── */
function renderHome() {
  const allBooks = CATEGORIES.flatMap(c => c.books);
  const featured = allBooks[0];

  document.getElementById('home-content').innerHTML = CATEGORIES.map(cat => `
    <div class="section">
      <div class="section-header">
        <span class="section-title">${cat.label}</span>
        <span class="section-link">Ver todo</span>
      </div>
      <div class="hscroll">
        ${cat.books.map(b => `
          <div class="mini-card" onclick="openDetail('${b.id}')">
            <div class="mini-cover"><span>${b.emoji}</span></div>
            <div class="mini-info">
              <div class="mini-title">${b.title}</div>
              <div class="mini-meta">${b.tracks.length} temas</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  // Continue listening
  const recent = allBooks.slice(0, 4);
  document.getElementById('continue-list').innerHTML = recent.map(b => `
    <div class="continue-item" onclick="openDetail('${b.id}')">
      <div class="continue-thumb">${b.emoji}</div>
      <div class="continue-info">
        <div class="continue-title">${b.title}</div>
        <div class="continue-sub">${b.author} · ${b.tracks.length} temas</div>
      </div>
      <button class="continue-play" onclick="event.stopPropagation();openNowPlaying()">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
    </div>
  `).join('');
}

/* ── OPEN DETAIL ── */
function openDetail(bookId) {
  const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === bookId);
  if (!book) return;
  currentBook = book;

  document.getElementById('tb-left').style.display = 'none';
  document.getElementById('tb-back').style.display = 'flex';
  document.getElementById('tb-title').textContent = book.title;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-cover"><span>${book.emoji}</span></div>
      <div class="detail-info">
        <div class="detail-title">${book.title}</div>
        <div class="detail-author">${book.author} · ${book.pages} páginas</div>
      </div>
      <div class="detail-actions">
        <button class="action-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Me gusta</button>
        <button class="action-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Compartir</button>
        <button class="action-btn primary">Following</button>
      </div>
      <div class="detail-stats">${book.tracks.length} temas · ${book.totalTime}</div>
    </div>
    <div class="section-header"><span class="section-title">Temas</span></div>
    <div class="episode-list">
      ${book.tracks.map(t => `
        <div class="episode-item" id="ep-${t.num}" onclick="openTrack('${book.id}',${t.num})">
          <span class="ep-num">${String(t.num).padStart(2,'0')}</span>
          <div class="ep-info">
            <div class="ep-title">${t.title}</div>
            <div class="ep-meta"><span>${t.sub}</span><span class="ep-diff" style="${t.diffStyle}">${t.diff}</span></div>
          </div>
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)">${t.time}</span>
          <button class="ep-play" onclick="event.stopPropagation();openNowPlaying('${book.id}',${t.num})">
            <svg width="14" height="14" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
          </button>
        </div>
      `).join('')}
    </div>
    <div style="padding:0 1.2rem;margin-top:0.5rem;" id="apunte-area"></div>
  `;

  showView('detail');
  window.scrollTo(0, 0);
}

/* ── OPEN TRACK (expandir apunte) ── */
function openTrack(bookId, num) {
  const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === bookId);
  if (!book) return;
  const track = book.tracks.find(t => t.num === num);
  if (!track) return;

  const area = document.getElementById('apunte-area');
  const existing = document.getElementById(`apunte-${num}`);

  if (existing) {
    existing.classList.toggle('open');
    return;
  }

  area.innerHTML = `
    <div class="apunte-body open" id="apunte-${num}">
      <div class="apunte-inner" id="ai-${num}"></div>
    </div>
  `;

  const ai = document.getElementById(`ai-${num}`);
  ai.innerHTML = track.latex;
  renderKaTeX(ai);

  // Highlight episode
  document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`ep-${num}`)?.classList.add('active');

  setTimeout(() => document.getElementById(`apunte-${num}`).scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
}

/* ── NOW PLAYING ── */
function openNowPlaying(bookId, num) {
  let track = null;
  if (bookId && num) {
    const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === bookId);
    track = book?.tracks.find(t => t.num === num);
  }
  if (!track) {
    currentBook = CATEGORIES.flatMap(c => c.books)[0];
    track = currentBook.tracks[0];
  }
  currentTrack = track;
  isPlaying = true;

  document.getElementById('tb-left').style.display = 'none';
  document.getElementById('tb-back').style.display = 'flex';
  document.getElementById('tb-title').textContent = 'Now Playing';

  document.getElementById('np-content').innerHTML = `
    <div class="now-playing">
      <div class="np-cover"><span>${currentBook?.emoji || '∂'}</span></div>
      <div class="np-info">
        <div class="np-title">${track.title}</div>
        <div class="np-author">${track.sub} · ${currentBook?.title || ''}</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="progress-times"><span>12:34</span><span>${track.time}</span></div>
      </div>
      <div class="waveform">
        ${Array.from({length:12}, () => '<div class="wave-bar"></div>').join('')}
      </div>
      <div class="controls">
        <button class="ctrl-btn"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg></button>
        <button class="ctrl-btn"><svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
        <button class="ctrl-play" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" id="play-icon"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
        </button>
        <button class="ctrl-btn"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
        <button class="ctrl-btn"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg></button>
      </div>
      <div class="up-next">Up Next · ${currentBook?.tracks[1]?.title || 'Derivadas'}</div>
    </div>
  `;

  // Update mini player
  document.getElementById('mp-thumb').textContent = currentBook?.emoji || '∂';
  document.getElementById('mp-title').textContent = track.title;
  document.getElementById('mp-sub').textContent = track.sub;

  showView('now-playing');
  window.scrollTo(0, 0);
}

function togglePlay() {
  isPlaying = !isPlaying;
  const icon = document.getElementById('play-icon');
  if (icon) {
    icon.innerHTML = isPlaying
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
      : '<polygon points="5,3 19,12 5,21" fill="currentColor"/>';
  }
}

function toggleMiniPlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('mp-play');
  btn.innerHTML = isPlaying
    ? '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>'
    : '<svg viewBox="0 0 24 24" width="14" height="14"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>';
}

/* ── KATEX ── */
function renderKaTeX(el) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
        throwOnError: false, strict: false, trust: true
      });
    } catch(e) {}
  } else {
    setTimeout(() => renderKaTeX(el), 100);
  }
}

/* ── NAV ── */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { home: 'home', detail: 'home', 'now-playing': 'home' };
  document.querySelector(`[data-nav="${navMap[id] || 'home'}"]`)?.classList.add('active');
}

function goHome() {
  document.getElementById('tb-left').style.display = 'flex';
  document.getElementById('tb-back').style.display = 'none';
  currentBook = null;
  currentTrack = null;
  showView('home');
  window.scrollTo(0, 0);
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  window.scrollTo(0, 0);
  renderHome();
});
</script>
</body>
</html>
