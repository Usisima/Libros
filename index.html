<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NotePlayer · Biblioteca Matemática</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
--bg: #000;
--s1: #080d0c;
--s2: #0d1512;
--s3: #121c18;
--border: rgba(100, 220, 200, 0.08);
--border2: rgba(100, 220, 200, 0.16);
--ink: #e8f5f2;
--ink2: rgba(232, 245, 242, 0.55);
--ink3: rgba(232, 245, 242, 0.28);
--gold: #a2e6db;
--gold2: #93e8d8;
--gold-dim: rgba(94, 207, 190, 0.14);
--teal: #a8f0e2;
--teal-dim: rgba(168, 240, 226, 0.12);
--r: 20px;
--r2: 12px;
--ease: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
font-family: 'DM Sans', system-ui, sans-serif;
background: var(--bg);
color: var(--ink);
min-height: 100vh;
-webkit-font-smoothing: antialiased;
padding-bottom: 4rem;
overflow-x: hidden;
}

.view { display: none; }
.view.active { display: block; }

/* ── HEADER ── */
.header {
position: sticky;
top: 0;
z-index: 200;
padding: 1.1rem 1.5rem 0.9rem;
display: flex;
align-items: center;
justify-content: space-between;
gap: 1rem;
background: rgba(0, 0, 0, 0.85);
backdrop-filter: blur(20px) saturate(150%);
border-bottom: 1px solid var(--border);
}

.header::after {
content: '';
position: absolute;
bottom: 0; left: 5%; right: 5%;
height: 1px;
background: linear-gradient(90deg, transparent, var(--gold), transparent);
opacity: 0.3;
}

.header-logo {
font-family: 'Playfair Display', serif;
font-size: 1.5rem;
font-weight: 900;
color: var(--ink);
line-height: 1;
letter-spacing: -0.02em;
}

.header-sub {
font-size: 10px;
letter-spacing: 0.16em;
text-transform: uppercase;
color: var(--ink3);
margin-top: 3px;
font-weight: 500;
}

.back-btn {
display: flex;
align-items: center;
gap: 0.5rem;
cursor: pointer;
color: var(--ink2);
font-family: 'DM Sans', sans-serif;
font-size: 14px;
font-weight: 500;
background: rgba(168, 240, 226, 0.06);
border: 1px solid var(--border2);
padding: 0.5rem 1rem;
border-radius: 99px;
transition: all 0.2s;
flex-shrink: 0;
letter-spacing: 0.02em;
}

.back-btn:hover {
background: rgba(168, 240, 226, 0.12);
border-color: var(--gold);
color: var(--gold);
}

.back-btn svg {
width: 16px; height: 16px;
stroke: currentColor; fill: none;
stroke-width: 2.5; stroke-linecap: round;
}

.nav-title {
font-family: 'Playfair Display', serif;
font-size: 1.2rem;
font-weight: 700;
color: var(--ink);
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
flex: 1;
}

/* ── CONTAINER ── */
.container {
max-width: 600px;
margin: 0 auto;
padding: 0 1.2rem;
}

/* ── HOME ── */
.home-header {
padding: 2rem 0 0.5rem;
}

.logo {
font-family: 'Playfair Display', serif;
font-size: 2.8rem;
font-weight: 900;
color: var(--ink);
line-height: 1;
letter-spacing: -0.03em;
margin-bottom: 0.3rem;
}

.logo-sub {
font-size: 0.85rem;
color: var(--ink3);
letter-spacing: 0.08em;
font-weight: 400;
}

/* ── CATEGORÍAS ── */
.cat-section {
margin-top: 2rem;
}

.cat-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 1rem;
padding: 0 0.2rem;
}

.cat-label {
font-family: 'Playfair Display', serif;
font-size: 0.75rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(--ink);
}

.cat-nav {
display: flex;
gap: 4px;
}

.cat-nav-btn {
width: 32px; height: 32px;
border-radius: 50%;
background: transparent;
border: 1px solid var(--border2);
color: var(--ink3);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.2s;
}

.cat-nav-btn:hover {
border-color: var(--gold);
color: var(--gold);
}

.cat-nav-btn svg {
width: 14px; height: 14px;
stroke: currentColor; fill: none;
stroke-width: 2; stroke-linecap: round;
}

/* ── SLIDER DE ÁLBUMES ── */
.slider-wrapper {
position: relative;
overflow: hidden;
margin: 0 -0.5rem;
padding: 0.5rem;
}

.album-slider {
display: flex;
gap: 1rem;
overflow-x: auto;
scroll-behavior: smooth;
padding: 0.5rem 0.5rem 1rem;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
-ms-overflow-style: none;
}

.album-slider::-webkit-scrollbar { display: none; }

/* ── TARJETA ÁLBUM ── */
.album-card {
flex-shrink: 0;
width: 155px;
cursor: pointer;
background: rgba(255, 255, 255, 0.025);
border: 1px solid var(--border);
border-radius: var(--r);
overflow: hidden;
transition: all 0.3s ease;
}

.album-card:hover {
border-color: var(--border2);
transform: translateY(-3px);
box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
}

.album-card:active { transform: scale(0.97); }

.album-cover {
width: 100%;
aspect-ratio: 1/1;
display: flex;
align-items: center;
justify-content: center;
font-size: 3rem;
position: relative;
background: linear-gradient(135deg, rgba(168, 240, 226, 0.06), rgba(168, 240, 226, 0.02));
border-bottom: 1px solid var(--border);
}

.album-cover::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
}

.album-cover span {
position: relative;
z-index: 1;
filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}

.album-info {
padding: 0.9rem;
}

.album-title {
font-family: 'Playfair Display', serif;
font-size: 0.9rem;
font-weight: 700;
color: var(--ink);
line-height: 1.25;
margin-bottom: 0.3rem;
}

.album-meta {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--ink3);
letter-spacing: 0.04em;
}

/* ── ALBUM VIEW ── */
.album-hero {
display: flex;
gap: 1.2rem;
align-items: center;
margin: 1.5rem 0;
padding: 1.2rem;
background: rgba(255, 255, 255, 0.025);
border: 1px solid var(--border);
border-radius: var(--r);
}

.hero-cover {
width: 100px; height: 100px;
border-radius: var(--r2);
display: flex;
align-items: center;
justify-content: center;
font-size: 2.5rem;
flex-shrink: 0;
background: linear-gradient(135deg, rgba(168, 240, 226, 0.08), rgba(168, 240, 226, 0.03));
border: 1px solid var(--border2);
position: relative;
overflow: hidden;
}

.hero-cover::after {
content: '';
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 55%);
}

.hero-cover span { position: relative; z-index: 1; }

.hero-info { flex: 1; min-width: 0; }

.hero-type {
font-family: 'DM Mono', monospace;
font-size: 9px;
text-transform: uppercase;
letter-spacing: 0.12em;
color: var(--ink3);
margin-bottom: 0.5rem;
}

.hero-title {
font-family: 'Playfair Display', serif;
font-size: 1.6rem;
font-weight: 900;
color: var(--ink);
letter-spacing: -0.02em;
line-height: 1.15;
margin-bottom: 0.3rem;
}

.hero-author {
font-size: 0.85rem;
color: var(--ink2);
margin-bottom: 0.2rem;
}

.hero-stats {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--ink3);
}

/* ── TRACKLIST ── */
.tracklist { margin-top: 0.5rem; }

.tl-header {
display: grid;
grid-template-columns: 40px 1fr 80px;
gap: 0.8rem;
padding: 0.7rem 1rem;
font-family: 'DM Mono', monospace;
font-size: 9px;
font-weight: 500;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(--ink3);
border-bottom: 1px solid var(--border);
}

.track-item { margin-bottom: 0.5rem; }

.track-row {
display: grid;
grid-template-columns: 40px 1fr 80px;
gap: 0.8rem;
align-items: center;
padding: 1rem 1rem;
cursor: pointer;
background: rgba(255, 255, 255, 0.02);
border: 1px solid transparent;
border-radius: var(--r2);
transition: all 0.25s ease;
}

.track-row:hover {
background: rgba(255, 255, 255, 0.04);
border-color: var(--border);
}

.track-row.open {
background: rgba(168, 240, 226, 0.04);
border-color: rgba(168, 240, 226, 0.15);
border-radius: var(--r2) var(--r2) 0 0;
}

.t-num {
font-family: 'Playfair Display', serif;
font-size: 1rem;
font-weight: 700;
color: var(--ink3);
text-align: center;
}

.track-row.open .t-num { color: var(--gold); }

.eq-bars {
display: flex;
align-items: flex-end;
gap: 2px;
height: 16px;
justify-content: center;
}

.eq-bar {
width: 2px;
background: var(--gold);
border-radius: 2px;
animation: eq 0.7s ease-in-out infinite alternate;
}

.eq-bar:nth-child(2) { animation-delay: 0.2s; }
.eq-bar:nth-child(3) { animation-delay: 0.4s; }

@keyframes eq {
from { height: 3px; }
to { height: 16px; }
}

.t-info { overflow: hidden; min-width: 0; }

.t-title {
font-size: 0.9rem;
font-weight: 600;
color: var(--ink);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.t-sub {
font-size: 0.75rem;
color: var(--ink3);
margin-top: 2px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.t-badge {
font-family: 'DM Mono', monospace;
font-size: 9px;
font-weight: 500;
padding: 4px 10px;
border-radius: 99px;
letter-spacing: 0.04em;
text-align: center;
white-space: nowrap;
}

/* ── APUNTE EXPANDIBLE ── */
.apunte-body {
display: none;
background: #080d0c;
border: 1px solid rgba(168, 240, 226, 0.1);
border-top: none;
border-radius: 0 0 var(--r2) var(--r2);
animation: apExpand 0.25s ease;
}

.apunte-body.open { display: block; }

@keyframes apExpand {
from { opacity: 0; transform: translateY(-6px); }
to { opacity: 1; transform: translateY(0); }
}

.apunte-inner {
padding: 1.5rem 1.5rem 2rem;
font-family: 'DM Sans', sans-serif;
font-size: 14px;
line-height: 1.7;
color: #c4cfcb;
}

.apunte-inner h1 {
font-family: 'Playfair Display', serif;
font-size: 1.8rem;
font-weight: 900;
color: var(--ink);
margin-bottom: 0.3rem;
letter-spacing: -0.02em;
}

.apunte-inner .subtitle {
font-family: 'DM Mono', monospace;
font-size: 10px;
color: var(--ink3);
letter-spacing: 0.1em;
text-transform: uppercase;
display: block;
margin-bottom: 2rem;
padding-bottom: 1rem;
border-bottom: 1px solid var(--border);
}

.apunte-inner h2 {
font-family: 'Playfair Display', serif;
font-size: 1.2rem;
font-weight: 700;
color: var(--gold);
margin: 1.8rem 0 0.8rem;
}

.apunte-inner h3 {
font-size: 1rem;
font-weight: 600;
color: var(--ink2);
margin: 1.2rem 0 0.6rem;
}

.apunte-inner p { margin-bottom: 1rem; }
.apunte-inner ul, .apunte-inner ol { margin: 0.8rem 0 1.2rem 1.5rem; }
.apunte-inner li { margin-bottom: 0.4rem; }
.apunte-inner strong { color: var(--ink); font-weight: 600; }

.apunte-inner code {
font-family: 'DM Mono', monospace;
background: rgba(168, 240, 226, 0.06);
padding: 2px 8px;
border-radius: 6px;
font-size: 0.9em;
color: var(--teal);
}

.apunte-inner table {
width: 100%;
border-collapse: collapse;
margin: 1.5rem 0;
font-size: 13px;
display: block;
overflow-x: auto;
border: 1px solid var(--border);
border-radius: var(--r2);
}

.apunte-inner th {
background: rgba(168, 240, 226, 0.08);
color: var(--ink);
padding: 0.8rem 1rem;
text-align: left;
font-family: 'DM Mono', monospace;
font-size: 10px;
text-transform: uppercase;
letter-spacing: 0.08em;
border-bottom: 2px solid var(--border2);
}

.apunte-inner td {
padding: 0.7rem 1rem;
border-bottom: 1px solid var(--border);
color: var(--ink2);
}

.def-box, .thm-box, .ex-box {
padding: 1rem 1.2rem;
margin: 1.2rem 0;
border-radius: var(--r2);
font-size: 0.95em;
line-height: 1.7;
}

.def-box {
background: rgba(139, 157, 195, 0.08);
border-left: 3px solid #8b9dc3;
}

.thm-box {
background: rgba(123, 165, 135, 0.08);
border-left: 3px solid #7ba587;
}

.ex-box {
background: rgba(201, 169, 110, 0.08);
border-left: 3px solid #c9a96e;
}

.math-block {
overflow-x: auto;
padding: 1rem 0;
text-align: center;
}

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(168, 240, 226, 0.12); border-radius: 99px; }

@media (max-width: 480px) {
.header { padding: 0.9rem 1rem 0.7rem; }
.header-logo { font-size: 1.2rem; }
.container { padding: 0 0.8rem; }
.logo { font-size: 2.2rem; }
.album-card { width: 140px; }
.hero-cover { width: 80px; height: 80px; font-size: 2rem; }
.hero-title { font-size: 1.3rem; }
.track-row, .tl-header { grid-template-columns: 32px 1fr 65px; gap: 0.5rem; padding: 0.8rem 0.8rem; }
}
</style>
</head>
<body>

<!-- HEADER STICKY -->
<header class="header" id="main-header">
<div id="header-content">
<div style="display:flex;align-items:center;gap:0.5rem;">
<div class="header-logo">♫</div>
<div>
<div class="header-logo" style="font-size:1.2rem;line-height:1;">NotePlayer</div>
<div class="header-sub">Bibliotheca Mathematica</div>
</div>
</div>
</div>
<div id="header-album" style="display:none;align-items:center;gap:0.8rem;width:100%;">
<button class="back-btn" onclick="goHome()">
<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
Volver
</button>
<span class="nav-title" id="nav-title"></span>
</div>
</header>

<div class="container">

<!-- HOME VIEW -->
<div id="home" class="view active">
<div class="home-header">
<div class="logo">NotePlayer</div>
<div class="logo-sub">Tu biblioteca de apuntes matemáticos</div>
</div>
<div id="home-content"></div>
</div>

<!-- ALBUM VIEW -->
<div id="album-view" class="view">
<div id="album-hero-area"></div>
<div class="tracklist">
<div class="tl-header">
<span style="text-align:center">#</span>
<span>Tema</span>
<span style="text-align:center">Nivel</span>
</div>
<div id="tracklist-body"></div>
</div>
</div>

</div>

<script>
const CATEGORIES = [
  {
    label: "Cálculo Infinitesimal",
    books: [
      {
        id: "cal1", title: "Cálculo Diferencial", emoji: "∂", author: "Vol. I · MMXXIV", pages: 52,
        tracks: [
          { num: 1, title: "Límites y Continuidad", sub: "Definición ε-δ", diff: "Elemental", diffStyle: "background:rgba(123,165,135,0.12);color:#7ba587",
            latex: `<h1>Límites y Continuidad</h1><span class="subtitle">Capítulo I · Cálculo Diferencial</span>
<h2>Definición de Límite</h2>
<p>Escribimos $\\lim_{x\\to a}f(x)=L$ cuando los valores de $f(x)$ se aproximan a $L$ conforme $x$ tiende a $a$.</p>
<div class="def-box"><strong>Definición (ε-δ):</strong> Para todo $\\varepsilon>0$ existe $\\delta>0$ tal que si $0<|x-a|<\\delta$, entonces $|f(x)-L|<\\varepsilon$.</div>
<h2>Propiedades Fundamentales</h2>
<p>Si $\\lim_{x\\to a}f(x)=L$ y $\\lim_{x\\to a}g(x)=M$:</p>
<ul>
<li>$\\lim_{x\\to a}[f(x)\\pm g(x)]=L\\pm M$</li>
<li>$\\lim_{x\\to a}[f(x)\\cdot g(x)]=LM$</li>
<li>$\\lim_{x\\to a}\\frac{f(x)}{g(x)}=\\frac{L}{M}$, si $M\\neq 0$</li>
</ul>
<h2>Límites Notables</h2>
<div class="math-block">$$\\lim_{x\\to 0}\\frac{\\sin x}{x}=1\\qquad\\lim_{x\\to 0}\\frac{1-\\cos x}{x}=0\\qquad\\lim_{x\\to\\infty}\\left(1+\\frac{1}{x}\\right)^x=e$$</div>
<h2>Continuidad</h2>
<div class="def-box"><strong>Definición:</strong> $f$ es continua en $a$ si y solo si $\\lim_{x\\to a}f(x)=f(a)$.</div>
<div class="thm-box"><strong>Teorema del Valor Intermedio:</strong> Si $f$ es continua en $[a,b]$ y $f(a)f(b)<0$, entonces existe $c\\in(a,b)$ tal que $f(c)=0$.</div>` },
          { num: 2, title: "Derivadas", sub: "Reglas de Derivación", diff: "Intermedio", diffStyle: "background:rgba(201,169,110,0.12);color:#c9a96e",
            latex: `<h1>Derivadas</h1><span class="subtitle">Capítulo II · Cálculo Diferencial</span>
<h2>Definición</h2>
<p>La derivada de $f$ en $a$ es:</p>
<div class="math-block">$$f'(a)=\\lim_{h\\to 0}\\frac{f(a+h)-f(a)}{h}$$</div>
<h2>Reglas Fundamentales</h2>
<table><tr><th>Regla</th><th>Fórmula</th></tr>
<tr><td>Potencia</td><td>$\\frac{d}{dx}x^n=nx^{n-1}$</td></tr>
<tr><td>Producto</td><td>$(fg)'=f'g+fg'$</td></tr>
<tr><td>Cociente</td><td>$(\\frac{f}{g})'=\\frac{f'g-fg'}{g^2}$</td></tr>
<tr><td>Cadena</td><td>$(f\\circ g)'=f'(g)\\cdot g'$</td></tr></table>
<h2>Derivadas Elementales</h2>
<div class="math-block">$$\\frac{d}{dx}\\sin x=\\cos x\\quad\\frac{d}{dx}\\cos x=-\\sin x\\quad\\frac{d}{dx}e^x=e^x$$</div>
<div class="ex-box"><strong>Ejemplo:</strong> $h(x)=\\sin(x^2)$ → $h'(x)=2x\\cos(x^2)$</div>` },
          { num: 3, title: "Integrales", sub: "Técnicas de Integración", diff: "Avanzado", diffStyle: "background:rgba(139,157,195,0.12);color:#8b9dc3",
            latex: `<h1>Integrales</h1><span class="subtitle">Capítulo III · Cálculo Integral</span>
<h2>Integral Indefinida</h2>
<p>$\\int f(x)\\,dx=F(x)+C$ donde $F'(x)=f(x)$.</p>
<h2>Tabla Básica</h2>
<table><tr><th>$f(x)$</th><th>$\\int f(x)\\,dx$</th></tr>
<tr><td>$x^n$</td><td>$\\frac{x^{n+1}}{n+1}+C$</td></tr>
<tr><td>$\\frac{1}{x}$</td><td>$\\ln|x|+C$</td></tr>
<tr><td>$e^x$</td><td>$e^x+C$</td></tr></table>
<h2>Teorema Fundamental</h2>
<div class="thm-box"><strong>TFC:</strong> $\\int_a^b f(x)\\,dx=F(b)-F(a)$</div>` }
        ]
      },
      {
        id: "cal2", title: "Cálculo Integral", emoji: "∫", author: "Vol. II · MMXXIV", pages: 44,
        tracks: [
          { num: 1, title: "Series de Taylor", sub: "Expansiones Infinitas", diff: "Intermedio", diffStyle: "background:rgba(201,169,110,0.12);color:#c9a96e",
            latex: `<h1>Series de Taylor</h1><span class="subtitle">Cálculo Integral · Vol. II</span>
<h2>Definición</h2>
<div class="math-block">$$f(x)=\\sum_{n=0}^{\\infty}\\frac{f^{(n)}(a)}{n!}(x-a)^n$$</div>
<h2>Series Notables</h2>
<table><tr><th>Función</th><th>Serie de Maclaurin</th></tr>
<tr><td>$e^x$</td><td>$\\sum_{n=0}^\\infty\\frac{x^n}{n!}$</td></tr>
<tr><td>$\\sin x$</td><td>$\\sum_{n=0}^\\infty\\frac{(-1)^n x^{2n+1}}{(2n+1)!}$</td></tr></table>` }
        ]
      }
    ]
  },
  {
    label: "Álgebra Superior",
    books: [
      {
        id: "alg1", title: "Álgebra Lineal", emoji: "⊗", author: "Vol. Único · MMXXIV", pages: 48,
        tracks: [

let currentBookId = null;

/* ── RENDER HOME ── */
function renderHome() {
  document.getElementById('home-content').innerHTML = CATEGORIES.map((cat, ci) => `
    <div class="cat-section">
      <div class="cat-header">
        <div class="cat-label">${cat.label}</div>
        <div class="cat-nav">
          <button class="cat-nav-btn" onclick="slideAlbums('cat-${ci}', -1)">
            <svg viewBox="0 0 24 24"><polyline points="16 20 8 12 16 4"/></svg>
          </button>
          <button class="cat-nav-btn" onclick="slideAlbums('cat-${ci}', 1)">
            <svg viewBox="0 0 24 24"><polyline points="8 20 16 12 8 4"/></svg>
          </button>
        </div>
      </div>
      <div class="slider-wrapper">
        <div class="album-slider" id="cat-${ci}">
          ${cat.books.map(b => `
            <div class="album-card" onclick="openAlbum('${b.id}')">
              <div class="album-cover"><span>${b.emoji}</span></div>
              <div class="album-info">
                <div class="album-title">${b.title}</div>
                <div class="album-meta">${b.tracks.length} temas · ${b.pages} págs</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function slideAlbums(catId, dir) {
  const slider = document.getElementById(catId);
  const card = slider.querySelector('.album-card');
  if (!card) return;
  slider.scrollBy({ left: (card.offsetWidth + 16) * dir, behavior: 'smooth' });
}

/* ── OPEN ALBUM ── */
function openAlbum(bookId) {
  const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === bookId);
  if (!book) return;
  currentBookId = bookId;

  // Actualizar header
  document.getElementById('header-content').style.display = 'none';
  document.getElementById('header-album').style.display = 'flex';
  document.getElementById('nav-title').textContent = book.title;

  // Hero del álbum
  document.getElementById('album-hero-area').innerHTML = `
    <div class="album-hero">
      <div class="hero-cover"><span>${book.emoji}</span></div>
      <div class="hero-info">
        <div class="hero-type">Libro de Apuntes</div>
        <div class="hero-title">${book.title}</div>
        <div class="hero-author">${book.author}</div>
        <div class="hero-stats">${book.tracks.length} temas · ${book.pages} páginas</div>
      </div>
    </div>`;

  // Lista de temas (canciones)
  document.getElementById('tracklist-body').innerHTML = book.tracks.map(t => `
    <div class="track-item">
      <div class="track-row" id="tr-${t.num}" onclick="toggleTrack(${t.num})">
        <div class="t-num" id="tn-${t.num}">${String(t.num).padStart(2,'0')}</div>
        <div class="t-info">
          <div class="t-title">${t.title}</div>
          <div class="t-sub">${t.sub}</div>
        </div>
        <div><span class="t-badge" style="${t.diffStyle}">${t.diff}</span></div>
      </div>
      <div class="apunte-body" id="ab-${t.num}">
        <div class="apunte-inner" id="ai-${t.num}"></div>
      </div>
    </div>
  `).join('');

  showView('album-view');
  window.scrollTo(0, 0);
}

/* ── TOGGLE TRACK ── */
function toggleTrack(num) {
  const ab = document.getElementById('ab-' + num);
  const row = document.getElementById('tr-' + num);
  const numEl = document.getElementById('tn-' + num);
  const isOpen = ab.classList.contains('open');

  if (isOpen) {
    ab.classList.remove('open');
    row.classList.remove('open');
    numEl.textContent = String(num).padStart(2, '0');
    return;
  }

  // Cerrar otros tracks
  document.querySelectorAll('.apunte-body.open').forEach(ob => {
    const oid = parseInt(ob.id.replace('ab-', ''));
    if (ob !== ab) {
      ob.classList.remove('open');
      const orow = document.getElementById('tr-' + oid);
      const onum = document.getElementById('tn-' + oid);
      if (orow) orow.classList.remove('open');
      if (onum) onum.textContent = String(oid).padStart(2, '0');
    }
  });

  // Abrir este track
  ab.classList.add('open');
  row.classList.add('open');
  numEl.innerHTML = '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>';

  const inner = document.getElementById('ai-' + num);
  if (!inner.dataset.rendered) {
    const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === currentBookId);
    const track = book.tracks.find(t => t.num === num);
    inner.innerHTML = track.latex;
    inner.dataset.rendered = '1';
    renderKaTeX(inner);
  }

  setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

/* ── KATEX ── */
function renderKaTeX(el) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
        throwOnError: false, strict: false, trust: true
      });
    } catch(e) { console.error('KaTeX:', e); }
  } else {
    setTimeout(() => renderKaTeX(el), 100);
  }
}

/* ── NAVEGACIÓN ── */
function showView(id) {
  document.getElementById('home').classList.remove('active');
  document.getElementById('album-view').classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function goHome() {
  document.getElementById('header-content').style.display = 'flex';
  document.getElementById('header-album').style.display = 'none';
  showView('home');
  window.scrollTo(0, 0);
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  window.scrollTo(0, 0);
  renderHome();
});
</script>
