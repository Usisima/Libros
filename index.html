<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NotePlayer · Apuntes Matemáticos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM & CSS VARIABLES
═══════════════════════════════════════ */
:root {
  --bg:#000000; --s1:#12121a; --s2:#1a1a24; --s3:#222230;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
  --ink:#f0ece4; --ink2:rgba(240,236,228,0.62); --ink3:rgba(240,236,228,0.32);
  --accent:#c9a96e; --accent2:#d4ba7c; --adim:rgba(201,169,110,0.14);
  --teal:#7ec8bc; --tdim:rgba(126,200,188,0.12);
  --success:rgba(123,165,135,0.14); --success-text:#7ba587;
  --info:rgba(139,157,195,0.14); --info-text:#8b9dc3;
  --warning:rgba(201,169,110,0.14); --warning-text:#c9a96e;
  --r:16px; --rsm:10px; --nav-h:58px;
  --transition-fast: 0.15s ease;
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + 1rem);
  line-height:1.5;
}
img{max-width:100%;height:auto;display:block}

/* ═══════════════════════════════════════
   LAYOUT - VIEWS
═══════════════════════════════════════ */
.view{display:none;animation:fadeIn .3s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════
   TOP BAR
═══════════════════════════════════════ */
.top-bar{
  position:sticky;top:0;z-index:100;
  padding:.7rem 1rem;
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  background:rgba(0,0,0,.93);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:all .3s ease;
}
.top-bar::after{
  content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.28;pointer-events:none;
}

/* Top Bar Components */
.tb-left,.tb-right{display:flex;align-items:center;gap:.5rem}
.tb-right{gap:.8rem}
.logo-text{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:900;
  color:var(--ink);
  letter-spacing:-.02em;line-height:1;
  flex-shrink:0;
  cursor:pointer;
  transition:color .2s;
}
.logo-text:hover{color:var(--accent)}
.tb-divider{
  width:1px;height:22px;
  background:rgba(255,255,255,.13);
  flex-shrink:0;margin:0 .1rem;
}
.tb-institution{display:flex;flex-direction:column;gap:1px}
.tb-inst-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:900;
  color:var(--ink);
  line-height:1.1;letter-spacing:-.01em;
}
.tb-inst-sub{
  font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink3);font-weight:500;
}

/* Back Button */
.back-btn-container{
  display:flex;align-items:center;gap:.5rem;
  flex:1;min-width:0;
}
.back-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:700;
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
  max-width:200px;
}

/* Icon Buttons */
.icon-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--border2);
  color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all var(--transition-fast);
  flex-shrink:0;
  position:relative;
}
.icon-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  transform:scale(1.05);
}
.icon-btn:active{transform:scale(.95)}
.icon-btn svg{
  width:17px;height:17px;
  stroke:currentColor;
  fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
}
.icon-btn.active{
  background:var(--adim);
  border-color:var(--accent);
  color:var(--accent);
}

/* Badge for icons */
.icon-btn .badge{
  position:absolute;top:-2px;right:-2px;
  min-width:18px;height:18px;
  background:var(--accent);
  color:#000;
  border-radius:9px;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
  border:2px solid var(--bg);
}

/* ═══════════════════════════════════════
   SECTIONS & HEADERS
═══════════════════════════════════════ */
.section{margin:1.5rem 0}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;margin-bottom:.8rem;
}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;font-weight:700;
  letter-spacing:.01em;
  position:relative;
  padding-left:12px;
}
.section-title::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:var(--accent);border-radius:2px;
}

/* ═══════════════════════════════════════
   HORIZONTAL SCROLL CONTAINER
═══════════════════════════════════════ */
.hscroll{
  display:flex;gap:.75rem;
  overflow-x:auto;
  padding:0 1rem .5rem;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  scroll-snap-type:x proximity;
}
.hscroll::-webkit-scrollbar{display:none}
.hscroll::after{
  content:'';flex:0 0 1px;
}

/* ═══════════════════════════════════════
   CARDS - Mini, Grid, Continue
═══════════════════════════════════════ */
.mini-card{
  flex-shrink:0;width:138px;
  cursor:pointer;
  border-radius:var(--rsm);
  overflow:hidden;
  background:var(--s1);
  border:1px solid var(--border);
  transition:all var(--transition-fast);
  scroll-snap-align:start;
}
.mini-card:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.mini-card:active{transform:scale(.97)}

.mini-cover{
  width:100%;aspect-ratio:2/3;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;position:relative;overflow:hidden;
  background:var(--s2);
}
.mini-cover img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .3s ease;
}
.mini-card:hover .mini-cover img{transform:scale(1.05)}
.mini-cover span{position:relative;z-index:1}

/* Favorite Dot on Cards */
.fav-dot{
  position:absolute;top:.4rem;right:.4rem;z-index:3;
  width:24px;height:24px;
  border-radius:50%;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:13px;color:var(--ink2);
  transition:all var(--transition-fast);
  backdrop-filter:blur(4px);
}
.fav-dot:hover{
  transform:scale(1.1);
  border-color:var(--accent);
}
.fav-dot.faved{
  background:var(--adim);
  border-color:var(--accent);
  color:var(--accent);
  animation:favPop .3s ease;
}
@keyframes favPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

.mini-info{padding:.6rem .7rem}
.mini-title{
  font-size:.79rem;font-weight:600;
  color:var(--ink);line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.mini-meta{
  font-size:.69rem;color:var(--ink3);
  margin-top:3px;
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}

/* Continue Reading List */
.continue-list{padding:0 1rem}
.continue-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem .6rem;
  border-radius:var(--rsm);
  cursor:pointer;
  transition:all var(--transition-fast);
  animation:slideUp .3s ease backwards;
}
.continue-item:hover{
  background:var(--s1);
  transform:translateX(4px);
}
.continue-item:active{transform:scale(.98)}
.continue-item:nth-child(1){animation-delay:0s}
.continue-item:nth-child(2){animation-delay:.05s}
.continue-item:nth-child(3){animation-delay:.1s}
.continue-item:nth-child(4){animation-delay:.15s}

.c-thumb{
  width:48px;height:48px;
  border-radius:var(--rsm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
  background:var(--s2);
  flex-shrink:0;
  overflow:hidden;position:relative;
}
.c-thumb img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
}
.c-info{flex:1;min-width:0}
.c-title{
  font-size:.85rem;font-weight:600;
  color:var(--ink);
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}
.c-sub{
  font-size:.73rem;color:var(--ink3);
  margin-top:2px;
}

/* ═══════════════════════════════════════
   SEARCH
═══════════════════════════════════════ */
.search-wrap{padding:.7rem 1rem .3rem;animation:fadeIn .3s ease}
.search-bar{
  display:flex;align-items:center;gap:.6rem;
  padding:.7rem 1rem;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:99px;
  transition:all var(--transition-fast);
}
.search-bar:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--adim);
}
.search-bar svg{
  width:16px;height:16px;
  stroke:var(--ink3);
  fill:none;stroke-width:2;
  flex-shrink:0;
  transition:stroke .3s;
}
.search-bar:focus-within svg{stroke:var(--accent)}

.search-bar input{
  flex:1;background:none;border:none;
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-size:.88rem;outline:none;
}
.search-bar input::placeholder{color:var(--ink3)}
.search-clear{
  cursor:pointer;color:var(--ink3);
  font-size:1.1rem;line-height:1;
  flex-shrink:0;display:none;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:all .2s;
}
.search-clear:hover{
  background:rgba(255,255,255,.1);
  color:var(--ink);
}
.search-clear.visible{display:flex}

.search-results{padding:0 1rem;animation:fadeIn .3s ease}
.search-empty{
  padding:3rem 1rem;text-align:center;
  color:var(--ink3);font-size:.9rem;
}
.search-result-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem .5rem;
  border-radius:var(--rsm);
  cursor:pointer;
  transition:all var(--transition-fast);
  border-bottom:1px solid var(--border);
  animation:slideUp .2s ease backwards;
}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{
  background:var(--s1);
  transform:translateX(4px);
}
.search-result-item:nth-child(1){animation-delay:0s}
.search-result-item:nth-child(2){animation-delay:.03s}
.search-result-item:nth-child(n+3){animation-delay:.06s}
.sr-cover{
  width:44px;height:44px;border-radius:var(--rsm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;flex-shrink:0;
}
.sr-info{flex:1;min-width:0}
.sr-title{
  font-size:.85rem;font-weight:600;
  color:var(--ink);
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}
.sr-sub{font-size:.73rem;color:var(--ink3);margin-top:2px}
.sr-type{
  font-family:'DM Mono',monospace;
  font-size:9px;padding:3px 8px;
  border-radius:99px;background:var(--s2);
  color:var(--ink3);flex-shrink:0;
}

/* ═══════════════════════════════════════
   LIBRARY GRID
═══════════════════════════════════════ */
.lib-grid-section{padding:0 1rem 1.5rem}
.lib-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:.7rem;
  animation:fadeIn .3s ease;
}
.lib-grid-card{
  cursor:pointer;border-radius:var(--rsm);
  overflow:hidden;
  background:var(--s1);
  border:1px solid var(--border);
  transition:all var(--transition-fast);
  position:relative;
}
.lib-grid-card:hover{
  border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.lib-grid-card:active{transform:scale(.96)}
.lib-grid-cover{
  width:100%;aspect-ratio:2/3;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
  position:relative;overflow:hidden;
}
.lib-grid-cover img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
}
.lib-grid-cover span{position:relative;z-index:1}
.lib-grid-info{padding:.45rem .55rem .55rem}
.lib-grid-name{
  font-size:.7rem;font-weight:600;
  color:var(--ink);line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.lib-grid-auth{
  font-size:.58rem;color:var(--ink3);
  margin-top:2px;
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}

/* ═══════════════════════════════════════
   DETAIL VIEW
═══════════════════════════════════════ */
.detail-header{
  display:flex;flex-direction:column;
  align-items:center;
  padding:1.5rem 1rem .5rem;
  gap:1rem;
  animation:fadeIn .4s ease;
}
.detail-cover{
  width:clamp(120px,40vw,170px);
  aspect-ratio:2/3;height:auto;
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;
  border:1px solid var(--border2);
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.detail-cover img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;border-radius:var(--r);
}
.detail-cover span{position:relative;z-index:1}
.detail-info{text-align:center}
.detail-title{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:900;
  line-height:1.2;margin-bottom:.3rem;
}
.detail-author{font-size:.9rem;color:var(--ink2);line-height:1.4}
.detail-actions{
  display:flex;gap:.6rem;
  justify-content:center;
  margin-top:.5rem;flex-wrap:wrap;
}
.action-btn{
  padding:.55rem 1.1rem;
  border-radius:99px;
  background:var(--s1);
  border:1px solid var(--border2);
  color:var(--ink2);
  font-family:'DM Sans',sans-serif;
  font-size:.8rem;font-weight:500;
  cursor:pointer;
  transition:all var(--transition-fast);
  display:flex;align-items:center;gap:.4rem;
}
.action-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  transform:translateY(-1px);
}
.action-btn:active{transform:translateY(0)}
.action-btn.primary{
  background:var(--accent);
  color:#000;
  border-color:var(--accent);
  font-weight:600;
}
.action-btn.primary:hover{
  background:var(--accent2);
  box-shadow:0 4px 12px var(--adim);
}
.action-btn.faved{
  background:var(--adim);
  border-color:var(--accent);
  color:var(--accent);
}
.detail-stats{
  text-align:center;
  font-size:.8rem;color:var(--ink3);
  margin-top:.5rem;
}

/* ═══════════════════════════════════════
   EPISODE/TRACK LIST
═══════════════════════════════════════ */
.episode-list{padding:0 .8rem}
.ep-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.85rem .5rem;
  border-radius:var(--rsm);
  cursor:pointer;
  transition:all var(--transition-fast);
  border-bottom:1px solid var(--border);
  animation:slideUp .3s ease backwards;
}
.ep-item:last-of-type{border-bottom:none}
.ep-item:hover{background:var(--s1);transform:translateX(3px)}
.ep-item.open{
  background:var(--adim);
  border-bottom-color:transparent;
}
.ep-num{
  font-family:'DM Mono',monospace;
  font-size:.75rem;color:var(--ink3);
  width:32px;text-align:center;flex-shrink:0;
  font-weight:500;
}
.ep-info{flex:1;min-width:0}
.ep-title{
  font-size:.9rem;font-weight:600;
  color:var(--ink);
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}
.ep-meta{
  font-size:.73rem;color:var(--ink3);
  margin-top:2px;
  display:flex;gap:.5rem;align-items:center;
  flex-wrap:wrap;
}
.ep-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.ep-fav,.ep-play{
  cursor:pointer;
  transition:all var(--transition-fast);
  display:flex;align-items:center;justify-content:center;
}
.ep-fav{
  width:30px;height:30px;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--border2);
  color:var(--ink3);
  font-size:13px;
}
.ep-fav:hover,.ep-fav.faved{
  border-color:var(--accent);
  color:var(--accent);
}
.ep-fav.faved{animation:favPop .3s ease}
.ep-play{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--adim);
  border:1px solid var(--accent);
  color:var(--accent);
}
.ep-play:hover{
  background:var(--accent);
  color:#000;
  transform:scale(1.05);
}
.ep-play:active{transform:scale(.95)}
.ep-play svg{width:13px;height:13px;fill:currentColor}

/* ═══════════════════════════════════════
   EXPANDABLE CONTENT
═══════════════════════════════════════ */
.apunte-wrap{
  overflow:hidden;
  max-height:0;
  transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;
  opacity:0;
}
.apunte-wrap.open{
  max-height:2000px;
  opacity:1;
}
.apunte-inner{
  background:var(--s1);
  border-top:1px solid var(--border2);
  margin:0 .3rem;
  border-radius:0 0 var(--rsm) var(--rsm);
  padding:1.5rem 1.2rem;
  animation:fadeIn .3s ease;
}
/* Content Styles */
.apunte-inner h1{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:900;
  color:var(--ink);margin-bottom:.5rem;
}
.apunte-inner .subtitle{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--ink3);
  letter-spacing:.08em;text-transform:uppercase;
  display:block;margin-bottom:1.5rem;
  padding-bottom:1rem;
  border-bottom:1px solid var(--border);
}
.apunte-inner h2{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;font-weight:700;
  color:var(--accent);margin:1.5rem 0 .6rem;
}
.apunte-inner h3{
  font-size:.92rem;font-weight:600;
  color:var(--ink);margin:1rem 0 .4rem;
}
.apunte-inner p{
  font-size:.875rem;line-height:1.8;
  color:var(--ink2);margin-bottom:.8rem;
}
.apunte-inner ul,.apunte-inner ol{
  margin:.6rem 0 1rem 1.5rem;
}
.apunte-inner li{
  font-size:.875rem;line-height:1.8;
  color:var(--ink2);margin-bottom:.3rem;
}
.apunte-inner strong{color:var(--ink);font-weight:600}
.apunte-inner em{color:var(--ink2);font-style:italic}
.apunte-inner code{
  font-family:'DM Mono',monospace;
  background:var(--adim);
  padding:2px 8px;border-radius:4px;
  font-size:.85em;color:var(--accent2);
}

/* Boxes */
.def-box{
  background:var(--info);
  border-left:3px solid var(--info-text);
  padding:.8rem 1rem;margin:1rem 0;
  border-radius:0 var(--rsm) var(--rsm) 0;
  font-size:.88em;line-height:1.7;color:var(--ink2);
}
.thm-box{
  background:var(--success);
  border-left:3px solid var(--success-text);
  padding:.8rem 1rem;margin:1rem 0;

.reader-topbar{
  height:50px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:rgba(10,9,7,.97);

}

  font-size:.88rem;font-style:italic;

.reader-btn{
  width:34px;height:34px;border-radius:8px;

  display:flex;align-items:center;justify-content:center;

  flex-shrink:0;
}
.reader-btn:hover{
  background:var(--adim);
  border-color:var(--accent);
  color:var(--accent);
}
.reader-btn svg{
  width:16px;height:16px;
  stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
}
.reader-page-ct{
  font-size:.65rem;color:rgba(240,236,228,.35);
  min-width:65px;text-align:center;flex-shrink:0;
  font-family:'DM Mono',monospace;letter-spacing:.05em;
}

/* Reader Stage */
.reader-stage{
  flex:1;position:relative;overflow:hidden;
  background:#0f0e0c;
  display:flex;align-items:center;justify-content:center;
}
#r-book{position:absolute;inset:0;overflow:hidden}

/* Reader Pages */
.rpage{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#0f0e0c;
  will-change:transform,opacity;
  transition:transform .15s ease,opacity .15s ease;
}
.rpage img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
  pointer-events:none;
  box-shadow:0 2px 24px rgba(0,0,0,.8);
  transition:transform .3s ease;
}

/* Slide animations */
@keyframes slideOutL{
  0%{opacity:1;transform:translateX(0)}
  100%{opacity:0;transform:translateX(-4%)}
}
@keyframes slideOutR{
  0%{opacity:1;transform:translateX(0)}
  100%{opacity:0;transform:translateX(4%)}
}
@keyframes slideInR{
  0%{opacity:0;transform:translateX(3%)}
  100%{opacity:1;transform:translateX(0)}
}
@keyframes slideInL{
  0%{opacity:0;transform:translateX(-3%)}
  100%{opacity:1;transform:translateX(0)}
}
.rpage.out-left{animation:slideOutL .15s ease-out forwards;z-index:2}
.rpage.out-right{animation:slideOutR .15s ease-out forwards;z-index:2}
.rpage.in-right{animation:slideInR .15s ease-out forwards;z-index:1}
.rpage.in-left{animation:slideInL .15s ease-out forwards;z-index:1}

/* Loading */
.rpage-loading{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;
}
.r-spinner{
  width:28px;height:28px;
  border:3px solid rgba(201,169,110,.12);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:rspin .7s linear infinite;
}
@keyframes rspin{to{transform:rotate(360deg)}}

/* Tap Zones */
.reader-zone-prev,.reader-zone-next{
  position:absolute;top:0;bottom:0;width:33%;z-index:10;
}
.reader-zone-prev{left:0;cursor:w-resize}
.reader-zone-next{right:0;cursor:e-resize}

/* Reader Controls */
.reader-controls{
  flex-shrink:0;

  gap:12px;
  background:rgba(10,9,7,.97);
  border-top:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(16px);
  padding:12px 18px env(safe-area-inset-bottom,12px);
}
.reader-track{
  width:100%;max-width:480px;height:4px;
  background:rgba(255,255,255,.08);
  border-radius:99px;
  cursor:pointer;position:relative;
  touch-action:none;
  transition:height .2s;
}
.reader-track:hover{height:6px}
.reader-fill{
  height:100%;background:var(--accent);
  border-radius:99px;
  transition:width .15s;
  position:relative;pointer-events:none;
}
.reader-fill::after{
  content:'';position:absolute;
  right:-7px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;
  border-radius:50%;
  background:var(--accent2);
  box-shadow:0 0 0 4px rgba(201,169,110,.18);
  opacity:0;transition:opacity .2s;
}
.reader-track:hover .reader-fill::after{opacity:1}

.reader-btns{display:flex;align-items:center;gap:10px}
.reader-nav-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 22px;border-radius:99px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:rgba(240,236,228,.55);
  font-family:'DM Mono',monospace;
  font-size:.68rem;letter-spacing:.07em;
  cursor:pointer;
  transition:all var(--transition-fast);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.reader-nav-btn:active{
  background:var(--adim);
  border-color:var(--accent);
  color:var(--accent);
  transform:scale(.95);
}
.reader-nav-btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#0c0b09;font-weight:600;
}
.reader-nav-btn.primary:active{
  background:var(--accent2);
}
.reader-nav-btn svg{
  width:14px;height:14px;
  stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;
}

/* Goto Modal */
#reader-goto{
  position:fixed;inset:0;z-index:210;
  background:rgba(0,0,0,.75);

  display:none;align-items:center;justify-content:center;

}

const debounce = (fn, delay) => {
  let timeout;
  return (...args) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn(...args), delay);
  };
};

const throttle = (fn, limit) => {
  let inThrottle;
  return (...args) => {
    if (!inThrottle) {
      fn(...args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
};

// Aplanar datos para búsquedas eficientes
const allBooks = LIBRARY.flatMap(c => c.books);
const allTracks = allBooks.flatMap(b => 
  b.tracks.map(t => ({ ...t, bookId: b.id, bookTitle: b.title, bookEmoji: b.emoji, bookCover: b.cover }))
);

/* ══════════════════════════════════════════
   APPLICATION STATE
══════════════════════════════════════════ */
const AppState = {
  view: 'home',
  prevView: null,
  currentBookId: null,
  currentTrackKey: null,
  favorites: new Set(JSON.parse(localStorage.getItem('np_favs') || '[]')),
  openTracks: new Set(),
  recentTracks: JSON.parse(localStorage.getItem('np_recent') || '[]').slice(0, 4),
  
  // Métodos de estado
  isFav(key) { return this.favorites.has(key); },
  
  addFavorite(key) {
    this.favorites.add(key);
    this.saveFavorites();
  },
  
  removeFavorite(key) {
    this.favorites.delete(key);
    this.saveFavorites();
  },
  
  toggleFavorite(key) {
    if (this.isFav(key)) {
      this.removeFavorite(key);
      return false;
    } else {
      this.addFavorite(key);
      return true;
    }
  },
  
  saveFavorites() {
    localStorage.setItem('np_favs', JSON.stringify([...this.favorites]));
    this.updateFavCount();
  },
  
  addRecent(bookId, trackNum) {
    const key = `${bookId}:${trackNum}`;
    this.recentTracks = [key, ...this.recentTracks.filter(k => k !== key)].slice(0, 4);
    localStorage.setItem('np_recent', JSON.stringify(this.recentTracks));
  },
  
  updateFavCount() {
    const count = this.favorites.size;
    const el = document.getElementById('fav-count');
    if (el) {
      el.textContent = count;
      el.style.display = count > 0 ? 'flex' : 'none';
    }
  },
  
  getBookCoverUrl(bookId) {
    const cfg = READER_CONFIGS[bookId];
    if (!cfg) return null;
    return cfg.base + cfg.prefix + '0001' + cfg.ext;
  }
};

/* ══════════════════════════════════════════
   RENDER FUNCTIONS
══════════════════════════════════════════ */
const Renderer = {
  home() {

    // Sección: Continuar leyendo (si hay historial)

      const recentItems = AppState.recentTracks

          const [bId, numStr] = key.split(':');

          const track = book?.tracks.find(t => t.num === parseInt(numStr));

                  ? `<img src="${coverUrl}" alt="${b.title}" loading="lazy">`

        <div class="search-bar">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

    searchView.innerHTML = html;
  },
  
  buildLibraryGrid() {
    const seen = new Set();
    const unique = allBooks.filter(b => {
      const key = b.title + '|' + b.author;
      return seen.has(key) ? false : seen.add(key);
    });
    
    const sorted = unique.sort((a, b) => a.title.localeCompare(b.title, 'es'));
    
    const cards = sorted.map(b => {
      const coverUrl = AppState.getBookCoverUrl(b.id);
      return `
        <div class="lib-grid-card" onclick="Navigation.openDetail('${b.id}')">
          <div class="lib-grid-cover" style="background:${b.cover}">
            ${coverUrl ? `<img src="${coverUrl}" alt="${b.title}" loading="lazy">` : `<span>${b.emoji}</span>`}
          </div>
          <div class="lib-grid-info">
            <div class="lib-grid-name">${b.title}</div>
            <div class="lib-grid-auth">${b.author.split('·')[0].trim()}</div>
          </div>
        </div>`;
    }).join('');
    
    return `<div class="lib-grid">${cards}</div>`;
  },
  
  favorites() {
    const favBooks = allBooks.filter(b => AppState.isFav(b.id));
    const favTracks = allTracks.filter(t => AppState.isFav(`${t.bookId}:${t.num}`));
    
    let html = '';
    
    if (!favBooks.length && !favTracks.length) {
      html = '<div class="search-empty" style="padding:4rem 1rem">Aún no tienes favoritos.<br>Guarda libros o temas con ☆</div>';
    } else {
      if (favBooks.length) {
        html += `<div class="section">
          <div class="section-header"><span class="section-title">Libros guardados</span></div>
          <div class="hscroll">${favBooks.map(b => {
            const coverUrl = AppState.getBookCoverUrl(b.id);
            return `<div class="mini-card" onclick="Navigation.openDetail('${b.id}')">
              <div class="mini-cover" style="background:${b.cover}">
                ${coverUrl ? `<img src="${coverUrl}" alt="${b.title}" loading="lazy">` : `<span>${b.emoji}</span>`}
              </div>
              <div class="mini-info">
                <div class="mini-title">${b.title}</div>
                <div class="mini-meta">${b.author.split('·')[0].trim()}</div>
              </div>
            </div>`;
          }).join('')}</div>
        </div>`;
      }
      
      if (favTracks.length) {
        html += `<div class="section">
          <div class="section-header"><span class="section-title">Temas guardados</span></div>
          <div class="continue-list">${favTracks.map(t => `
            <div class="continue-item" onclick="Navigation.openDetail('${t.bookId}')">
              <div class="c-thumb" style="background:${t.bookCover}">${t.bookEmoji}</div>
              <div class="c-info">

  }
};

/* ══════════════════════════════════════════
   NAVIGATION CONTROLLER
══════════════════════════════════════════ */
const Navigation = {
  setTopBar(title, showBack) {
    document.getElementById('tb-default').style.display = showBack ? 'none' : 'flex';
    document.getElementById('tb-back').style.display = showBack ? 'flex' : 'none';
    if (showBack) document.getElementById('tb-title').textContent = title || '';
  },
  
  showView(id, skipHistory = false) {
    // Ocultar vista actual
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    
    // Mostrar nueva vista
    const viewEl = document.getElementById(id);
    if (viewEl) {
      viewEl.classList.add('active');
      viewEl.scrollTop = 0;
    }
    
    // Actualizar navegación inferior
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.nav === id);
    });
    
    // Actualizar estado
    AppState.prevView = AppState.view;
    AppState.view = id;
    
    // Scroll al inicio
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    // Historial
    if (!skipHistory) {
      history.pushState({ view: id, bookId: AppState.currentBookId }, '', '#' + id);
    }
  },
  
  goHome() {
    this.setTopBar('', false);
    Renderer.home();
    this.showView('home', true);
    history.replaceState({ view: 'home' }, '', '#home');
  },
  
  showSearch() {
    this.setTopBar('Buscar', true);
    Renderer.search();
    this.showView('search-view', false);
    setTimeout(() => document.getElementById('search-input')?.focus(), 100);
  },
  
  showFavs() {
    this.setTopBar('Favoritos', false);
    Renderer.favorites();
    this.showView('favs-view', false);
  },
  
  openDetail(bookId, skipHistory = false) {
    const book = allBooks.find(b => b.id === bookId);
    if (!book) return;
    
    AppState.currentBookId = bookId;
    this.setTopBar(book.title, true);
    Renderer.detail(book);
    this.showView('detail', skipHistory);
  },
  
  playTrack(bookId, num) {
    const book = allBooks.find(b => b.id === bookId);
    const track = book?.tracks.find(t => t.num === num);
    if (!book || !track) return;
    
    const key = `${bookId}:${num}`;
    
    // Asegurar que estamos en la vista de detalle correcta
    if (AppState.view !== 'detail' || AppState.currentBookId !== bookId) {
      AppState.currentBookId = bookId;
      AppState.addRecent(bookId, num);
      this.openDetail(bookId, false);
      setTimeout(() => Actions.toggleTrack(bookId, num), 300);
      return;
    }
    
    AppState.addRecent(bookId, num);
    Actions.toggleTrack(bookId, num);
  },
  
  navBack() {
    const prev = AppState.prevView || 'home';
    if (prev === 'home' || prev === AppState.view) {
      this.goHome();
      return;
    }
    
    this.showView(prev, true);
    if (prev === 'home') {
      this.setTopBar('', false);
    } else if (prev === 'detail') {
      const book = allBooks.find(b => b.id === AppState.currentBookId);
      this.setTopBar(book?.title || '', true);
    }
  }
};

/* ══════════════════════════════════════════
   USER ACTIONS
══════════════════════════════════════════ */
const Actions = {
  toggleBookFav(bookId, el, isDetailBtn = false) {
    const isNowFav = AppState.toggleFavorite(bookId);
    
    // Actualizar UI específica
    if (el) {
      el.classList.toggle('faved', isNowFav);
      if (isDetailBtn) {
        el.textContent = isNowFav ? '★ Guardado' : '☆ Guardar';
      } else {
        el.textContent = isNowFav ? '★' : '☆';
      }
    }
    
    // Actualizar otras vistas si es necesario
    if (AppState.view === 'home') {
      // Solo reordenar, no re-renderizar todo
      const card = document.querySelector(`.mini-card .fav-dot[onclick*="${bookId}"]`);
      if (card) {
        const miniCard = card.closest('.mini-card');
        const hscroll = miniCard.closest('.hscroll');
        if (isNowFav) {
          hscroll.insertBefore(miniCard, hscroll.firstChild);
        }
      }
    }
  },
  
  toggleTrackFav(bookId, num, el) {
    const key = `${bookId}:${num}`;
    const isNowFav = AppState.toggleFavorite(key);
    
    if (el) {
      el.classList.toggle('faved', isNowFav);
      el.textContent = isNowFav ? '★' : '☆';
    }
  },
  
  toggleTrack(bookId, num) {
    const key = `${bookId}:${num}`;
    const wrap = document.getElementById(`apunte-${bookId}-${num}`);
    const epEl = document.getElementById(`ep-${bookId}-${num}`);
    
    if (!wrap) return;
    
    const isCurrentlyOpen = wrap.classList.contains('open');
    
    if (isCurrentlyOpen) {
      // Cerrar
      wrap.classList.remove('open');
      epEl?.classList.remove('open');
      AppState.openTracks.delete(key);
    } else {
      // Cerrar otros abiertos
      document.querySelectorAll('.apunte-wrap.open').forEach(el => {
        el.classList.remove('open');
        const elId = el.id.replace('apunte-', '').replace('-', ':');
        AppState.openTracks.delete(elId);
      });
      document.querySelectorAll('.ep-item.open').forEach(el => {
        el.classList.remove('open');
      });
      
      // Abrir este
      wrap.classList.add('open');
      epEl?.classList.add('open');
      AppState.openTracks.add(key);
      
      // Renderizar contenido si es necesario
      const ai = document.getElementById(`ai-${bookId}-${num}`);
      if (!ai.dataset.rendered) {
        const book = allBooks.find(b => b.id === bookId);
        const track = book?.tracks.find(t => t.num === num);
        if (track) {
          ai.innerHTML = track.latex;
          ai.dataset.rendered = 'true';
          setTimeout(() => KaTeXRenderer.render(ai), 150);
        }
      }
      
      // Scroll suave al elemento
      setTimeout(() => {
        epEl?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 200);
    }
  },
  
  doSearch: debounce(function(query) {
    const clearBtn = document.getElementById('search-clear');
    const resultsDiv = document.getElementById('search-results');
    const gridDiv = document.getElementById('library-grid');
    
    // Actualizar botón de limpiar
    if (clearBtn) {
      clearBtn.classList.toggle('visible', query.length > 0);
    }
    
    if (!query.trim()) {
      // Mostrar grid, ocultar resultados
      if (resultsDiv) resultsDiv.style.display = 'none';
      if (gridDiv) gridDiv.style.display = 'block';
      return;
    }
    
    // Mostrar resultados, ocultar grid
    if (resultsDiv) resultsDiv.style.display = 'block';
    if (gridDiv) gridDiv.style.display = 'none';
    
    // Buscar
    const ql = query.toLowerCase();
    let matches = [];
    
    allBooks.forEach(b => {
      if (b.title.toLowerCase().includes(ql) || b.author.toLowerCase().includes(ql)) {
        matches.push({
          type: 'book', bookId: b.id, 
          title: b.title, sub: b.author, 
          emoji: b.emoji, cover: b.cover 
        });
      }
      
      b.tracks.forEach(t => {
        if (t.title.toLowerCase().includes(ql) || t.sub.toLowerCase().includes(ql)) {
          matches.push({
            type: 'track', bookId: b.id, num: t.num,
            title: t.title, sub: `${b.title} · ${t.sub}`,
            emoji: b.emoji, cover: b.cover
          });
        }
      });
    });
    
    if (matches.length === 0) {
      resultsDiv.innerHTML = `<div class="search-empty">Sin resultados para "<strong>${query}</strong>"</div>`;
      return;
    }
    
    resultsDiv.innerHTML = matches.map((m, i) => `
      <div class="search-result-item" style="animation-delay:${i * 0.02}s"
           onclick="${m.type === 'book' ? `Navigation.openDetail('${m.bookId}')` : `Navigation.playTrack('${m.bookId}',${m.num})`}">
        <div class="sr-cover" style="background:${m.cover}">${m.emoji}</div>
        <div class="sr-info">
          <div class="sr-title">${m.title}</div>
          <div class="sr-sub">${m.sub.split('·')[0].trim()}</div>
        </div>
        <span class="sr-type">${m.type === 'book' ? 'Libro' : 'Tema'}</span>
      </div>
    `).join('');
  }, 300),
  
  clearSearch() {
    const input = document.getElementById('search-input');
    if (input) {
      input.value = '';
      input.focus();
    }
    this.doSearch('');
  }
};

/* ══════════════════════════════════════════
   KATEX RENDERER
══════════════════════════════════════════ */
const KaTeXRenderer = {
  render(element) {
    if (!element || !window.renderMathInElement) {
      setTimeout(() => this.render(element), 150);
      return;
    }
    
    try {
      renderMathInElement(element, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false,
        strict: false,
        trust: true
      });
    } catch (e) {
      console.warn('KaTeX rendering error:', e);
    }
  }
};

const Reader = {
  state: {
    bookId: null,
    total: 0,
    current: 1,
    base: '', prefix: '', ext: '.jpg',
    blobs: {},        // Cache de blob URLs
    fetching: {},     // Promesas pendientes
    queue: 0,
    processing: false,
    fastTimer: null,
    fetchToken: 0,    // Para cancelar fetches obsoletos
    scale: 1,
    isLoading: false
  },
  
  open(bookId) {
    const cfg = READER_CONFIGS[bookId];
    if (!cfg) {
      console.error('No reader config for:', bookId);
      return;
    }
    
    const state = this.state;
    state.bookId = bookId;
    state.base = cfg.base;
    state.prefix = cfg.prefix;
    state.ext = cfg.ext;
    state.total = cfg.total;
    state.current = parseInt(localStorage.getItem('reader_pg_' + bookId) || '1');
    state.blobs = {};
    state.fetching = {};
    state.queue = 0;
    state.processing = false;
    state.fetchToken = 0;
    state.scale = 1;
    state.isLoading = false;
    
    // Actualizar UI
    const book = allBooks.find(b => b.id === bookId);
    document.getElementById('r-title').textContent = book?.title || '';
    document.getElementById('goto-hint').textContent = `Total: ${state.total} páginas`;
    document.getElementById('goto-inp').max = state.total;
    
    // Mostrar reader
    document.getElementById('reader-view').classList.add('active');
    document.body.style.overflow = 'hidden';
    history.pushState({ view: 'reader', bookId }, '', '#reader');
    
    // Cargar página actual
    this.prefetch(state.current, 4);
    this.showPage(state.current, null);
    this.setupInteractions();
  },
  
  close() {
    // Limpiar todos los blobs para evitar memory leaks
    Object.keys(this.state.blobs).forEach(k => {
      URL.revokeObjectURL(this.state.blobs[k]);
    });
    
    this.state.blobs = {};
    this.state.fetching = {};
    this.state.queue = 0;
    this.state.processing = false;
    this.stopFastNav();
    
    document.getElementById('reader-view').classList.remove('active');
    document.body.style.overflow = '';
    
    if (location.hash === '#reader') {
      history.back();
    }
  },
  
  getUrl(n) {
    return this.state.base + this.state.prefix + String(n).padStart(4, '0') + this.state.ext;
  },
  
  async fetch(n) {
    const state = this.state;
    if (n < 1 || n > state.total) return null;
    if (state.blobs[n]) return state.blobs[n];
    if (state.fetching[n]) return state.fetching[n];
    
    const token = ++state.fetchToken;
    const promise = fetch(this.getUrl(n))
      .then(r => r.ok ? r.blob() : null)
      .then(blob => {
        if (!blob) return null;
        if (token !== state.fetchToken) {
          // Este fetch fue cancelado por uno más reciente
          return null;
        }
        const url = URL.createObjectURL(blob);
        state.blobs[n] = url;
        delete state.fetching[n];
        return url;
      })
      .catch(() => {
        delete state.fetching[n];
        return null;
      });
    
    state.fetching[n] = promise;
    return promise;
  },
  
  prefetch(n, radius = 4) {
    this.fetch(n); // Prioridad máxima
    for (let d = 1; d <= radius; d++) {
      this.fetch(n + d);
      this.fetch(n - d);
    }
  },
  
  evict(current, keep = 12) {
    const state = this.state;
    Object.keys(state.blobs).forEach(k => {
      const pg = parseInt(k);
      if (Math.abs(pg - current) > keep) {
        URL.revokeObjectURL(state.blobs[pg]);
        delete state.blobs[pg];
      }
    });
  },
  
  showPage(n, direction) {
    const state = this.state;
    const bookEl = document.getElementById('r-book');
    
    // Crear nuevo elemento de página
    const div = document.createElement('div');
    div.className = 'rpage';
    
    const blobUrl = state.blobs[n];
    if (blobUrl) {
      const img = document.createElement('img');
      img.src = blobUrl;
      img.draggable = false;
      img.decoding = 'async';
      img.style.transform = `scale(${state.scale})`;
      div.appendChild(img);
      this.swapPage(bookEl, div, direction);
    } else {
      // Mostrar spinner
      const sp = document.createElement('div');
      sp.className = 'rpage-loading';
      sp.innerHTML = '<div class="r-spinner"></div>';
      div.appendChild(sp);
      this.swapPage(bookEl, div, direction);
      
      // Cargar imagen
      this.fetch(n).then(url => {
        if (!url || state.current !== n) return;
        const img = document.createElement('img');
        img.src = url;
        img.draggable = false;
        img.decoding = 'async';
        img.style.transform = `scale(${state.scale})`;
        sp.replaceWith(img);
      });
    }
    
    this.updateUI();
    this.prefetch(n, 4);
    this.evict(n, 12);
    localStorage.setItem('reader_pg_' + state.bookId, n);
  },
  
  swapPage(bookEl, newDiv, direction) {
    const old = bookEl.querySelector('.rpage');
    
    if (!old || !direction) {
      bookEl.innerHTML = '';
      bookEl.appendChild(newDiv);
      return;
    }
    
    const outClass = direction === 'fwd' ? 'out-left' : 'out-right';
    const inClass = direction === 'fwd' ? 'in-right' : 'in-left';
    
    old.classList.add(outClass);
    newDiv.classList.add(inClass);
    bookEl.appendChild(newDiv);
    
    old.addEventListener('animationend', () => old.remove(), { once: true });
  },
  
  updateUI() {
    const state = this.state;
    document.getElementById('r-counter').textContent = 
      `p. ${state.current} / ${state.total}`;
    
    const pct = state.total > 1 
      ? ((state.current - 1) / (state.total - 1)) * 100 
      : 0;
    document.getElementById('r-fill').style.width = pct + '%';
  },
  
  // Navegación
  next() { this.enqueue(1); },
  prev() { this.enqueue(-1); },
  
  enqueue(step) {
    const state = this.state;
    const target = state.current + state.queue + step;
    if (target < 1 || target > state.total) return;
    
    state.queue += step;
    if (!state.processing) this.flushQueue();
  },
  
  flushQueue() {
    const state = this.state;
    if (state.queue === 0) {
      state.processing = false;
      return;
    }
    
    state.processing = true;
    const step = state.queue > 0 ? 1 : -1;
    state.queue -= step;
    
    const next = state.current + step;
    if (next < 1 || next > state.total) {
      state.queue = 0;
      state.processing = false;
      return;
    }
    
    state.current = next;
    const direction = step > 0 ? 'fwd' : 'bk';
    const animate = Math.abs(state.queue) <= 2;
    this.showPage(state.current, animate ? direction : null);
    
    setTimeout(() => this.flushQueue(), state.queue !== 0 ? 60 : 0);
  },
  
  goTo(n) {
    this.stopFastNav();
    const state = this.state;
    state.queue = 0;
    state.processing = false;
    
    const target = Math.max(1, Math.min(state.total, n));
    if (target === state.current) return;
    
    const direction = target > state.current ? 'fwd' : 'bk';
    state.current = target;
    this.showPage(state.current, direction);
  },
  
  // Navegación rápida (long press)
  startFastNav(direction) {
    this.stopFastNav();
    const step = direction > 0 ? 1 : -1;
    
    if (step > 0) this.next();
    else this.prev();
    
    let speed = 300;
    const repeat = () => {
      if (step > 0) this.next();
      else this.prev();
      speed = Math.max(60, speed - 30);
      this.state.fastTimer = setTimeout(repeat, speed);
    };
    
    this.state.fastTimer = setTimeout(repeat, 450);
  },
  
  stopFastNav() {
    clearTimeout(this.state.fastTimer);
    this.state.fastTimer = null;
  },
  
  // Interacciones
  _interactionsSetup: false,
  
  setupInteractions() {
    if (this._interactionsSetup) return;
    this._interactionsSetup = true;
    
    const state = this.state;
    
    // Barra de progreso
    const track = document.getElementById('r-track');
    track.addEventListener('click', e => {
      const ratio = e.offsetX / track.offsetWidth;
      this.goTo(Math.round(1 + ratio * (state.total - 1)));
    });
    
    track.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = track.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, 
        (e.touches[0].clientX - rect.left) / rect.width
      ));
      this.goTo(Math.round(1 + ratio * (state.total - 1)));
    }, { passive: false });
    
    // Gestos swipe
    const stage = document.getElementById('r-stage');
    let sx = 0, moved = false;
    
    stage.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      moved = false;
    }, { passive: true });
    
    stage.addEventListener('touchmove', () => { moved = true; }, { passive: true });
    
    stage.addEventListener('touchend', e => {
      if (!moved) return;
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 40) {
        dx < 0 ? this.next() : this.prev();
      }
    });
    
    // Zoom con gestos
    let initialDistance = 0;
    stage.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        initialDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    }, { passive: true });
    
    stage.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        const currentDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const scale = currentDistance / initialDistance;
        state.scale = Math.max(0.5, Math.min(3, state.scale * scale));
        initialDistance = currentDistance;
        
        const img = document.querySelector('.rpage img');
        if (img) img.style.transform = `scale(${state.scale})`;
      }
    }, { passive: true });
    
    // Long press en botones
    const prevBtn = document.getElementById('r-prev-btn');
    const nextBtn = document.getElementById('r-next-btn');
    
    ['mousedown', 'touchstart'].forEach(ev => {
      prevBtn?.addEventListener(ev, e => {
        e.preventDefault();
        this.startFastNav(-1);
      }, { passive: false });
      
      nextBtn?.addEventListener(ev, e => {
        e.preventDefault();
        this.startFastNav(1);
      }, { passive: false });
    });
    
    ['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(ev => {
      prevBtn?.addEventListener(ev, () => this.stopFastNav());
      nextBtn?.addEventListener(ev, () => this.stopFastNav());
    });
    
    // Tap zones
    document.querySelector('.reader-zone-prev')?.addEventListener('click', () => this.prev());
    document.querySelector('.reader-zone-next')?.addEventListener('click', () => this.next());
    
    // Keyboard
    document.addEventListener('keydown', e => {
      if (!document.getElementById('reader-view').classList.contains('active')) return;
      if (e.target.tagName === 'INPUT') return;
      
      switch(e.key) {
        case 'ArrowRight':
        case ' ':
          e.preventDefault();
          this.next();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          this.prev();
          break;
        case 'Escape':
          this.close();
          break;
        case 'g':
          ReaderModals.open();
          break;
      }
    });
  }
};

/* ══════════════════════════════════════════
   READER MODALS
══════════════════════════════════════════ */
const ReaderModals = {
  open() {
    document.getElementById('goto-inp').value = Reader.state.current;
    document.getElementById('reader-goto').classList.add('open');
    setTimeout(() => document.getElementById('goto-inp').focus(), 100);
  },
  
  close() {
    document.getElementById('reader-goto').classList.remove('open');
  },
  
  confirm() {
    const v = parseInt(document.getElementById('goto-inp').value);
    if (!isNaN(v)) Reader.goTo(v);
    this.close();
  }
};

document.addEventListener('DOMContentLoaded', () => {
  history.replaceState({ view: 'home' }, '', '#home');
  Renderer.home();
  AppState.updateFavCount();
  window.scrollTo(0, 0);
});

// Navegación del navegador
window.addEventListener('popstate', (e) => {
  const data = e.state;
  if (!data || data.view === 'home') {
    Navigation.goHome();
  } else if (data.view === 'detail' && data.bookId) {
    Navigation.openDetail(data.bookId, true);
  } else if (data.view === 'search-view') {
    Navigation.showSearch();
  } else if (data.view === 'favs-view') {
    Navigation.showFavs();
  } else if (data.view === 'reader') {
    Reader.close();
  } else {
    Navigation.goHome();
  }
});

// Prevenir scroll en reader
document.addEventListener('touchmove', (e) => {
  if (document.getElementById('reader-view').classList.contains('active')) {
    e.preventDefault();
  }
}, { passive: false });
