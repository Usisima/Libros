<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NotePlayer — Edición Ornamental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0a0a0a;
  --ink: #e8e4dd;
  --ink-dim: rgba(232, 228, 221, 0.55);
  --ink-faint: rgba(232, 228, 221, 0.25);
  --ink-glow: rgba(232, 228, 221, 0.08);
  --border: rgba(232, 228, 221, 0.35);
  --border-light: rgba(232, 228, 221, 0.15);
  --gold: #c9a96e;
  --gold-dim: rgba(201, 169, 110, 0.5);
  --accent: #d4a853;
}

body {
  margin: 0;
  font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* ── CONTENEDOR PRINCIPAL CON MARCO ORNAMENTAL ── */
.app-container {
  max-width: 440px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding: 48px 28px 48px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ── ORNAMENTOS DE BORDE ── */
.app-container::before {
  content: '';
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 440px;
  height: 100%;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  pointer-events: none;
  z-index: 0;
}

/* Esquina superior izquierda */
.corner-tl {
  position: fixed;
  top: 24px;
  left: calc(50% - 220px + 28px);
  z-index: 10;
  pointer-events: none;
}

.corner-tl::before {
  content: '';
  display: block;
  width: 48px;
  height: 48px;
  border-top: 2px solid var(--ink);
  border-left: 2px solid var(--ink);
}

.corner-tl::after {
  content: '❦';
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 16px;
  color: var(--gold);
}

/* Esquina superior derecha */
.corner-tr {
  position: fixed;
  top: 24px;
  right: calc(50% - 220px + 28px);
  z-index: 10;
  pointer-events: none;
}

.corner-tr::before {
  content: '';
  display: block;
  width: 48px;
  height: 48px;
  border-top: 2px solid var(--ink);
  border-right: 2px solid var(--ink);
  margin-left: auto;
}

.corner-tr::after {
  content: '❦';
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 16px;
  color: var(--gold);
}

/* Esquina inferior izquierda */
.corner-bl {
  position: fixed;
  bottom: 24px;
  left: calc(50% - 220px + 28px);
  z-index: 10;
  pointer-events: none;
}

.corner-bl::before {
  content: '';
  display: block;
  width: 48px;
  height: 48px;
  border-bottom: 2px solid var(--ink);
  border-left: 2px solid var(--ink);
}

/* Esquina inferior derecha */
.corner-br {
  position: fixed;
  bottom: 24px;
  right: calc(50% - 220px + 28px);
  z-index: 10;
  pointer-events: none;
}

.corner-br::before {
  content: '';
  display: block;
  width: 48px;
  height: 48px;
  border-bottom: 2px solid var(--ink);
  border-right: 2px solid var(--ink);
  margin-left: auto;
}

/* ── ORNAMENTO CENTRAL SUPERIOR ── */
.ornament-top {
  text-align: center;
  padding: 8px 0 28px;
  position: relative;
  z-index: 1;
}

.ornament-top-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.ornament-top-line::before,
.ornament-top-line::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(
    90deg,
    transparent,
    var(--ink-faint) 20%,
    var(--border) 50%,
    var(--ink-faint) 80%,
    transparent
  );
}

.ornament-top-symbol {
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 8px;
  font-family: 'Noto Serif SC', serif;
}

/* ── HOME HEADER ── */
.home-header {
  margin-bottom: 44px;
  position: relative;
  z-index: 1;
}

.logo {
  font-family: 'Playfair Display', 'DM Serif Display', serif;
  font-size: 46px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0.02em;
  color: var(--ink);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.logo-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 300;
  font-style: italic;
  color: var(--ink-dim);
  letter-spacing: 0.06em;
  position: relative;
  padding-left: 48px;
}

.logo-sub::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 36px;
  height: 1px;
  background: var(--gold-dim);
}

/* ── CATEGORÍAS ── */
.cat-section {
  margin-bottom: 48px;
  position: relative;
  z-index: 1;
}

.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
  position: relative;
}

.cat-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 40px;
  height: 2px;
  background: var(--gold);
}

.cat-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-dim);
}

.cat-nav {
  display: flex;
  gap: 4px;
}

.cat-nav-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border-light);
  color: var(--ink-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
}

.cat-nav-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.cat-nav-btn svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── SLIDER DE LIBROS ── */
.slider-wrapper {
  position: relative;
  overflow: hidden;
  margin: 0 -8px;
  padding: 4px 8px;
}

.book-slider {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding: 8px 4px 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.book-slider::-webkit-scrollbar {
  display: none;
}

/* ── TARJETA LIBRO ORNAMENTAL ── */
.book-card {
  flex-shrink: 0;
  width: 140px;
  cursor: pointer;
  background: var(--bg);
  border: 1px solid var(--border-light);
  position: relative;
  transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  padding: 20px 16px 18px;
  display: flex;
  flex-direction: column;
}

/* Marco interior */
.book-card::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid var(--border-light);
  pointer-events: none;
  transition: border-color 0.4s ease;
}

/* Ornamento de esquina */
.book-card::after {
  content: '✦';
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 8px;
  color: var(--gold-dim);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.book-card:hover {
  border-color: var(--gold-dim);
  transform: translateY(-6px);
  box-shadow: 
    0 20px 60px rgba(0, 0, 0, 0.6),
    0 0 0 1px var(--gold-dim);
}

.book-card:hover::before {
  border-color: var(--gold-dim);
}

.book-card:hover::after {
  opacity: 1;
}

.book-card:active {
  transform: scale(0.95);
  transition: transform 0.15s ease;
}

.book-cover {
  width: 100%;
  aspect-ratio: 1/1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  position: relative;
  margin-bottom: 16px;
  background: var(--ink-glow);
}

.book-cover span {
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
}

.book-spine {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.book-title {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.book-meta {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 400;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Indicador de páginas */
.book-pages-indicator {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.book-page-dot {
  width: 4px;
  height: 4px;
  background: var(--ink-faint);
  transition: all 0.3s ease;
}

.book-page-dot.active {
  background: var(--gold);
  width: 16px;
}

/* ── ALBUM VIEW ── */
.album-nav {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(10, 10, 10, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 20px 0;
  margin: -16px 0 0;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border-light);
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--ink-dim);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  background: transparent;
  border: 1px solid var(--border-light);
  padding: 8px 16px;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.back-btn::before {
  content: '←';
  font-size: 14px;
  transition: transform 0.3s ease;
}

.back-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.back-btn:hover::before {
  transform: translateX(-4px);
}

.nav-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* ── HERO DEL ÁLBUM ── */
.album-hero {
  display: flex;
  gap: 24px;
  align-items: center;
  margin: 32px 0 28px;
  padding: 24px;
  border: 1px solid var(--border-light);
  position: relative;
}

/* Ornamento del hero */
.album-hero::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid var(--border-light);
  pointer-events: none;
}

.album-hero::after {
  content: '§';
  position: absolute;
  bottom: 8px;
  right: 12px;
  font-size: 12px;
  color: var(--gold-dim);
}

.hero-cover {
  width: 90px;
  height: 90px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  position: relative;
  background: var(--ink-glow);
  border: 1px solid var(--border-light);
}

.hero-cover span {
  position: relative;
  z-index: 1;
}

.hero-info {
  flex: 1;
  min-width: 0;
}

.hero-type {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-dim);
  margin-bottom: 8px;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.hero-author {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--ink-dim);
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

.hero-stats {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 400;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── LISTA DE TEMAS ── */
.tracklist {
  margin-top: 12px;
  position: relative;
}

.tl-header {
  display: grid;
  grid-template-columns: 44px 1fr 80px;
  gap: 12px;
  padding: 12px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-faint);
  border-bottom: 1px solid var(--border-light);
}

.track-item {
  margin-bottom: 4px;
}

.track-row {
  display: grid;
  grid-template-columns: 44px 1fr 80px;
  gap: 12px;
  align-items: center;
  padding: 16px 20px;
  cursor: pointer;
  background: transparent;
  border: 1px solid transparent;
  border-bottom: 1px solid var(--border-light);
  transition: all 0.3s ease;
  position: relative;
}

.track-row::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 2px;
  height: 0;
  background: var(--gold);
  transition: height 0.3s ease;
}

.track-row:hover {
  background: var(--ink-glow);
  border-color: var(--border-light);
}

.track-row:hover::before {
  height: 60%;
}

.track-row.open {
  background: var(--ink-glow);
  border-color: var(--border-light);
  border-bottom: none;
}

.track-row.open::before {
  height: 70%;
}

.t-num {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink-dim);
  text-align: center;
}

.track-row.open .t-num {
  color: var(--gold);
}

.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 16px;
  justify-content: center;
}

.eq-bar {
  width: 2px;
  background: var(--gold);
  animation: eq 0.8s ease-in-out infinite alternate;
}

.eq-bar:nth-child(2) { animation-delay: 0.2s; }
.eq-bar:nth-child(3) { animation-delay: 0.4s; }

@keyframes eq {
  from { height: 3px; }
  to { height: 16px; }
}

.t-info {
  overflow: hidden;
  min-width: 0;
}

.t-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.t-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  font-style: italic;
  color: var(--ink-dim);
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.t-badge {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 500;
  padding: 5px 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-align: center;
  border: 1px solid;
}

/* ── APUNTE EXPANDIBLE ── */
.apunte-body {
  display: none;
  background: #111111;
  border: 1px solid var(--border-light);
  border-top: none;
  animation: apExpand 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  position: relative;
}

.apunte-body::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1px solid rgba(232, 228, 221, 0.08);
  pointer-events: none;
}

.apunte-body.open {
  display: block;
}

@keyframes apExpand {
  from {
    opacity: 0;
    transform: translateY(-6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.apunte-inner {
  padding: 36px 32px 44px;
}

/* ── TIPOGRAFÍA DEL APUNTE ── */
.apunte-inner {
  font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
  font-size: 16px;
  line-height: 1.75;
  color: #d4d0c8;
}

.apunte-inner h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.15;
  margin-bottom: 8px;
  color: var(--ink);
  text-transform: uppercase;
}

.apunte-inner .subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--ink-dim);
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 36px;
  display: block;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-light);
}

.apunte-inner h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
  margin: 36px 0 16px;
  color: var(--ink);
  letter-spacing: 0.03em;
  text-transform: uppercase;
  position: relative;
  padding-left: 20px;
}

.apunte-inner h2::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  background: var(--gold);
}

.apunte-inner h3 {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 600;
  margin: 28px 0 12px;
  color: var(--ink);
  letter-spacing: 0.03em;
}

.apunte-inner p {
  margin-bottom: 16px;
  line-height: 1.8;
  color: #c4c0b8;
}

.apunte-inner ul, .apunte-inner ol {
  margin: 12px 0 20px 24px;
  color: #c4c0b8;
}

.apunte-inner li {
  margin-bottom: 8px;
  line-height: 1.7;
}

.apunte-inner li::marker {
  color: var(--gold-dim);
}

.apunte-inner strong {
  font-weight: 600;
  color: var(--ink);
}

.apunte-inner code {
  font-family: 'Inter', monospace;
  background: rgba(232, 228, 221, 0.06);
  padding: 2px 8px;
  font-size: 0.85em;
  color: var(--ink);
  border: 1px solid var(--border-light);
}

.apunte-inner table {
  width: 100%;
  border-collapse: collapse;
  margin: 24px 0;
  font-size: 14px;
  display: block;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--border-light);
}

.apunte-inner th {
  background: rgba(232, 228, 221, 0.06);
  color: var(--ink);
  padding: 14px 16px;
  text-align: left;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
  font-weight: 500;
  border-bottom: 2px solid var(--gold-dim);
}

.apunte-inner td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-light);
  color: #c4c0b8;
}

.apunte-inner tr:last-child td {
  border-bottom: none;
}

/* ── CAJAS ESPECIALES ── */
.def-box, .thm-box, .ex-box {
  padding: 20px 24px;
  margin: 24px 0;
  font-size: 0.95em;
  line-height: 1.7;
  border: 1px solid var(--border-light);
  position: relative;
}

.def-box::before {
  content: 'DEFINICIÓN';
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  display: block;
  margin-bottom: 12px;
}

.def-box {
  border-left: 3px solid #8b9dc3;
}

.thm-box::before {
  content: 'TEOREMA';
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  display: block;
  margin-bottom: 12px;
}

.thm-box {
  border-left: 3px solid #7ba587;
}

.ex-box::before {
  content: 'EJEMPLO';
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-dim);
  display: block;
  margin-bottom: 12px;
}

.ex-box {
  border-left: 3px solid #c9a96e;
}

.math-block {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 0;
  text-align: center;
  margin: 16px 0;
}

.math-block .katex-display {
  margin: 0;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 6px 0;
}

/* ── SELLO DECORATIVO ── */
.seal-mark {
  display: inline-block;
  font-family: 'Noto Serif SC', serif;
  color: var(--gold-dim);
  font-size: 14px;
  letter-spacing: 0.2em;
  border: 1px solid var(--gold-dim);
  padding: 8px 16px;
  margin: 16px 0;
  writing-mode: vertical-rl;
  text-orientation: upright;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar {
  width: 2px;
  height: 2px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border-light);
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .app-container {
    padding: 36px 18px 40px;
    border: none;
  }
  
  .app-container::before {
    display: none;
  }
  
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    display: none;
  }
  
  .logo {
    font-size: 36px;
  }
  
  .book-card {
    width: 126px;
  }
  
  .hero-cover {
    width: 72px;
    height: 72px;
    font-size: 30px;
  }
  
  .hero-title {
    font-size: 22px;
  }
  
  .track-row, .tl-header {
    grid-template-columns: 36px 1fr 70px;
    gap: 8px;
    padding: 14px 12px;
  }
  
  .apunte-inner {
    padding: 28px 20px 36px;
  }
  
  .apunte-inner h1 {
    font-size: 26px;
  }
  
  .apunte-inner .katex {
    font-size: 0.9em !important;
  }
}

/* ── UTILIDADES ── */
.view {
  display: none;
}

.view.active {
  display: block;
}

/* Ornamento de separación */
.section-ornament {
  text-align: center;
  padding: 16px 0;
  color: var(--gold-dim);
  font-size: 12px;
  letter-spacing: 12px;
}

/* Línea decorativa */
.decorative-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 8px 0;
}

.decorative-line::before,
.decorative-line::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-light);
}

.decorative-line span {
  color: var(--gold-dim);
  font-size: 8px;
}
</style>
</head>
<body>

<!-- ORNAMENTOS DE ESQUINA FIJOS -->
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<div class="app-container">

<!-- HOME VIEW -->
<div id="home" class="view active">
  <div class="ornament-top">
    <div class="ornament-top-line">
      <span class="ornament-top-symbol">學 而 時 習 之</span>
    </div>
  </div>
  
  <div class="home-header">
    <div class="logo">NotePlayer</div>
    <div class="logo-sub">Bibliotheca Mathematica</div>
  </div>
  
  <div id="home-content"></div>
  
  <div class="section-ornament">⁂</div>
</div>

<!-- ALBUM VIEW -->
<div id="album-view" class="view">
  <div class="album-nav">
    <button class="back-btn" onclick="goHome()">Volver</button>
  </div>
  <div id="album-hero-area"></div>
  <div id="nav-title" style="display:none;"></div>
  <div class="tracklist">
    <div class="tl-header">
      <span style="text-align:center">Nº</span>
      <span>Tema</span>
      <span style="text-align:center">Nivel</span>
    </div>
    <div id="tracklist-body"></div>
  </div>
</div>

</div>

<script>
const CATEGORIES = [
  {
    label: "Cálculo Infinitesimal",
    books: [
      {
        id: "cal1", title: "Cálculo Diferencial", emoji: "∂", author: "Vol. I · MMXXIV", pages: 52,
        tracks: [
          {
            num: 1, title: "Límites y Continuidad", sub: "Definición épsilon-delta", diff: "Elemental", diffStyle: "border-color:#7ba587;color:#7ba587",
            latex: `<h1>Límites y Continuidad</h1><span class="subtitle">Capítulo Primero · Cálculo Diferencial</span>
<h2>Definición de Límite</h2>
<p>Escribimos $\\lim_{x\\to a}f(x)=L$ cuando los valores de $f(x)$ se aproximan a $L$ conforme $x$ tiende a $a$.</p>
<div class="def-box"><strong>Definición (ε-δ):</strong> Para todo $\\varepsilon>0$ existe $\\delta>0$ tal que si $0<|x-a|<\\delta$, entonces $|f(x)-L|<\\varepsilon$.</div>
<h2>Propiedades Fundamentales</h2>
<p>Si $\\lim_{x\\to a}f(x)=L$ y $\\lim_{x\\to a}g(x)=M$:</p>
<ul>
  <li>$\\lim_{x\\to a}[f(x)\\pm g(x)]=L\\pm M$</li>
  <li>$\\lim_{x\\to a}[f(x)\\cdot g(x)]=LM$</li>
  <li>$\\lim_{x\\to a}\\frac{f(x)}{g(x)}=\\frac{L}{M}$, si $M\\neq 0$</li>
</ul>
<h2>Límites Notables</h2>
<div class="math-block">$$\\lim_{x\\to 0}\\frac{\\sin x}{x}=1\\qquad\\lim_{x\\to 0}\\frac{1-\\cos x}{x}=0\\qquad\\lim_{x\\to\\infty}\\left(1+\\frac{1}{x}\\right)^x=e$$</div>
<h2>Continuidad</h2>
<div class="def-box"><strong>Definición:</strong> Una función $f$ es continua en $a$ si y solo si $\\lim_{x\\to a}f(x)=f(a)$.</div>
<div class="thm-box"><strong>Teorema del Valor Intermedio:</strong> Si $f$ es continua en $[a,b]$ y $f(a)f(b)<0$, entonces existe $c\\in(a,b)$ tal que $f(c)=0$.</div>`
          },
          {
            num: 2, title: "Derivadas", sub: "Reglas de Derivación", diff: "Intermedio", diffStyle: "border-color:#c9a96e;color:#c9a96e",
            latex: `<h1>Derivadas</h1><span class="subtitle">Capítulo Segundo · Cálculo Diferencial</span>
<h2>Definición</h2>
<p>La derivada de $f$ en $a$ es el límite del cociente incremental:</p>
<div class="math-block">$$f'(a)=\\lim_{h\\to 0}\\frac{f(a+h)-f(a)}{h}$$</div>
<h2>Reglas Fundamentales</h2>
<table><tr><th>Regla</th><th>Fórmula</th></tr>
<tr><td>Potencia</td><td>$\\frac{d}{dx}x^n=nx^{n-1}$</td></tr>
<tr><td>Producto</td><td>$(fg)'=f'g+fg'$</td></tr>
<tr><td>Cociente</td><td>$\\left(\\frac{f}{g}\\right)'=\\frac{f'g-fg'}{g^2}$</td></tr>
<tr><td>Cadena</td><td>$(f\\circ g)'=f'(g)\\cdot g'$</td></tr></table>
<div class="thm-box"><strong>Teorema del Valor Medio:</strong> Existe $c\\in(a,b)$ tal que $f'(c)=\\frac{f(b)-f(a)}{b-a}$.</div>`
          }
        ]
      },
      {
        id: "cal2", title: "Cálculo Integral", emoji: "∫", author: "Vol. II · MMXXIV", pages: 44,
        tracks: [
          {
            num: 1, title: "Series de Taylor", sub: "Expansiones Infinitas", diff: "Intermedio", diffStyle: "border-color:#c9a96e;color:#c9a96e",
            latex: `<h1>Series de Taylor</h1><span class="subtitle">Cálculo Integral · Vol. II</span>
<h2>Definición</h2>
<div class="math-block">$$f(x)=\\sum_{n=0}^{\\infty}\\frac{f^{(n)}(a)}{n!}(x-a)^n$$</div>
<h2>Series Notables</h2>
<table><tr><th>Función</th><th>Serie de Maclaurin</th></tr>
<tr><td>$e^x$</td><td>$\\sum_{n=0}^{\\infty}\\frac{x^n}{n!}$</td></tr>
<tr><td>$\\sin x$</td><td>$\\sum_{n=0}^{\\infty}\\frac{(-1)^n x^{2n+1}}{(2n+1)!}$</td></tr></table>`
          }
        ]
      }
    ]
  },
  {
    label: "Álgebra Superior",
    books: [
      {
        id: "alg1", title: "Álgebra Lineal", emoji: "⊗", author: "Vol. Único · MMXXIV", pages: 48,
        tracks: [
          {
            num: 1, title: "Sistemas Lineales", sub: "Eliminación Gaussiana", diff: "Elemental", diffStyle: "border-color:#7ba587;color:#7ba587",
            latex: `<h1>Sistemas de Ecuaciones Lineales</h1><span class="subtitle">Álgebra Lineal · Capítulo Primero</span>
<h2>Forma Matricial</h2>
<div class="math-block">$$A\\mathbf{x}=\\mathbf{b}$$</div>
<div class="def-box"><strong>Operaciones Elementales:</strong> Intercambio de filas, escalado por escalar no nulo, suma de múltiplo de una fila a otra.</div>`
          },
          {
            num: 2, title: "Eigenvalores", sub: "Diagonalización", diff: "Avanzado", diffStyle: "border-color:#8b9dc3;color:#8b9dc3",
            latex: `<h1>Eigenvalores</h1><span class="subtitle">Álgebra Lineal · Capítulo Final</span>
<h2>Definición</h2>
<div class="def-box">$\\lambda$ es <strong>eigenvalor</strong> de $A$ si existe $\\mathbf{v}\\neq\\mathbf{0}$ con $A\\mathbf{v}=\\lambda\\mathbf{v}$.</div>
<div class="thm-box"><strong>Diagonalización:</strong> $A=PDP^{-1}$ donde $D$ contiene los eigenvalores en la diagonal.</div>`
          }
        ]
      }
    ]
  }
];

let currentBookId = null;

function renderHome() {
  const container = document.getElementById('home-content');
  container.innerHTML = CATEGORIES.map((cat, catIndex) => `
    <div class="cat-section">
      <div class="cat-header">
        <div class="cat-label">${cat.label}</div>
        <div class="cat-nav">
          <button class="cat-nav-btn" onclick="slideBooks('cat-${catIndex}', -1)">
            <svg viewBox="0 0 24 24"><polyline points="16 20 8 12 16 4"/></svg>
          </button>
          <button class="cat-nav-btn" onclick="slideBooks('cat-${catIndex}', 1)">
            <svg viewBox="0 0 24 24"><polyline points="8 20 16 12 8 4"/></svg>
          </button>
        </div>
      </div>
      <div class="slider-wrapper">
        <div class="book-slider" id="cat-${catIndex}">
          ${cat.books.map(b => `
            <div class="book-card" onclick="openAlbum('${b.id}')">
              <div class="book-cover">
                <span>${b.emoji}</span>
              </div>
              <div class="book-spine">
                <div class="book-title">${b.title}</div>
                <div class="book-meta">${b.author}</div>
                <div class="book-pages-indicator">
                  ${Array.from({length: Math.min(b.tracks.length, 4)}, (_, i) => `
                    <div class="book-page-dot ${i === 0 ? 'active' : ''}"></div>
                  `).join('')}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function slideBooks(catId, direction) {
  const slider = document.getElementById(catId);
  const card = slider.querySelector('.book-card');
  if (!card) return;
  const scrollAmount = (card.offsetWidth + 16) * direction;
  slider.scrollBy({ left: scrollAmount, behavior: 'smooth' });
}

function openAlbum(bookId) {
  const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === bookId);
  if (!book) return;
  currentBookId = bookId;
  
  const navTitle = document.getElementById('nav-title');
  navTitle.textContent = book.title;
  navTitle.style.display = 'block';
  
  document.getElementById('album-hero-area').innerHTML = `
    <div class="album-hero">
      <div class="hero-cover"><span>${book.emoji}</span></div>
      <div class="hero-info">
        <div class="hero-type">Manuscrito Matemático</div>
        <div class="hero-title">${book.title}</div>
        <div class="hero-author">${book.author} · ${book.tracks.length} capítulos</div>
        <div class="hero-stats">${book.tracks.reduce((s, t) => s + parseInt(t.pages || 10), 0)} páginas</div>
      </div>
    </div>
  `;
  
  document.getElementById('tracklist-body').innerHTML = book.tracks.map((t, i) => `
    <div class="track-item">
      <div class="track-row" id="tr-${t.num}" onclick="toggleTrack(${t.num})">
        <div class="t-num" id="tn-${t.num}">${String(t.num).padStart(2, '0')}</div>
        <div class="t-info">
          <div class="t-title">${t.title}</div>
          <div class="t-sub">${t.sub}</div>
        </div>
        <div><span class="t-badge" style="${t.diffStyle}">${t.diff}</span></div>
      </div>
      <div class="apunte-body" id="ab-${t.num}">
        <div class="apunte-inner" id="ai-${t.num}"></div>
      </div>
    </div>
  `).join('');
  
  showView('album-view');
  window.scrollTo(0, 0);
}

function toggleTrack(num) {
  const ab = document.getElementById('ab-' + num);
  const row = document.getElementById('tr-' + num);
  const numEl = document.getElementById('tn-' + num);
  const isOpen = ab.classList.contains('open');
  
  if (isOpen) {
    ab.classList.remove('open');
    row.classList.remove('open');
    numEl.textContent = String(num).padStart(2, '0');
    return;
  }
  
  document.querySelectorAll('.apunte-body.open').forEach(ob => {
    const oid = parseInt(ob.id.replace('ab-', ''));
    if (ob !== ab) {
      ob.classList.remove('open');
      const orow = document.getElementById('tr-' + oid);
      const onum = document.getElementById('tn-' + oid);
      if (orow) orow.classList.remove('open');
      if (onum) onum.textContent = String(oid).padStart(2, '0');
    }
  });
  
  ab.classList.add('open');
  row.classList.add('open');
  numEl.innerHTML = '<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>';
  
  const inner = document.getElementById('ai-' + num);
  if (!inner.dataset.rendered) {
    const book = CATEGORIES.flatMap(c => c.books).find(b => b.id === currentBookId);
    const track = book.tracks.find(t => t.num === num);
    inner.innerHTML = track.latex;
    inner.dataset.rendered = '1';
    renderKaTeX(inner);
  }
  
  setTimeout(() => row.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function renderKaTeX(el) {
  if (window.renderMathInElement) {
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false, strict: false, trust: true
      });
    } catch(e) { console.error('KaTeX:', e); }
  } else {
    setTimeout(() => renderKaTeX(el), 100);
  }
}

function showView(id) {
  document.getElementById('home').classList.remove('active');
  document.getElementById('album-view').classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showView('home');
  window.scrollTo(0, 0);
}

document.addEventListener('DOMContentLoaded', () => {
  renderHome();
});
</script>
</body>
</html>
