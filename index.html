<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NotePlayer · Apuntes Matemáticos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ── VARIABLES ─────────────────────────────── */
:root {
  --bg:#000;--s1:#12121a;--s2:#1a1a24;--s3:#222230;
  --br:rgba(255,255,255,.06);--br2:rgba(255,255,255,.11);
  --ink:#f0ece4;--ink2:rgba(240,236,228,.62);--ink3:rgba(240,236,228,.32);
  --acc:#c9a96e;--acc2:#d4ba7c;--adim:rgba(201,169,110,.14);
  --teal:#7ec8bc;
  --c-info:rgba(139,157,195,.14);--c-info-t:#8b9dc3;
  --c-ok:rgba(123,165,135,.14);--c-ok-t:#7ba587;
  --c-warn:rgba(201,169,110,.14);--c-warn-t:#c9a96e;
  --r:16px;--rsm:10px;--nav-h:58px;
  --tf:.15s ease;--ts:.3s cubic-bezier(.4,0,.2,1);
}

/* ── RESET ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  line-height:1.5;
}
#detail.active{padding-bottom:calc(var(--nav-h) + 1rem)}

/* ── ANIMATIONS ────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes rspin{to{transform:rotate(360deg)}}

/* ── VIEWS ─────────────────────────────────── */
.view{display:none;animation:fadeIn .3s ease}
.view.active{display:block}

#home,#search-view,#favs-view{
  position:fixed;
  top:58px;left:0;right:0;bottom:var(--nav-h);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  display:none;
  padding-bottom:.5rem;
}
#home.active,#search-view.active,#favs-view.active{display:block}
#detail{display:none}
#detail.active{display:block}

/* ── TOP BAR ───────────────────────────────── */
.top-bar{
  position:sticky;top:0;z-index:100;
  padding:.7rem 1rem;
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  background:rgba(0,0,0,.93);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--br);
}
.top-bar::after{
  content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent,var(--acc),transparent);
  opacity:.28;pointer-events:none;
}
.tb-left,.tb-right{display:flex;align-items:center;gap:.5rem}
.tb-right{gap:.8rem}
.logo-text{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:900;letter-spacing:-.02em;line-height:1;
  cursor:pointer;transition:color .2s;
}
.logo-text:hover{color:var(--acc)}
.tb-divider{width:1px;height:22px;background:rgba(255,255,255,.13);margin:0 .1rem}
.tb-inst-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:900;line-height:1.1;letter-spacing:-.01em;
}
.tb-inst-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);font-weight:500}
.back-btn-container{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0}
.back-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
}

/* ── ICON BUTTONS ──────────────────────────── */
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:1px solid var(--br2);
  color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--tf);flex-shrink:0;
}
.icon-btn:hover{border-color:var(--acc);color:var(--acc);transform:scale(1.05)}
.icon-btn:active{transform:scale(.95)}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-btn.active{background:var(--adim);border-color:var(--acc);color:var(--acc)}

/* ── SECTIONS ──────────────────────────────── */
.section{margin:1.5rem 0}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;margin-bottom:.8rem}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;font-weight:700;letter-spacing:.01em;
  position:relative;padding-left:12px;
}
.section-title::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:var(--acc);border-radius:2px;
}

/* ── HORIZONTAL SCROLL ─────────────────────── */
.hscroll{
  display:flex;gap:.75rem;overflow-x:auto;
  padding:0 1rem .5rem;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.hscroll::-webkit-scrollbar{display:none}
.hscroll::after{content:'';flex:0 0 1px}

/* ── MINI CARDS ────────────────────────────── */
.mini-card{
  flex-shrink:0;width:138px;cursor:pointer;
  border-radius:var(--rsm);overflow:hidden;
  background:var(--s1);border:1px solid var(--br);
  transition:all var(--tf);
}
.mini-card:hover{border-color:var(--br2);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.mini-cover{
  width:100%;aspect-ratio:2/3;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;position:relative;overflow:hidden;background:var(--s2);
}
.mini-cover img,.lib-grid-cover img,.c-thumb img,.detail-cover img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
.mini-cover span,.lib-grid-cover span,.detail-cover span{position:relative;z-index:1}
.fav-dot{
  position:absolute;top:.4rem;right:.4rem;z-index:3;
  width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:var(--ink2);
  transition:all var(--tf);backdrop-filter:blur(4px);
}
.fav-dot:hover{transform:scale(1.1);border-color:var(--acc)}
.fav-dot.faved{background:var(--adim);border-color:var(--acc);color:var(--acc)}
.mini-info{padding:.6rem .7rem}
.mini-title{
  font-size:.79rem;font-weight:600;line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.mini-meta{font-size:.69rem;color:var(--ink3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── CONTINUE LIST ─────────────────────────── */
.continue-list{padding:0 1rem}
.continue-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem .6rem;border-radius:var(--rsm);
  cursor:pointer;transition:all var(--tf);
  animation:slideUp .3s ease backwards;
}
.continue-item:hover{background:var(--s1);transform:translateX(4px)}
.continue-item:active{transform:scale(.98)}
.c-thumb{
  width:48px;height:48px;border-radius:var(--rsm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;background:var(--s2);flex-shrink:0;
  overflow:hidden;position:relative;
}
.c-info{flex:1;min-width:0}
.c-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:.73rem;color:var(--ink3);margin-top:2px}

/* ── SEARCH ────────────────────────────────── */
.search-wrap{padding:.7rem 1rem .3rem;animation:fadeIn .3s ease}
.search-bar{
  display:flex;align-items:center;gap:.6rem;
  padding:.7rem 1rem;background:var(--s1);
  border:1px solid var(--br);border-radius:99px;
  transition:all var(--tf);
}
.search-bar:focus-within{border-color:var(--acc);box-shadow:0 0 0 2px var(--adim)}
.search-bar svg{width:16px;height:16px;stroke:var(--ink3);fill:none;stroke-width:2;flex-shrink:0;transition:stroke .3s}
.search-bar:focus-within svg{stroke:var(--acc)}
.search-bar input{
  flex:1;background:none;border:none;color:var(--ink);
  font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;
}
.search-bar input::placeholder{color:var(--ink3)}
.search-clear{
  cursor:pointer;color:var(--ink3);
  width:24px;height:24px;
  display:none;align-items:center;justify-content:center;
  border-radius:50%;transition:all .2s;
}
.search-clear:hover{background:rgba(255,255,255,.1);color:var(--ink)}
.search-clear.visible{display:flex}
.search-results{padding:0 1rem;animation:fadeIn .3s ease}
.search-empty{padding:3rem 1rem;text-align:center;color:var(--ink3);font-size:.9rem}
.search-result-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem .5rem;border-radius:var(--rsm);cursor:pointer;
  transition:all var(--tf);border-bottom:1px solid var(--br);
  animation:slideUp .2s ease backwards;
}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--s1);transform:translateX(4px)}
.sr-cover{width:44px;height:44px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-title{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-sub{font-size:.73rem;color:var(--ink3);margin-top:2px}
.sr-type{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:99px;background:var(--s2);color:var(--ink3);flex-shrink:0}

/* ── LIBRARY GRID ──────────────────────────── */
.lib-grid-section{padding:0 1rem 1.5rem}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.7rem;animation:fadeIn .3s ease}
.lib-grid-card{
  cursor:pointer;border-radius:var(--rsm);overflow:hidden;
  background:var(--s1);border:1px solid var(--br);
  transition:all var(--tf);position:relative;
}
.lib-grid-card:hover{border-color:var(--br2);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.lib-grid-card:active{transform:scale(.96)}
.lib-grid-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:1.6rem;position:relative;overflow:hidden}
.lib-grid-info{padding:.45rem .55rem .55rem}
.lib-grid-name{
  font-size:.7rem;font-weight:600;line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.lib-grid-auth{font-size:.58rem;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── DETAIL ────────────────────────────────── */
.detail-header{
  display:flex;flex-direction:column;align-items:center;
  padding:1.5rem 1rem .5rem;gap:1rem;animation:fadeIn .4s ease;
}
.detail-cover{
  width:clamp(120px,40vw,170px);aspect-ratio:2/3;
  border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;border:1px solid var(--br2);
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.detail-info{text-align:center}
.detail-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1.2;margin-bottom:.3rem}
.detail-author{font-size:.9rem;color:var(--ink2);line-height:1.4}
.detail-actions{display:flex;gap:.6rem;justify-content:center;margin-top:.5rem;flex-wrap:wrap}
.action-btn{
  padding:.55rem 1.1rem;border-radius:99px;
  background:var(--s1);border:1px solid var(--br2);
  color:var(--ink2);
  font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;
  cursor:pointer;transition:all var(--tf);
  display:flex;align-items:center;gap:.4rem;
}
.action-btn:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px)}
.action-btn:active{transform:translateY(0)}
.action-btn.primary{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600}
.action-btn.primary:hover{background:var(--acc2);box-shadow:0 4px 12px var(--adim)}
.action-btn.faved{background:var(--adim);border-color:var(--acc);color:var(--acc)}
.detail-stats{text-align:center;font-size:.8rem;color:var(--ink3);margin-top:.5rem}

/* ── EPISODE LIST ──────────────────────────── */
.episode-list{padding:0 .8rem}
.ep-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.85rem .5rem;border-radius:var(--rsm);
  cursor:pointer;transition:all var(--tf);
  border-bottom:1px solid var(--br);
  animation:slideUp .3s ease backwards;
}
.ep-item:last-of-type{border-bottom:none}
.ep-item:hover{background:var(--s1);transform:translateX(3px)}
.ep-item.open{background:var(--adim);border-bottom-color:transparent}
.ep-num{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--ink3);width:32px;text-align:center;flex-shrink:0;font-weight:500}
.ep-info{flex:1;min-width:0}
.ep-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-meta{font-size:.73rem;color:var(--ink3);margin-top:2px;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.ep-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.ep-fav,.ep-play{cursor:pointer;transition:all var(--tf);display:flex;align-items:center;justify-content:center}
.ep-fav{
  width:30px;height:30px;border-radius:50%;
  background:transparent;border:1px solid var(--br2);color:var(--ink3);font-size:13px;
}
.ep-fav:hover,.ep-fav.faved{border-color:var(--acc);color:var(--acc)}
.ep-play{
  width:36px;height:36px;border-radius:50%;
  background:var(--adim);border:1px solid var(--acc);color:var(--acc);
}
.ep-play:hover{background:var(--acc);color:#000;transform:scale(1.05)}
.ep-play:active{transform:scale(.95)}
.ep-play svg{width:13px;height:13px;fill:currentColor}

/* ── EXPANDABLE NOTES ──────────────────────── */
.apunte-wrap{overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0}
.apunte-wrap.open{max-height:2000px;opacity:1}
.apunte-inner{
  background:var(--s1);border-top:1px solid var(--br2);
  margin:0 .3rem;border-radius:0 0 var(--rsm) var(--rsm);
  padding:1.5rem 1.2rem;animation:fadeIn .3s ease;
}
.apunte-inner h1{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;margin-bottom:.5rem}
.apunte-inner .subtitle{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);
  letter-spacing:.08em;text-transform:uppercase;
  display:block;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--br);
}
.apunte-inner h2{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--acc);margin:1.5rem 0 .6rem}
.apunte-inner h3{font-size:.92rem;font-weight:600;margin:1rem 0 .4rem}
.apunte-inner p{font-size:.875rem;line-height:1.8;color:var(--ink2);margin-bottom:.8rem}
.apunte-inner ul,.apunte-inner ol{margin:.6rem 0 1rem 1.5rem}
.apunte-inner li{font-size:.875rem;line-height:1.8;color:var(--ink2);margin-bottom:.3rem}
.apunte-inner strong{color:var(--ink);font-weight:600}
.apunte-inner em{color:var(--ink2);font-style:italic}
.apunte-inner code{font-family:'DM Mono',monospace;background:var(--adim);padding:2px 8px;border-radius:4px;font-size:.85em;color:var(--acc2)}
.def-box{background:var(--c-info);border-left:3px solid var(--c-info-t);padding:.8rem 1rem;margin:1rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.88em;line-height:1.7;color:var(--ink2)}
.thm-box{background:var(--c-ok);border-left:3px solid var(--c-ok-t);padding:.8rem 1rem;margin:1rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.88em;line-height:1.7;color:var(--ink2)}
.ex-box{background:var(--c-warn);border-left:3px solid var(--c-warn-t);padding:.8rem 1rem;margin:1rem 0;border-radius:0 var(--rsm) var(--rsm) 0;font-size:.88em;line-height:1.7;color:var(--ink2)}
.math-block{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.8rem 0;text-align:center;margin:.8rem 0;background:rgba(255,255,255,.02);border-radius:var(--rsm)}
.math-block .katex-display{margin:0;overflow-x:auto;overflow-y:hidden;padding:0 .5rem}
.apunte-inner table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.82rem;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--br);border-radius:var(--rsm)}
.apunte-inner th{background:var(--s2);padding:.7rem .8rem;text-align:left;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--br2)}
.apunte-inner td{padding:.6rem .8rem;border-bottom:1px solid var(--br);color:var(--ink2);font-size:.82rem}
.apunte-inner tr:last-child td{border-bottom:none}

/* ── BOTTOM NAV ────────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-around;
  padding:.5rem .8rem env(safe-area-inset-bottom,.5rem);
  background:rgba(0,0,0,.94);backdrop-filter:blur(20px);
  border-top:1px solid var(--br);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:pointer;color:var(--ink3);
  transition:all var(--tf);padding:.3rem .6rem;border-radius:var(--rsm);position:relative;
}
.nav-item.active{color:var(--acc)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;transition:all .3s}
.nav-item.active svg{fill:var(--adim)}
.nav-label{font-size:10px;font-weight:500;letter-spacing:.04em}
.nav-dot{
  position:absolute;top:-2px;right:-4px;
  min-width:16px;height:16px;background:var(--acc);color:#000;border-radius:8px;
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;
}

/* ── SCROLLBAR ─────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--ink3)}

/* ── PDF READER ────────────────────────────── */
#reader-view{
  position:fixed;inset:0;z-index:200;background:#0f0e0c;
  display:none;flex-direction:column;animation:fadeIn .3s ease;
}
#reader-view.active{display:flex}
.reader-topbar{
  height:50px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:rgba(10,9,7,.97);
  border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(16px);z-index:2;
}
.reader-title{
  font-family:'Playfair Display',serif;font-size:.88rem;font-style:italic;
  color:var(--acc);flex:1;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;
}
.reader-btn{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
  color:rgba(240,236,228,.5);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--tf);flex-shrink:0;
}
.reader-btn:hover{background:var(--adim);border-color:var(--acc);color:var(--acc)}
.reader-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.reader-pdf-container{flex:1;position:relative;width:100%;height:100%;background:#0f0e0c}
.reader-pdf-container iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.reader-loading,.reader-error{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;background:#0f0e0c;z-index:1;
}
.reader-error{color:var(--ink3);font-size:.85rem;text-align:center;padding:2rem}
.reader-error svg{width:40px;height:40px;stroke:var(--acc);opacity:.5}
.hidden{display:none !important}
.r-spinner{width:32px;height:32px;border:3px solid rgba(201,169,110,.12);border-top-color:var(--acc);border-radius:50%;animation:rspin .7s linear infinite}
.loading-text{color:var(--ink3);font-size:.82rem;font-family:'DM Mono',monospace;letter-spacing:.04em}

/* ── RESPONSIVE ────────────────────────────── */
@media(min-width:600px){

/* ── DEDUP KEY ─────────────────────────────────────── */
function dedupKey(b) {
  const authorBase = b.author
    .replace(/\d{4}.*$/, '')
    .split(',')[0]
    .trim()
    .split(' ').pop()
    .toLowerCase();
  const titleBase = b.title
    .replace(/\s*\(.*?\)/g, '')
    .replace(/[·,].*$/, '')
    .replace(/\s+vol.*$/i, '')
    .trim()
    .toLowerCase();
  return `${titleBase}||${authorBase}`;
}

/* Computed lookups */

);

/* ─── STATE ──────────────────────────────────────── */
function loadFavs() {
  try {
    const raw = localStorage.getItem('np_favs');
    if (!raw) return [];
    return JSON.parse(raw).filter(x => typeof x === 'string');
  } catch { localStorage.removeItem('np_favs'); return []; }
}
function loadRecent() {
  try { return JSON.parse(localStorage.getItem('np_recent') || '[]').slice(0,4); }
  catch { return []; }
}

  openTracks: new Set(),
  recent: loadRecent(),
  historyStack: ['home'], // Mantener nuestro propio stack de historial

  isFav(k)   { return this.favs.has(k) },
  toggleFav(k) {
    this.favs[this.favs.has(k) ? 'delete' : 'add'](k);
    localStorage.setItem('np_favs', JSON.stringify([...this.favs]));
    this._syncFavCount();
    return this.favs.has(k);
  },
  addRecent(bookId, num) {
    const k = `${bookId}:${num}`;
    this.recent = [k, ...this.recent.filter(x => x !== k)].slice(0,4);
    localStorage.setItem('np_recent', JSON.stringify(this.recent));
  },
  _syncFavCount() {
    const el = document.getElementById('fav-count');
    const n  = this.favs.size;
    el.textContent = n;
    el.classList.toggle('hidden', n === 0);
  },
  coverUrl(bookId) {
    const id = PDF[bookId]?.driveId;
    return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : null;
  }
};

/* ─── HELPERS ────────────────────────────────────── */
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms) } };

function coverHTML(bookId, alt = '', cls = '') {
  const url  = S.coverUrl(bookId);
  const book = bookMap[bookId];
  return url
    ? `<img src="${url}" alt="${alt}" loading="lazy"${cls ? ` class="${cls}"` : ''}>`
    : `<span>${book?.emoji ?? ''}</span>`;
}

      </div>
      <div class="episode-list">
        ${book.tracks.map((t, i) => {
          const key = `${book.id}:${t.num}`;
          const open = S.openTracks.has(key);
          return `
            <div id="wrap-${book.id}-${t.num}" style="animation-delay:${i*.03}s">
              <div class="ep-item ${open?'open':''}" id="ep-${book.id}-${t.num}"
                   onclick="A.toggle('${book.id}',${t.num})">
                <span class="ep-num">${String(t.num).padStart(2,'0')}</span>
                <div class="ep-info">
                  <div class="ep-title">${t.title}</div>
                  <div class="ep-meta"><span>${t.sub}</span></div>
                </div>
                <div class="ep-actions">
                  <button class="ep-fav ${S.isFav(key)?'faved':''}"
                          onclick="event.stopPropagation();A.trackFav('${book.id}',${t.num},this)"
                          aria-label="Favorito">${S.isFav(key)?'★':'☆'}</button>
                  <button class="ep-play" onclick="event.stopPropagation();A.toggle('${book.id}',${t.num})">
                    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
                  </button>
                </div>
              </div>
              <div class="apunte-wrap ${open?'open':''}" id="apunte-${book.id}-${t.num}">
                <div class="apunte-inner" id="ai-${book.id}-${t.num}">${open ? t.latex : ''}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;

    document.getElementById('detail').innerHTML = html;

    if (S.openTracks.size) {
      setTimeout(() => {
        S.openTracks.forEach(k => {
          const el = document.getElementById('ai-' + k.replace(':', '-'));
          if (el?.innerHTML) KaTex.render(el);
        });
      }, 100);
    }
  },

  search(q = '') {
    document.getElementById('search-view').innerHTML = `
      <div class="search-wrap">
        <div class="search-bar">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Buscar libros, temas, materias…"
                 value="${q}" autofocus oninput="A.search(this.value)">
          <span class="search-clear ${q?'visible':''}" id="search-clear" onclick="A.clearSearch()">✕</span>
        </div>
      </div>
      <div class="search-results" id="search-results" style="display:${q?'block':'none'}"></div>
      <div class="lib-grid-section" id="library-grid" style="display:${q?'none':'block'}">
        ${this._grid()}
      </div>`;
    if (q) A._runSearch(q);
  },

  _grid() {
    const seen   = new Map();
    allBooks.forEach(b => {
      const k = dedupKey(b);
      if (!seen.has(k)) seen.set(k, b);
    });
    const unique = [...seen.values()].sort((a,b) => a.title.localeCompare(b.title,'es'));
    return `<div class="lib-grid">${unique.map(b => `
      <div class="lib-grid-card" onclick="Nav.detail('${b.id}')">
        <div class="lib-grid-cover" style="background:${b.cover}">${coverHTML(b.id, b.title)}</div>
        <div class="lib-grid-info">
          <div class="lib-grid-name">${b.title}</div>
          <div class="lib-grid-auth">${b.author.split('·')[0].trim()}</div>
        </div>
      </div>`).join('')}</div>`;
  },

  favs() {
    const seenFavBooks = new Map();
    allBooks
      .filter(b => S.isFav(b.id))
      .forEach(b => {
        const k = dedupKey(b);
        if (!seenFavBooks.has(k)) seenFavBooks.set(k, b);
      });
    const favBooks  = [...seenFavBooks.values()];
    const favTracks = allTracks.filter(t => S.isFav(`${t.bookId}:${t.num}`));
    let html = '';

    if (!favBooks.length && !favTracks.length) {
      html = '<div class="search-empty" style="padding:4rem 1rem">Aún no tienes favoritos.<br>Guarda libros o temas con ☆</div>';
    } else {
      if (favBooks.length) {
        html += `<div class="section">
          <div class="section-header"><span class="section-title">Libros guardados</span></div>
          <div class="hscroll">
            ${favBooks.map(b => `
              <div class="mini-card" onclick="Nav.detail('${b.id}')">
                <div class="mini-cover" style="background:${b.cover}">${coverHTML(b.id, b.title)}</div>
                <div class="mini-info">
                  <div class="mini-title">${b.title}</div>
                  <div class="mini-meta">${b.author.split('·')[0].trim()}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
      }
      if (favTracks.length) {
        html += `<div class="section">
          <div class="section-header"><span class="section-title">Temas guardados</span></div>
          <div class="continue-list">
            ${favTracks.map(t => `
              <div class="continue-item" onclick="Nav.detail('${t.bookId}')">
                <div class="c-thumb" style="background:${t.bookCover}">${t.bookEmoji}</div>
                <div class="c-info">
                  <div class="c-title">${t.title}</div>
                  <div class="c-sub">${t.bookTitle} · ${t.sub}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
      }
    }
    document.getElementById('favs-view').innerHTML = html;
  }
};

/* ─── NAVIGATION ─────────────────────────────────── */
const Nav = {
  _setBar(title, back) {
    document.getElementById('tb-default').style.display = back ? 'none' : 'flex';
    document.getElementById('tb-back').style.display    = back ? 'flex' : 'none';
    if (back) document.getElementById('tb-title').textContent = title ?? '';
  },
  
  // Cambiar a una vista sin tocar el historial del navegador
  _switchTo(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId)?.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === viewId));
    if (viewId === 'detail') window.scrollTo({ top:0, behavior:'instant' });
  },

  // Ir a home (push al historial)
  home() {
    // Solo hacer push si no estamos ya en home
    if (S.view !== 'home') {
      S.prev = S.view;
      S.view = 'home';
      S.bookId = null;
      this._setBar('', false);
      R.home();
      this._switchTo('home');
      history.pushState({ view: 'home' }, '', '#home');
    }
  },

  // Ir a búsqueda (push al historial)
  search() {
    if (S.view !== 'search-view') {
      S.prev = S.view;
      S.view = 'search-view';
      this._setBar('Buscar', true);
      R.search();
      this._switchTo('search-view');
      history.pushState({ view: 'search-view' }, '', '#search-view');
      setTimeout(() => document.getElementById('search-input')?.focus(), 100);
    }
  },

  // Ir a favoritos (push al historial)
  favs() {
    if (S.view !== 'favs-view') {
      S.prev = S.view;
      S.view = 'favs-view';
      this._setBar('Favoritos', false);
      R.favs();
      this._switchTo('favs-view');
      history.pushState({ view: 'favs-view' }, '', '#favs-view');
    }
  },

  // Ir a detalle de libro (push al historial)
  detail(bookId) {
    const b = bookMap[bookId];
    if (!b) return;
    
    if (S.view !== 'detail' || S.bookId !== bookId) {
      S.prev = S.view;
      S.bookId = bookId;
      S.view = 'detail';
      this._setBar(b.title, true);
      R.detail(b);
      this._switchTo('detail');
      history.pushState({ view: 'detail', bookId: bookId }, '', '#detail');
    }
  },

  play(bookId, num) {
    if (S.view !== 'detail' || S.bookId !== bookId) {
      S.bookId = bookId;
      S.addRecent(bookId, num);
      this.detail(bookId);
      setTimeout(() => A.toggle(bookId, num), 300);
    } else {
      S.addRecent(bookId, num);
      A.toggle(bookId, num);
    }
  }
};

/* ─── ACTIONS ────────────────────────────────────── */
const A = {
  bookFav(bookId, el, isBtn = false) {
    const on = S.toggleFav(bookId);
    el.classList.toggle('faved', on);
    el.textContent = isBtn ? (on ? '★ Guardado' : '☆ Guardar') : (on ? '★' : '☆');

    if (S.view === 'home') {
      const card = document.getElementById(`mc-${bookId}`);
      if (!card) return;
      const hscroll = card.parentElement;
      const savedScroll = hscroll.scrollLeft;

      if (on) {
        card.classList.add('is-fav');
        const firstNonFav = [...hscroll.children].find(c => c !== card && !c.classList.contains('is-fav'));
        if (firstNonFav) hscroll.insertBefore(card, firstNonFav);
        else hscroll.appendChild(card);
        hscroll.scrollLeft = savedScroll;
      } else {
        card.classList.remove('is-fav');
      }
    }
  },
  trackFav(bookId, num, el) {
    const k  = `${bookId}:${num}`;
    const on = S.toggleFav(k);
    el.classList.toggle('faved', on);
    el.textContent = on ? '★' : '☆';
  },
  toggle(bookId, num) {
    const key   = `${bookId}:${num}`;
    const wrap  = document.getElementById(`apunte-${bookId}-${num}`);
    const epEl  = document.getElementById(`ep-${bookId}-${num}`);
    if (!wrap) return;

    const opening = !wrap.classList.contains('open');

    document.querySelectorAll('.apunte-wrap.open').forEach(el => {
      el.classList.remove('open');
      const k = el.id.replace('apunte-','').replace(/-(\d+)$/,':$1');
      S.openTracks.delete(k);
    });
    document.querySelectorAll('.ep-item.open').forEach(el => el.classList.remove('open'));

    if (opening) {
      wrap.classList.add('open');
      epEl?.classList.add('open');
      S.openTracks.add(key);

      const ai = document.getElementById(`ai-${bookId}-${num}`);
      if (!ai.dataset.rendered) {
        const t = bookMap[bookId]?.tracks.find(x => x.num === num);
        if (t) { ai.innerHTML = t.latex; ai.dataset.rendered = '1'; setTimeout(() => KaTex.render(ai), 150); }
      }
      setTimeout(() => epEl?.scrollIntoView({ behavior:'smooth', block:'nearest' }), 200);
    }
  },
  search: debounce(function(q) {
    const clear   = document.getElementById('search-clear');
    const results = document.getElementById('search-results');
    const grid    = document.getElementById('library-grid');
    clear?.classList.toggle('visible', q.length > 0);
    if (!q.trim()) {
      if (results) results.style.display = 'none';
      if (grid)    grid.style.display    = 'block';
      return;
    }
    if (results) results.style.display = 'block';
    if (grid)    grid.style.display    = 'none';
    A._runSearch(q);
  }, 300),
  _runSearch(q) {
    const ql = q.toLowerCase();
    const results = document.getElementById('search-results');
    if (!results) return;

    const seenBooks = new Map();
    const matches   = [];

    allBooks.forEach(b => {
      const bk = dedupKey(b);
      const bookMatches = b.title.toLowerCase().includes(ql) || b.author.toLowerCase().includes(ql);
      if (bookMatches && !seenBooks.has(bk)) {
        seenBooks.set(bk, true);
        const authorClean = b.author.replace(/\s*\d{4}.*$/, '').trim();
        matches.push({ type:'book', bookId:b.id, title:b.title, sub:authorClean, emoji:b.emoji, cover:b.cover });
      }
      b.tracks.forEach(t => {
        if (t.title.toLowerCase().includes(ql) || t.sub?.toLowerCase().includes(ql))
          matches.push({ type:'track', bookId:b.id, num:t.num, title:t.title, sub:`${b.title} · ${t.sub}`, emoji:b.emoji, cover:b.cover });
      });
    });

    results.innerHTML = matches.length
      ? matches.map((m,i) => `
          <div class="search-result-item" style="animation-delay:${i*.02}s"
               onclick="${m.type==='book' ? `Nav.detail('${m.bookId}')` : `Nav.play('${m.bookId}',${m.num})`}">
            <div class="sr-cover" style="background:${m.cover}">${m.emoji}</div>
            <div class="sr-info">
              <div class="sr-title">${m.title}</div>
              <div class="sr-sub">${m.sub}</div>
            </div>
            <span class="sr-type">${m.type==='book'?'Libro':'Tema'}</span>
          </div>`).join('')
      : `<div class="search-empty">Sin resultados para "<strong>${q}</strong>"</div>`;
  },
  clearSearch() {
    const inp = document.getElementById('search-input');
    if (inp) { inp.value = ''; inp.focus(); }
    this.search('');
  }
};

/* ─── KATEX ──────────────────────────────────────── */
const KaTex = {
  render(el) {
    if (!el) return;
    if (!window.renderMathInElement) { setTimeout(() => this.render(el), 150); return; }
    try {
      renderMathInElement(el, {
        delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
        throwOnError:false,strict:false,trust:true
      });
    } catch(e) { console.warn('KaTeX:', e); }
  }
};

/* ─── PDF READER ─────────────────────────────────── */
const Reader = {
  driveId: null,

  open(bookId) {
    const cfg = PDF[bookId];
    if (!cfg?.driveId) { console.warn('No PDF para:', bookId); return; }
    this.driveId = cfg.driveId;

    document.getElementById('r-title').textContent = cfg.title ?? bookId;
    document.getElementById('reader-view').classList.add('active');
    document.body.style.overflow = 'hidden';
    
    // Push state para el reader
    history.pushState({ view: 'reader' }, '', '#reader');

    const loading = document.getElementById('r-loading');
    const error   = document.getElementById('r-error');
    const iframe  = document.getElementById('r-iframe');
    loading.classList.remove('hidden');
    error.classList.add('hidden');

    let loaded = false;
    const done = () => { loaded = true; loading.classList.add('hidden'); };
    iframe.onload = done;
    iframe.onerror = () => { loading.classList.add('hidden'); error.classList.remove('hidden'); };
    setTimeout(() => { if (!loaded) loading.classList.add('hidden'); }, 10000);
    iframe.src = `https://drive.google.com/file/d/${this.driveId}/preview`;
  },

  openTab() {
    if (this.driveId) window.open(`https://drive.google.com/file/d/${this.driveId}/view`, '_blank');
  },

  closeBtn() {
    history.back();
  },

  _closeUI() {
    document.getElementById('r-iframe').src = '';
    this.driveId = null;
    document.getElementById('reader-view').classList.remove('active');
    document.body.style.overflow = '';
  }
};

/* ─── POPSTATE ───────────────────────────────────── */
window.addEventListener('popstate', e => {
  // Si el reader está abierto, cerrarlo
  if (document.getElementById('reader-view').classList.contains('active')) {
    Reader._closeUI();
    // No hacer nada más - el navegador ya retrocedió en el historial
    // y restaurará la vista anterior automáticamente
    return;
  }

  // Obtener el estado actual del historial
  const v = e.state?.view;
  
  // Actualizar la UI según el estado
  if (!v || v === 'home') {
    S.view = 'home';
    S.bookId = null;
    Nav._setBar('', false);
    R.home();
    Nav._switchTo('home');
  } else if (v === 'detail' && e.state.bookId) {
    const b = bookMap[e.state.bookId];
    if (b) {
      S.view = 'detail';
      S.bookId = e.state.bookId;
      Nav._setBar(b.title, true);
      R.detail(b);
      Nav._switchTo('detail');
    }
  } else if (v === 'search-view') {
    S.view = 'search-view';
    Nav._setBar('Buscar', true);
    R.search();
    Nav._switchTo('search-view');
  } else if (v === 'favs-view') {
    S.view = 'favs-view';
    Nav._setBar('Favoritos', false);
    R.favs();
    Nav._switchTo('favs-view');
  }
});

/* ─── GLOBAL ALIASES ─────────────────────────────── */
window.goHome    = () => Nav.home();
window.showSearch= () => Nav.search();
window.showFavs  = () => Nav.favs();
window.navBack   = () => history.back();

/* ─── INIT ───────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  // Asegurar que el estado inicial sea home
  history.replaceState({ view:'home' }, '', '#home');
  S.view = 'home';
  R.home();
  S._syncFavCount();
});
</script>
</body>
